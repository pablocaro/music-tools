<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Piano - Experimental</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="startup-overlay" id="startupOverlay"></div>


    <div class="side-panel" id="modalBackdrop">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="closeBtn" aria-label="Close controls">✕</button>

            <h3>Radial Piano Controls</h3>

            <!-- ============================================
                 THEME
                 ============================================ -->
            <div class="control-group">
                <div class="theme-switch-container">
                    <label>Theme:</label>
                    <div class="theme-switch">
                        <button class="theme-option" id="darkThemeBtn" aria-label="Dark theme">Dark</button>
                        <button class="theme-option" id="lightThemeBtn" aria-label="Light theme">Light</button>
                    </div>
                </div>
            </div>

            <!-- STYLE -->
            <section class="panel-section open">
                <button class="section-header" type="button"><span>Style</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="color-row">
                        <div class="color-swatch-group">
                            <input type="color" id="defaultGradientEndColor" value="#fffafa">
                            <label for="defaultGradientEndColor">Key</label>
                        </div>
                        <div class="color-swatch-group">
                            <input type="color" id="pressedGradientEndColor" value="#4d4d4d">
                            <label for="pressedGradientEndColor">Pressed</label>
                        </div>
                        <div class="color-swatch-group">
                            <input type="color" id="audioToggleColor" value="#ffffff">
                            <label for="audioToggleColor">Hub</label>
                        </div>
                        <div class="color-swatch-group">
                            <input type="color" id="keyLabelColor" value="#000000">
                            <label for="keyLabelColor">Text</label>
                        </div>
                        <div class="color-swatch-group">
                            <input type="color" id="noteMarkerColor" value="#61979e">
                            <label for="noteMarkerColor">Marker</label>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="keyFontFamily">Typeface</label>
                        <select id="keyFontFamily">
                            <option value="system-ui, -apple-system, sans-serif" selected>System</option>
                            <option value="'Helvetica Neue', Helvetica, Arial, sans-serif">Helvetica</option>
                            <option value="'SF Pro Display', -apple-system, sans-serif">SF Pro</option>
                            <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                            <option value="'Gill Sans', 'Gill Sans MT', sans-serif">Gill Sans</option>
                            <option value="'Futura', 'Century Gothic', sans-serif">Futura</option>
                            <option value="'Courier New', Courier, monospace">Courier</option>
                            <option value="'American Typewriter', 'Courier New', serif">Typewriter</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="keyFontWeight">Weight</label>
                        <select id="keyFontWeight">
                            <option value="300">Light</option>
                            <option value="400">Regular</option>
                            <option value="500">Medium</option>
                            <option value="600">Semi Bold</option>
                            <option value="700" selected>Bold</option>
                            <option value="800">Extra Bold</option>
                            <option value="900">Black</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- LAYOUT & GEOMETRY -->
            <section class="panel-section open">
                <button class="section-header" type="button"><span>Layout & Geometry</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="sliceCount">Number of Slices</label>
                        <div class="number-input">
                            <button class="stepper-btn" id="sliceDecBtn" aria-label="Decrease slices">−</button>
                            <input type="number" id="sliceCount" value="32" min="6" max="72" aria-label="Number of slices">
                            <button class="stepper-btn" id="sliceIncBtn" aria-label="Increase slices">+</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="radiusSlider">Radius <span class="range-value" id="radiusValue">155</span>%</label>
                        <input type="range" id="radiusSlider" min="20" max="200" value="155">
                    </div>
                    <div class="control-group">
                        <label for="rotationSlider">Rotation <span class="range-value" id="rotationValue">259</span>°</label>
                        <input type="range" id="rotationSlider" min="0" max="359" value="259">
                    </div>
                    <div class="control-group">
                        <label>Anchor Position</label>
                        <div class="anchor-grid">
                            <button class="anchor-btn" data-anchor="top-left" aria-label="Top left">&#8598;</button>
                            <button class="anchor-btn" data-anchor="top-center" aria-label="Top center">&#8593;</button>
                            <button class="anchor-btn" data-anchor="top-right" aria-label="Top right">&#8599;</button>
                            <button class="anchor-btn" data-anchor="center-left" aria-label="Center left">&#8592;</button>
                            <button class="anchor-btn" data-anchor="center" aria-label="Center">&#9679;</button>
                            <button class="anchor-btn" data-anchor="center-right" aria-label="Center right">&#8594;</button>
                            <button class="anchor-btn" data-anchor="bottom-left" aria-label="Bottom left">&#8601;</button>
                            <button class="anchor-btn" data-anchor="bottom-center" aria-label="Bottom center">&#8595;</button>
                            <button class="anchor-btn active" data-anchor="bottom-right" aria-label="Bottom right">&#8600;</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="gapSizeSlider">Gap Between Slices <span class="range-value" id="gapSizeValue">2</span>px</label>
                        <input type="range" id="gapSizeSlider" min="0" max="40" step="1" value="2">
                    </div>
                    <div class="control-group">
                        <label for="bgGraySlider">Background Gray <span class="range-value" id="bgGrayValue">20</span>%</label>
                        <input type="range" id="bgGraySlider" min="0" max="100" value="20">
                    </div>
                </div>
            </section>

            <!-- INNER CIRCLE -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Inner Circle</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="innerCircleSizeSlider">Inner Circle Size <span class="range-value" id="innerCircleSizeValue">170</span>pt</label>
                        <input type="range" id="innerCircleSizeSlider" min="20" max="500" step="5" value="170">
                    </div>
                    <div class="control-group">
                        <label for="grabberWidthSlider">Grabber Width <span class="range-value" id="grabberWidthValue">500</span>pt</label>
                        <input type="range" id="grabberWidthSlider" min="0" max="500" step="5" value="500">
                    </div>
                    <div class="control-group">
                        <label for="uiScaleSlider">UI Scale <span class="range-value" id="uiScaleValue">1.0</span>×</label>
                        <input type="range" id="uiScaleSlider" min="0.5" max="2.0" step="0.05" value="1.0">
                    </div>
                    <div class="control-group">
                        <label for="uiScaleMaxSlider">Max Scale <span class="range-value" id="uiScaleMaxValue">1.5</span>×</label>
                        <input type="range" id="uiScaleMaxSlider" min="0.5" max="3.0" step="0.05" value="1.5">
                    </div>
                </div>
            </section>

            <!-- KEY & AUDIO -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Key & Audio</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="audioToggleOpacitySlider">Button Opacity <span class="range-value" id="audioToggleOpacityValue">15</span>%</label>
                        <input type="range" id="audioToggleOpacitySlider" min="0" max="100" step="5" value="15">
                    </div>
                    <div class="control-group">
                        <label for="audioToggleSizeSlider">Button Size <span class="range-value" id="audioToggleSizeValue">100</span>pt</label>
                        <input type="range" id="audioToggleSizeSlider" min="10" max="300" step="5" value="100">
                    </div>
                    <div class="control-group">
                        <label for="keyLabelFontSizeSlider">Key Label Size <span class="range-value" id="keyLabelFontSizeValue">40</span>px</label>
                        <input type="range" id="keyLabelFontSizeSlider" min="8" max="60" step="1" value="40">
                    </div>
                    <div class="control-group">
                        <label for="keyLabelOpacitySlider">Key Label Opacity <span class="range-value" id="keyLabelOpacityValue">100</span>%</label>
                        <input type="range" id="keyLabelOpacitySlider" min="0" max="100" step="5" value="100">
                    </div>
                    <div class="control-group">
                        <label for="keyPickerSizeSlider">Picker Circle Radius <span class="range-value" id="keyPickerSizeValue">14</span>pt</label>
                        <input type="range" id="keyPickerSizeSlider" min="4" max="60" step="2" value="14">
                    </div>
                    <div class="control-group">
                        <label for="keyPickerSpreadSlider">Picker Spread <span class="range-value" id="keyPickerSpreadValue">145</span>pt</label>
                        <input type="range" id="keyPickerSpreadSlider" min="20" max="250" step="5" value="145">
                    </div>
                    <div class="control-group">
                        <label for="keyPickerFontSizeSlider">Picker Font Size <span class="range-value" id="keyPickerFontSizeValue">17</span>px</label>
                        <input type="range" id="keyPickerFontSizeSlider" min="6" max="36" step="1" value="17">
                    </div>
                    <div class="noise-subgroup" style="margin-top:8px">
                        <div style="font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Inactive</div>
                        <div class="control-group">
                            <label for="keyPickerCircleColor">Circle Color</label>
                            <input type="color" id="keyPickerCircleColor" value="#404040">
                        </div>
                        <div class="control-group">
                            <label for="keyPickerCircleOpacitySlider">Circle Opacity <span class="range-value" id="keyPickerCircleOpacityValue">100</span>%</label>
                            <input type="range" id="keyPickerCircleOpacitySlider" min="0" max="100" step="5" value="100">
                        </div>
                        <div class="control-group">
                            <label for="keyPickerLabelColor">Label Color</label>
                            <input type="color" id="keyPickerLabelColor" value="#ffffff">
                        </div>
                        <div class="control-group">
                            <label for="keyPickerLabelOpacitySlider">Label Opacity <span class="range-value" id="keyPickerLabelOpacityValue">100</span>%</label>
                            <input type="range" id="keyPickerLabelOpacitySlider" min="0" max="100" step="5" value="100">
                        </div>
                    </div>
                    <div class="noise-subgroup" style="margin-top:8px">
                        <div style="font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Active / Selected</div>
                        <div class="control-group">
                            <label for="keyPickerActiveCircleColor">Circle Color</label>
                            <input type="color" id="keyPickerActiveCircleColor" value="#ffffff">
                        </div>
                        <div class="control-group">
                            <label for="keyPickerActiveCircleOpacitySlider">Circle Opacity <span class="range-value" id="keyPickerActiveCircleOpacityValue">100</span>%</label>
                            <input type="range" id="keyPickerActiveCircleOpacitySlider" min="0" max="100" step="5" value="100">
                        </div>
                        <div class="control-group">
                            <label for="keyPickerActiveLabelColor">Label Color</label>
                            <input type="color" id="keyPickerActiveLabelColor" value="#000000">
                        </div>
                        <div class="control-group">
                            <label for="keyPickerActiveLabelOpacitySlider">Label Opacity <span class="range-value" id="keyPickerActiveLabelOpacityValue">100</span>%</label>
                            <input type="range" id="keyPickerActiveLabelOpacitySlider" min="0" max="100" step="5" value="100">
                        </div>
                    </div>
                </div>
            </section>

            <!-- SLICE APPEARANCE -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Slice Appearance</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="sliceOpacitySlider">Slice Opacity <span class="range-value" id="sliceOpacityValue">100</span>%</label>
                        <input type="range" id="sliceOpacitySlider" min="0" max="100" step="5" value="100">
                    </div>
                    <div class="control-group">
                        <label for="defaultGradientAngleSlider">Gradient Angle <span class="range-value" id="defaultGradientAngleValue">51</span>°</label>
                        <input type="range" id="defaultGradientAngleSlider" min="-180" max="180" value="51">
                    </div>
                    <div class="control-group">
                        <label for="defaultGradientStartColor">Gradient Start Color</label>
                        <input type="color" id="defaultGradientStartColor" value="#000000">
                    </div>
                    <div class="control-group">
                        <label for="pressShrinkSlider">Press Shrink <span class="range-value" id="pressShrinkValue">3</span>%</label>
                        <input type="range" id="pressShrinkSlider" min="0" max="20" step="1" value="3">
                    </div>
                    <div class="control-group">
                        <label for="pressedGradientAngleSlider">Pressed Gradient Angle <span class="range-value" id="pressedGradientAngleValue">0</span>°</label>
                        <input type="range" id="pressedGradientAngleSlider" min="-180" max="180" value="0">
                    </div>
                    <div class="control-group">
                        <label for="pressedGradientStartColor">Pressed Start Color</label>
                        <input type="color" id="pressedGradientStartColor" value="#000000">
                    </div>
                    <div class="control-group">
                        <label for="pressBrightnessSlider">Press Brightness <span class="range-value" id="pressBrightnessValue">30</span>%</label>
                        <input type="range" id="pressBrightnessSlider" min="0" max="100" step="5" value="30">
                    </div>
                </div>
            </section>

            <!-- ROTATION RING -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Rotation Ring</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="gripRingColor">Ring Color</label>
                        <input type="color" id="gripRingColor" value="#000000">
                    </div>
                    <div class="control-group">
                        <label for="gripRingOpacitySlider">Ring Opacity <span class="range-value" id="gripRingOpacityValue">0</span>%</label>
                        <input type="range" id="gripRingOpacitySlider" min="0" max="100" step="5" value="0">
                    </div>
                    <div class="control-group">
                        <label for="gripRingBlendSelect">Ring Blend Mode</label>
                        <select id="gripRingBlendSelect">
                            <option value="normal">Normal</option>
                            <option value="multiply">Multiply</option>
                            <option value="screen">Screen</option>
                            <option value="overlay" selected>Overlay</option>
                            <option value="darken">Darken</option>
                            <option value="lighten">Lighten</option>
                            <option value="color-dodge">Color Dodge</option>
                            <option value="color-burn">Color Burn</option>
                        </select>
                    </div>
                    <div class="control-group toggle-row">
                        <label for="gripRingNoiseEnabledToggle">Noise</label>
                        <label class="switch">
                            <input type="checkbox" id="gripRingNoiseEnabledToggle">
                            <span class="slider-track"></span>
                        </label>
                    </div>
                    <div class="noise-subgroup disabled" id="noiseSubgroup">
                    <div class="control-group">
                        <label for="gripRingNoiseFrequencySlider">Noise Grain Size <span class="range-value" id="gripRingNoiseFrequencyValue">0.2</span></label>
                        <input type="range" id="gripRingNoiseFrequencySlider" min="0" max="10" step="0.1" value="0.2">
                    </div>
                    <div class="control-group">
                        <label for="gripRingNoiseOctavesSlider">Noise Detail <span class="range-value" id="gripRingNoiseOctavesValue">8</span></label>
                        <input type="range" id="gripRingNoiseOctavesSlider" min="1" max="8" step="1" value="8">
                    </div>
                    <div class="control-group">
                        <label for="gripRingNoiseTypeSelect">Noise Type</label>
                        <select id="gripRingNoiseTypeSelect">
                            <option value="fractalNoise">Fractal (Soft)</option>
                            <option value="turbulence">Turbulence (Sharp)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="gripRingNoiseColor">Noise Color</label>
                        <input type="color" id="gripRingNoiseColor" value="#ffffff">
                    </div>
                    <div class="control-group">
                        <label for="gripRingNoiseIntensitySlider">Noise Intensity <span class="range-value" id="gripRingNoiseIntensityValue">100</span>%</label>
                        <input type="range" id="gripRingNoiseIntensitySlider" min="0" max="100" step="5" value="100">
                    </div>
                    <div class="control-group">
                        <label for="gripRingNoiseBlendSelect">Noise Blend Mode</label>
                        <select id="gripRingNoiseBlendSelect">
                            <option value="normal">Normal</option>
                            <option value="multiply">Multiply</option>
                            <option value="screen">Screen</option>
                            <option value="overlay" selected>Overlay</option>
                            <option value="darken">Darken</option>
                            <option value="lighten">Lighten</option>
                        </select>
                    </div>
                    </div>
                    <div class="control-group">
                        <label for="gripThicknessSlider">Tick Thickness <span class="range-value" id="gripThicknessValue">2</span>px</label>
                        <input type="range" id="gripThicknessSlider" min="0.5" max="4" step="0.5" value="2">
                    </div>
                    <div class="control-group">
                        <label for="gripOpacitySlider">Tick Opacity <span class="range-value" id="gripOpacityValue">10</span>%</label>
                        <input type="range" id="gripOpacitySlider" min="0" max="100" step="5" value="10">
                    </div>
                    <div class="control-group">
                        <label for="ticksPerEdgeSlider">Ticks Per Slice <span class="range-value" id="ticksPerEdgeValue">4</span></label>
                        <input type="range" id="ticksPerEdgeSlider" min="0" max="20" step="1" value="4">
                    </div>
                    <div class="control-group">
                        <label for="gripInsetSlider">Tick Inset <span class="range-value" id="gripInsetValue">10</span>%</label>
                        <input type="range" id="gripInsetSlider" min="0" max="50" step="5" value="10">
                    </div>
                </div>
            </section>

            <!-- NOTE MARKERS -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Note Markers</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="noteMarkerSizeSlider">Marker Size <span class="range-value" id="noteMarkerSizeValue">6</span>px</label>
                        <input type="range" id="noteMarkerSizeSlider" min="2" max="20" value="6">
                    </div>
                    <div class="control-group">
                        <label for="noteMarkerOpacitySlider">Marker Opacity <span class="range-value" id="noteMarkerOpacityValue">100</span>%</label>
                        <input type="range" id="noteMarkerOpacitySlider" min="0" max="100" step="5" value="100">
                    </div>
                    <div class="control-group">
                        <label for="noteMarkerPositionSlider">Marker Position <span class="range-value" id="noteMarkerPositionValue">195</span>pt</label>
                        <input type="range" id="noteMarkerPositionSlider" min="10" max="500" step="5" value="195">
                    </div>
                </div>
            </section>

            <!-- ANIMATION & INTERACTION -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Animation & Interaction</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="control-group">
                        <label for="droneLockTimeSlider">Drone Lock Time <span class="range-value" id="droneLockTimeValue">3000</span>ms</label>
                        <input type="range" id="droneLockTimeSlider" min="1000" max="8000" step="500" value="3000">
                    </div>
                    <div class="control-group">
                        <label for="ringThicknessBoostSlider">Ring Thickness on Grab <span class="range-value" id="ringThicknessBoostValue">0.98</span>x</label>
                        <input type="range" id="ringThicknessBoostSlider" min="0.3" max="2.0" step="0.01" value="0.98">
                    </div>
                    <div class="control-group">
                        <label for="notchGrowthFactorSlider">Tick Scale on Grab <span class="range-value" id="notchGrowthFactorValue">1.2</span>x</label>
                        <input type="range" id="notchGrowthFactorSlider" min="1.0" max="2.0" step="0.1" value="1.2">
                    </div>
                    <div class="control-group">
                        <label for="notchBrightnessBoostSlider">Tick Brightness on Grab <span class="range-value" id="notchBrightnessBoostValue">1.5</span>x</label>
                        <input type="range" id="notchBrightnessBoostSlider" min="1.0" max="3.0" step="0.1" value="1.5">
                    </div>
                    <div class="control-group">
                        <label for="notchActivationSpeedSlider">Grab Animation Speed <span class="range-value" id="notchActivationSpeedValue">200</span>ms</label>
                        <input type="range" id="notchActivationSpeedSlider" min="50" max="1000" step="50" value="200">
                    </div>
                    <div class="control-group">
                        <label for="notchDeactivationSpeedSlider">Release Animation Speed <span class="range-value" id="notchDeactivationSpeedValue">300</span>ms</label>
                        <input type="range" id="notchDeactivationSpeedSlider" min="50" max="1000" step="50" value="300">
                    </div>
                </div>
            </section>

            <!-- PRESETS -->
            <section class="panel-section">
                <button class="section-header" type="button"><span>Presets</span><span class="chevron">▾</span></button>
                <div class="section-body">
                    <div class="preset-save-row">
                        <input type="text" id="presetNameInput" placeholder="Preset name..." aria-label="Preset name">
                        <button id="savePresetBtn" class="preset-save-btn">Save</button>
                    </div>
                    <div id="presetList" class="preset-list"></div>
                    <div class="import-block">
                        <label>Import Preset</label>
                        <input type="file" id="importFileInput" accept=".json" aria-label="Select preset file">
                    </div>
                </div>
            </section>

            <div class="reset-block">
                <button id="resetSettingsBtn" class="reset-btn">↺ Reset to Factory Defaults</button>
            </div>
        </div>
        <button class="side-panel-tab" id="toggleBtn" aria-label="Open controls">⚙</button>
    </div>

    <div class="main-content">
        <svg class="radial-piano" id="pianoSvg" role="application" aria-label="Radial piano interface"></svg>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="script.js"></script>
</body>
</html>
