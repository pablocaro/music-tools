<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Practice Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #141414;
      --disc: #171717;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      min-height: 100dvh;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      margin-inline: 0;
      padding: clamp(48px, 9vh, 88px) clamp(28px, 8vw, 56px) 48px;
      padding-top: max(clamp(48px, 9vh, 88px), env(safe-area-inset-top));
      display: flex;
      flex-direction: column;
    }

    /* Maracas disc */
    .badge {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--disc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      line-height: 1;
    }

    h1 {
      margin-top: 40px;
      font-size: clamp(26px, 8vw, 34.819px);
      font-weight: 500;
      line-height: normal;
      text-transform: uppercase;
    }

    nav {
      margin-top: 34px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .tool {
      font-size: clamp(26px, 8vw, 34.819px);
      font-weight: 500;
      line-height: normal;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .tool:hover,
    .tool:focus-visible { opacity: 0.5; }
    .tool:active { transform: translateX(2px); }

    /* Terminal cursor pinned to the bottom (static) */
    .cursor {
      margin-top: auto;
      padding-top: 72px;
      font-size: 34.819px;
      font-weight: 500;
      line-height: 1;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="badge" role="img" aria-label="Musical instrument">🪇</div>
    <h1>Practice Tools</h1>
    <nav>
      <a class="tool" href="piano-experimental/index.html">Roto_Piano_</a>
      <a class="tool" href="pitch-trainer/index.html">Pitch_Uke_</a>
      <a class="tool" href="sight-reading/index.html">Sight_Read_</a>
    </nav>
    <div class="cursor" aria-hidden="true">_</div>
  </main>
  <script>
    // Pick a random music emoji on each load
    (function () {
      var emojis = ['🪗', '🎹', '🎻', '🎺', '🥁', '🪕', '🪇'];
      document.querySelector('.badge').textContent =
        emojis[Math.floor(Math.random() * emojis.length)];
    })();
  </script>
</body>
</html>
