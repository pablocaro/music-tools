<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sight Reading — Seeing Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-head">
        <h1>Settings</h1>
        <button id="panel-close" type="button" aria-label="Close settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- SETUPS: presets that snapshot the whole panel -->
      <details class="group" data-group="setups" open>
        <summary>Setups</summary>
        <div class="group-body">
          <div class="presets" id="presets"></div>
        </div>
      </details>

      <!-- NOTES: the alphabet matrix + range grid -->
      <details class="group" data-group="notes" open>
        <summary>Notes</summary>
        <div class="group-body">
          <div class="matrix-head">
            <span></span>
            <span>up</span>
            <span>down</span>
          </div>
          <div class="matrix" id="matrix"></div>
          <div id="range-grid"></div>
          <section>
            <label for="musicality">Musicality <span id="musicality-val">0</span></label>
            <input type="range" id="musicality" min="0" max="100" step="5" value="0">
          </section>
        </div>
      </details>

      <!-- RHYTHM: the beat patterns -->
      <details class="group" data-group="rhythm" open>
        <summary>Rhythm</summary>
        <div class="group-body">
          <div class="beats" id="beats"></div>
        </div>
      </details>

      <!-- KEY & LENGTH -->
      <details class="group" data-group="key" open>
        <summary>Key &amp; length</summary>
        <div class="group-body">
          <section>
            <label>Key</label>
            <div class="key-row">
              <select id="key-tonic">
                <option value="0-0" selected>C</option>
                <option value="4-0">G</option>
                <option value="1-0">D</option>
                <option value="5-0">A</option>
                <option value="2-0">E</option>
                <option value="6-0">B</option>
                <option value="3-0">F</option>
                <option value="6-b">B&#9837;</option>
                <option value="2-b">E&#9837;</option>
                <option value="5-b">A&#9837;</option>
              </select>
              <select id="key-mode">
                <option value="major" selected>Major</option>
                <option value="minor">Minor</option>
                <option value="harmonic">Harmonic min</option>
                <option value="melodic">Melodic min</option>
              </select>
            </div>
          </section>

          <section>
            <label for="measures">Measures</label>
            <select id="measures">
              <option value="8">8</option>
              <option value="12">12</option>
              <option value="16" selected>16</option>
              <option value="24">24</option>
              <option value="32">32</option>
              <option value="48">48</option>
            </select>
          </section>
        </div>
      </details>

      <!-- PLAYBACK: the moving clock -->
      <details class="group" data-group="playback" open>
        <summary>Playback</summary>
        <div class="group-body">
          <section>
            <label for="tempo">Tempo <span id="tempo-val">80</span></label>
            <input type="range" id="tempo" min="40" max="160" step="1" value="80">
          </section>

          <section class="toggle-row">
            <label for="click-on">Metronome</label>
            <input type="checkbox" id="click-on" checked>
          </section>

          <section class="toggle-row">
            <label for="play-along">Play along</label>
            <input type="checkbox" id="play-along">
          </section>

          <section>
            <label for="instrument">Voice</label>
            <select id="instrument">
              <option value="organ">Organ</option>
              <option value="piano" selected>Piano</option>
              <option value="marimba">Marimba</option>
              <option value="vibraphone">Vibraphone</option>
              <option value="synth">Synth</option>
            </select>
          </section>

          <section>
            <label for="volume">Volume <span id="volume-val">80</span></label>
            <input type="range" id="volume" min="0" max="100" step="5" value="80">
          </section>

          <section>
            <label for="cursor-mode">Cursor</label>
            <select id="cursor-mode">
              <option value="beat" selected>Beat</option>
              <option value="measure">Measure</option>
              <option value="off">Off</option>
            </select>
          </section>

          <section class="toggle-row">
            <label for="hide-behind">Hide behind</label>
            <input type="checkbox" id="hide-behind">
          </section>

          <section>
            <label for="hide-lead">Hide lead <span id="hide-lead-val">0</span></label>
            <input type="range" id="hide-lead" min="0" max="8" step="1" value="0">
          </section>

          <section class="toggle-row">
            <label for="show-chunks">Show chunks</label>
            <input type="checkbox" id="show-chunks">
          </section>
        </div>
      </details>

      <div class="legend">
        <span class="legend-item"><span class="swatch swatch-scale"></span> stepwise</span>
        <span class="legend-item"><span class="swatch swatch-chord"></span> leaps</span>
      </div>

      <p id="error-msg" class="error" hidden></p>
    </aside>

    <!-- The music and the control tray share one region, so the tray tracks the
         music whether it's centered (drawer closed/overlaid) or pushed (drawer
         reserving space on a wide window). -->
    <div class="content">
    <main class="sheet-area">
      <div id="sheet-top">
        <div id="sheet-head">
          <div id="sh-title"></div>
          <div id="sh-sub"></div>
          <div id="sh-notes"></div>
        </div>
        <div id="tempo-pill">
          <button id="metro-toggle" type="button" aria-label="Metronome on/off">
            <span id="tempo-pill-val">&#9833; 80</span>
          </button>
          <button id="tempo-down" class="tp-btn" aria-label="Slower">&#8722;</button>
          <button id="tempo-up" class="tp-btn" aria-label="Faster">+</button>
        </div>
      </div>
      <div id="sheet-stage">
        <div id="sheet"></div>
      </div>
      <div id="cover-top"></div>
      <div id="cover-bot"></div>
      <div id="countdown" hidden></div>
    </main>

    <div class="controlbar">
    <button id="settings-toggle" class="cb-icon" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="7" y1="3" x2="7" y2="21"/><line x1="17" y1="3" x2="17" y2="21"/>
        <circle cx="7" cy="9" r="2.6" fill="var(--paper-dim)"/><circle cx="17" cy="15" r="2.6" fill="var(--paper-dim)"/>
      </svg>
    </button>
    <button id="play" aria-label="Play">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>
    </button>
    <button id="generate" class="cb-icon" aria-label="New line">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
    </button>
    </div>
    </div>

  </div>

  <script src="lib/osme.js"></script>
  <script src="engine.js"></script>
  <script src="samples/instruments.js"></script>
  <script src="app.js"></script>
</body>
</html>
