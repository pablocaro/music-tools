<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Strings Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Courier New', Courier, monospace;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
  </style>
</head>
<body>
<div id="stage">
  <svg id="svg"></svg>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const X_RATIOS   = [0.33, 0.67];
const LABELS     = ['REFERENCE', 'COMPARE'];

const NUM_GHOSTS = 12;
const STRING_W   = 10;
const GHOST_W    = 3.5;
const MIN_PLUCK  = 8;

// Vibration (BLUR model — chosen in vibration-compare.html)
const VIB_DECAY    = 2.34;   // sustain: how long it rings (was SUSTAIN 54)
const BLUR_STRENGTH = 3.42;  // max horizontal motion blur px (was BLUR 19)

const PIN_R      = 20;
const PILL_W     = 19;
const PILL_D     = 28;
const PIN_MARGIN = 12;

const SVGNS = 'http://www.w3.org/2000/svg';

// ── State ─────────────────────────────────────────────────────
let W = 0, H = 0;
const cx  = [0, 0];          // drag: bend offset · vibrating: envelope half-width
const vib = [false, false];

let rafId = null;
const drag = { active: false, idx: -1 };

let mainPath = [], ghostEls = [[], []], blurDev = [], grpEls = [], labelEls = [];

// ── Geometry ──────────────────────────────────────────────────
function pinTopY() { return PIN_R + PIN_MARGIN; }
function pinBotY() { return H - PIN_R - PIN_MARGIN; }
// String ends at the center of each notch's rounded cap, so the string's
// round cap is concentric with the pill arc → even gap all around.
function strTopY() { return pinTopY() + PIN_R - PILL_D + PILL_W / 2; }
function strBotY() { return pinBotY() - PIN_R + PILL_D - PILL_W / 2; }

function stringD(i, offset) {
  const x   = W * X_RATIOS[i];
  const top = strTopY();
  const bot = strBotY();
  const mid = (top + bot) / 2;
  return `M ${x} ${top} Q ${x + offset} ${mid} ${x} ${bot}`;
}

function ghostD(i, k) {
  const frac = NUM_GHOSTS > 1 ? (k / (NUM_GHOSTS - 1)) * 2 - 1 : 0;
  return stringD(i, cx[i] * frac);
}

function ghostOpacity(k, env) {
  const frac = NUM_GHOSTS > 1 ? k / (NUM_GHOSTS - 1) : 0.5;
  const edge = Math.abs(frac * 2 - 1);
  return (0.12 + edge * 0.30) * Math.min(env * 2, 1);
}

// ── SVG build ─────────────────────────────────────────────────
function buildSVG() {
  const svg  = document.getElementById('svg');
  const rect = document.getElementById('stage').getBoundingClientRect();
  W = rect.width;
  H = rect.height;

  let defs = '<defs>';
  const topY = pinTopY(), botY = pinBotY();
  for (let i = 0; i < 2; i++) {
    const x    = W * X_RATIOS[i];
    const px   = x - PILL_W / 2;
    const rxv  = PILL_W / 2;
    defs += `
      <filter id="fblur-${i}" x="-60%" y="-10%" width="220%" height="120%">
        <feGaussianBlur id="fdev-${i}" stdDeviation="0 0"/>
      </filter>
      <mask id="mask-top-${i}">
        <circle cx="${x}" cy="${topY}" r="${PIN_R}" fill="white"/>
        <rect x="${px}" y="${topY + PIN_R - PILL_D}" width="${PILL_W}" height="${PILL_D + PIN_R}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>
      <mask id="mask-bot-${i}">
        <circle cx="${x}" cy="${botY}" r="${PIN_R}" fill="white"/>
        <rect x="${px}" y="${botY - PIN_R - PIN_R}" width="${PILL_W}" height="${PILL_D + PIN_R}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>`;
  }
  defs += '</defs>';
  svg.innerHTML = defs;

  mainPath = []; ghostEls = [[], []]; blurDev = []; grpEls = []; labelEls = [];

  for (let i = 0; i < 2; i++) {
    const x = W * X_RATIOS[i];

    const label = document.createElementNS(SVGNS, 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', topY - PIN_R - 8);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#000');
    label.setAttribute('font-family', 'Courier New, monospace');
    label.setAttribute('font-size', '9');
    label.setAttribute('letter-spacing', '2');
    label.setAttribute('opacity', 0.45);
    label.textContent = LABELS[i];
    svg.appendChild(label);
    labelEls.push(label);

    // blurred group: ghosts + main share one horizontal motion-blur filter
    const grp = document.createElementNS(SVGNS, 'g');
    svg.appendChild(grp);
    grpEls.push(grp);
    blurDev.push(document.getElementById(`fdev-${i}`));

    for (let k = 0; k < NUM_GHOSTS; k++) {
      const g = document.createElementNS(SVGNS, 'path');
      g.setAttribute('stroke', '#000');
      g.setAttribute('stroke-width', GHOST_W);
      g.setAttribute('fill', 'none');
      g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('opacity', '0');
      grp.appendChild(g);
      ghostEls[i].push(g);
    }

    // main string — outside the blur group so width stays constant;
    // sits between the blur group and the pins in draw order.
    const path = document.createElementNS(SVGNS, 'path');
    path.setAttribute('d', stringD(i, 0));
    path.setAttribute('stroke', '#000');
    path.setAttribute('stroke-width', STRING_W);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('opacity', 1);
    svg.appendChild(path);
    mainPath.push(path);

    const pinTop = document.createElementNS(SVGNS, 'circle');
    pinTop.setAttribute('cx', x); pinTop.setAttribute('cy', topY);
    pinTop.setAttribute('r', PIN_R); pinTop.setAttribute('fill', '#000');
    pinTop.setAttribute('mask', `url(#mask-top-${i})`);
    svg.appendChild(pinTop);

    const pinBot = document.createElementNS(SVGNS, 'circle');
    pinBot.setAttribute('cx', x); pinBot.setAttribute('cy', botY);
    pinBot.setAttribute('r', PIN_R); pinBot.setAttribute('fill', '#000');
    pinBot.setAttribute('mask', `url(#mask-bot-${i})`);
    svg.appendChild(pinBot);
  }

  redraw(0); redraw(1);
}

// ── Redraw ────────────────────────────────────────────────────
function redraw(i) {
  if (!mainPath[i]) return;

  if (vib[i]) {
    // BLUR model: string centered, symmetric blurred fan of half-width cx[i]
    grpEls[i].setAttribute('filter', `url(#fblur-${i})`);
    mainPath[i].setAttribute('d', stringD(i, 0));
    const env = Math.min(cx[i] / 90, 1);
    for (let k = 0; k < NUM_GHOSTS; k++) {
      ghostEls[i][k].setAttribute('d', ghostD(i, k));
      ghostEls[i][k].setAttribute('opacity', ghostOpacity(k, env).toFixed(3));
    }
    blurDev[i].setAttribute('stdDeviation', (BLUR_STRENGTH * env).toFixed(2) + ' 0');
  } else {
    // dragging / rest: crisp bent-or-straight string, no fan, no blur.
    // Filter OFF — a vertical line has a zero-width bbox and an
    // object-bounding-box filter would erase it.
    grpEls[i].setAttribute('filter', 'none');
    mainPath[i].setAttribute('d', stringD(i, cx[i]));
    for (let k = 0; k < NUM_GHOSTS; k++) ghostEls[i][k].setAttribute('opacity', '0');
  }
}

// ── Interaction ───────────────────────────────────────────────
function startDrag(clientX) {
  if (!W) return;
  const dists = X_RATIOS.map(r => Math.abs(clientX - W * r));
  const idx   = dists[0] < dists[1] ? 0 : 1;
  if (Math.min(...dists) > 60 || vib[idx]) return;
  drag.active = true;
  drag.idx    = idx;
}

function moveDrag(clientX) {
  if (!drag.active) return;
  const x0 = W * X_RATIOS[drag.idx];
  cx[drag.idx] = Math.max(-90, Math.min(90, (clientX - x0) * 1.3));
  redraw(drag.idx);
}

function endDrag() {
  if (!drag.active) return;
  const idx   = drag.idx;
  drag.active = false;
  drag.idx    = -1;
  if (Math.abs(cx[idx]) < MIN_PLUCK) { cx[idx] = 0; redraw(idx); return; }
  pluck(idx, Math.abs(cx[idx]));
}

// ── Pluck animation (BLUR model) ──────────────────────────────
// Envelope blooms to the pluck amplitude then decays; the string stays
// centered and the blurred fan collapses back to a crisp line.
function pluck(idx, amp0) {
  vib[idx] = true;
  const t0 = performance.now();
  function tick() {
    const t   = (performance.now() - t0) / 1000;
    const env = Math.exp(-VIB_DECAY * t);
    cx[idx]   = amp0 * env;
    redraw(idx);
    if (env > 0.004) {
      rafId = requestAnimationFrame(tick);
    } else {
      cx[idx]  = 0;
      vib[idx] = false;
      redraw(idx);
    }
  }
  rafId = requestAnimationFrame(tick);
}

// ── Listeners ─────────────────────────────────────────────────
const stage = document.getElementById('stage');
stage.addEventListener('mousedown',  e => startDrag(e.clientX));
stage.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX); }, { passive: false });
window.addEventListener('mousemove',  e => moveDrag(e.clientX));
window.addEventListener('mouseup',    endDrag);
window.addEventListener('touchmove',  e => { e.preventDefault(); moveDrag(e.touches[0].clientX); }, { passive: false });
window.addEventListener('touchend',   endDrag);
window.addEventListener('resize',     buildSVG);

buildSVG();
</script>
</body>
</html>
