<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pitch Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100vw; height: 100dvh; overflow: hidden;
      background: #444444; color: #ebebeb;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none; user-select: none; -webkit-user-select: none;
      display: flex; flex-direction: column;
    }

    /* ── Header ────────────────────────────── */
    #header {
      flex-shrink: 0; height: 58px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #threshold { font-size: 22px; letter-spacing: 0.5px; opacity: .85; }
    #threshold .unit { font-size: 13px; opacity: .45; margin-left: 1px; }
    #best { font-size: 10px; letter-spacing: 2px; opacity: .3; margin-top: 3px; }
    #header-right { display: flex; align-items: center; gap: 12px; }
    #history { display: flex; gap: 6px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(235,235,235,.14); transition: background .3s; }
    .dot.ok  { background: rgba(235,235,235,.75); }
    .dot.err { background: rgba(255,100,100,.65); }
    #gear {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(235,235,235,.2); background: rgba(235,235,235,.06);
      color: rgba(235,235,235,.5); font: 8px 'Courier New', monospace;
      letter-spacing: 1px; cursor: pointer; flex-shrink: 0;
    }
    #gear:active { background: rgba(235,235,235,.15); }

    /* ── Stage ──────────────────────────────── */
    #stage { flex: 1; position: relative; overflow: hidden; }
    #svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

    /* ── Answer buttons ─────────────────────── */
    #answers { flex-shrink: 0; display: flex; }

    :root {
      --btn-ready:        rgba(235,235,235, .80);
      --btn-dim:          rgba(235,235,235, .18);
      --btn-border-ready: rgba(235,235,235, .55);
      --btn-border-dim:   rgba(235,235,235, .10);
    }
    .abtn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--btn-border-dim);
      color: var(--btn-dim);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .15s;
      pointer-events: none;
    }
    .abtn.ready {
      border-color: var(--btn-border-ready);
      color: var(--btn-ready);
      pointer-events: all;
    }
    .abtn.ready:active { background: rgba(235,235,235,.07); }
    .abtn.reveal-correct {
      border-color: rgba(120,220,120,.55); color: rgba(160,255,160,.9);
      pointer-events: none;
    }
    .abtn.reveal-wrong {
      border-color: rgba(255,80,80,.45); color: rgba(255,150,150,.8);
      pointer-events: none;
    }

    /* ── Overlay (tap-outside-to-close) ─────── */
    #overlay {
      position: fixed; inset: 0; z-index: 24;
      background: rgba(0,0,0,0); pointer-events: none;
      transition: background .22s;
    }
    #overlay.on { pointer-events: all; background: rgba(0,0,0,.25); }

    /* ── Settings panel ─────────────────────── */
    #panel {
      position: fixed; top: 0; right: 0;
      width: min(270px, 84vw); height: 100%;
      background: rgba(36,36,34,.98); color: #ebebeb;
      border-left: 1px solid rgba(235,235,235,.08);
      box-shadow: -10px 0 30px rgba(0,0,0,.35);
      transform: translateX(100%); transition: transform .22s ease;
      z-index: 25; font-size: 10px; letter-spacing: 1.5px;
      display: flex; flex-direction: column;
    }
    #panel.open { transform: translateX(0); }

    #panel-head {
      flex-shrink: 0; padding: 18px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(235,235,235,.07);
    }
    #panel-head h2 { font-size: 10px; letter-spacing: 3px; opacity: .35; font-weight: normal; }
    #pClose {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(235,235,235,.18); background: rgba(235,235,235,.05);
      color: rgba(235,235,235,.5); font-size: 13px; cursor: pointer;
    }
    #pClose:active { background: rgba(235,235,235,.15); }

    #panel-scroll { flex: 1; overflow-y: auto; padding: 6px 18px 24px; }

    /* Collapsible sections */
    .psec-hdr {
      font-size: 9px; letter-spacing: 3px; opacity: .32; cursor: pointer;
      padding: 14px 0 10px;
      border-top: 1px solid rgba(235,235,235,.07);
      display: flex; align-items: center; gap: 7px;
      user-select: none; -webkit-user-select: none;
    }
    .psec-hdr:first-child { border-top: none; padding-top: 10px; }
    .psec-hdr:hover { opacity: .5; }
    .psec-arrow { font-size: 8px; opacity: .6; transition: transform .15s; }
    .psec-body { overflow: hidden; max-height: 1200px; transition: max-height .25s ease; }
    .psec-body.collapsed { max-height: 0; }

    .prow { margin-bottom: 18px; }
    .prow label { display: flex; justify-content: space-between; margin-bottom: 8px; opacity: .48; }
    .prow .v { opacity: .6; }
    .prow input[type="range"] { width: 100%; accent-color: #999; }
    .prow input[type="color"] {
      width: 100%; height: 26px; padding: 2px;
      border: 1px solid rgba(235,235,235,.12); background: none; cursor: pointer;
    }
    .prow button, #panel button {
      font: 10px 'Courier New', monospace; letter-spacing: 1.5px;
      border: 1px solid rgba(235,235,235,.16); background: rgba(235,235,235,.04);
      color: rgba(235,235,235,.55); padding: 7px 10px; cursor: pointer; width: 100%;
    }
    .prow button:active, #panel button:active { background: rgba(235,235,235,.12); }
    #panel textarea {
      width: 100%; font: 10px 'Courier New', monospace;
      background: rgba(235,235,235,.03); color: rgba(235,235,235,.55);
      border: 1px solid rgba(235,235,235,.1); padding: 8px;
      resize: none; line-height: 1.5; margin-top: 10px;
    }
    .pbtn-row { display: flex; gap: 8px; margin-top: 8px; }
    .pbtn-row button { flex: 1; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <div id="threshold">—<span class="unit">¢</span></div>
    <div id="best"></div>
  </div>
  <div id="header-right">
    <div id="history"></div>
    <button id="gear">SET</button>
  </div>
</div>

<div id="stage"><svg id="svg"></svg></div>

<div id="answers">
  <button class="abtn" data-ans="flat">↓ flat</button>
  <button class="abtn" data-ans="in_tune">≈ in tune</button>
  <button class="abtn" data-ans="sharp">↑ sharp</button>
</div>

<div id="overlay"></div>

<div id="panel">
  <div id="panel-head">
    <h2>VISUAL SETTINGS</h2>
    <button id="pClose">✕</button>
  </div>
  <div id="panel-scroll">

    <!-- APPEARANCE -->
    <div class="psec-hdr" onclick="toggleSec('appearance')">
      <span class="psec-arrow" id="arr-appearance">▾</span>APPEARANCE
    </div>
    <div class="psec-body" id="sec-appearance">
      <div class="prow"><label>BACKGROUND</label>
        <input type="color" id="pBg" autocomplete="off"></div>
      <div class="prow"><label>STRING COLOR</label>
        <input type="color" id="pStrCol" autocomplete="off"></div>
      <div class="prow"><label>HOLE COLOR</label>
        <input type="color" id="pHoleCol" autocomplete="off"></div>
      <div class="prow"><label>THICKNESS <span class="v" id="pStrWV"></span></label>
        <input type="range" id="pStrW" min="2" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>PIN SIZE <span class="v" id="pPinRV"></span></label>
        <input type="range" id="pPinR" min="8" max="28" step="1" autocomplete="off"></div>
      <div class="prow"><label>STRING LENGTH <span class="v" id="pLenV"></span></label>
        <input type="range" id="pLen" min="30" max="100" step="1" autocomplete="off"></div>
      <div class="prow"><label>SPACING <span class="v" id="pSpacingV"></span></label>
        <input type="range" id="pSpacing" min="0" max="200" step="1" autocomplete="off"></div>
    </div>

    <!-- BODY -->
    <div class="psec-hdr" onclick="toggleSec('body')">
      <span class="psec-arrow" id="arr-body">▾</span>BODY
    </div>
    <div class="psec-body" id="sec-body">
      <div class="prow"><label>COLOR</label>
        <input type="color" id="pBodyCol" autocomplete="off"></div>
      <div class="prow"><label>RADIUS <span class="v" id="pBodyRV"></span></label>
        <input type="range" id="pBodyR" min="0" max="220" step="5" autocomplete="off"></div>
    </div>

    <!-- VIBRATION -->
    <div class="psec-hdr" onclick="toggleSec('vib')">
      <span class="psec-arrow" id="arr-vib">▾</span>VIBRATION
    </div>
    <div class="psec-body" id="sec-vib">
      <div class="prow"><label>BOW <span class="v" id="pBowV"></span></label>
        <input type="range" id="pBow" min="20" max="150" step="5" autocomplete="off"></div>
      <div class="prow"><label>BLUR <span class="v" id="pVibBlurV"></span></label>
        <input type="range" id="pVibBlur" min="0" max="10" step="1" autocomplete="off"></div>
      <div class="prow"><label>SUSTAIN <span class="v" id="pSustainV"></span></label>
        <input type="range" id="pSustain" min="1" max="100" step="1" autocomplete="off"></div>
    </div>

    <!-- SHADOW -->
    <div class="psec-hdr" onclick="toggleSec('shadow')">
      <span class="psec-arrow" id="arr-shadow">▾</span>SHADOW
    </div>
    <div class="psec-body" id="sec-shadow">
      <div class="prow"><label>COLOR</label>
        <input type="color" id="pShadCol" autocomplete="off"></div>
      <div class="prow"><label>OPACITY <span class="v" id="pShadOpV"></span></label>
        <input type="range" id="pShadOp" min="0" max="100" step="1" autocomplete="off"></div>
      <div class="prow"><label>BLUR <span class="v" id="pShadBlurV"></span></label>
        <input type="range" id="pShadBlur" min="0" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>OFFSET X <span class="v" id="pShadDxV"></span></label>
        <input type="range" id="pShadDx" min="-20" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>OFFSET Y <span class="v" id="pShadDyV"></span></label>
        <input type="range" id="pShadDy" min="-20" max="20" step="1" autocomplete="off"></div>
    </div>

    <!-- BUTTONS -->
    <div class="psec-hdr" onclick="toggleSec('btns')">
      <span class="psec-arrow" id="arr-btns">▾</span>BUTTONS
    </div>
    <div class="psec-body" id="sec-btns">
      <div class="prow"><label>COLOR</label>
        <input type="color" id="pBtnColor" autocomplete="off"></div>
      <div class="prow"><label>FONT SIZE <span class="v" id="pBtnFontV"></span></label>
        <input type="range" id="pBtnFont" min="8" max="18" step="1" autocomplete="off"></div>
      <div class="prow"><label>TRACKING <span class="v" id="pBtnTrackV"></span></label>
        <input type="range" id="pBtnTrack" min="0" max="60" step="2" autocomplete="off"></div>
      <div class="prow"><label>PADDING <span class="v" id="pBtnPadV"></span></label>
        <input type="range" id="pBtnPad" min="8" max="36" step="1" autocomplete="off"></div>
      <div class="prow"><label>CORNER RADIUS <span class="v" id="pBtnRadV"></span></label>
        <input type="range" id="pBtnRad" min="0" max="30" step="1" autocomplete="off"></div>
      <div class="prow"><label>BORDER <span class="v" id="pBtnBorderV"></span></label>
        <input type="range" id="pBtnBorder" min="0" max="4" step="1" autocomplete="off"></div>
      <div class="prow"><label>GAP <span class="v" id="pBtnGapV"></span></label>
        <input type="range" id="pBtnGap" min="0" max="16" step="1" autocomplete="off"></div>
      <div class="prow"><label>AREA PADDING <span class="v" id="pBtnAreaPadV"></span></label>
        <input type="range" id="pBtnAreaPad" min="0" max="20" step="1" autocomplete="off"></div>
    </div>

    <!-- PRESET -->
    <div class="psec-hdr" onclick="toggleSec('preset')">
      <span class="psec-arrow" id="arr-preset">▾</span>PRESET
    </div>
    <div class="psec-body" id="sec-preset">
      <div class="prow">
        <button id="pSave">SET AS DEFAULT</button>
      </div>
      <div class="prow">
        <label>EXPORT / IMPORT</label>
        <textarea id="pJson" rows="4" spellcheck="false" autocomplete="off"></textarea>
        <div class="pbtn-row">
          <button id="pCopy">COPY</button>
          <button id="pApply">APPLY</button>
        </div>
      </div>
    </div>

  </div><!-- /panel-scroll -->
</div><!-- /panel -->

<script>
// ─────────────────────────────────────────────────────────────
// Visual settings
// ─────────────────────────────────────────────────────────────
const NUM_STRINGS = 2;
const NUM_GHOSTS  = 12;
const MIN_PLUCK   = 8;
const TAP_FRAC    = 0.44;
const SVGNS       = 'http://www.w3.org/2000/svg';

// SVG / visual
let bg           = '#444444';
let strCol       = '#ebebeb';
let holeCol      = '#232323';
let strW         = 6;
let pinR         = 13;
let stringLen    = 0.69;
let spacing      = 85;
let bodyColor    = '#232323';
let bodyRadius   = 100;
let bowAmount    = 90;
let vibBlurAmt   = 3;
let vibSustain   = 64;
let shadowCol    = '#000000';
let shadowOp     = 17;
let shadowBlur   = 2;
let shadowDx     = 5;
let shadowDy     = -3;

// Button appearance
let btnColor     = '#ebebeb';
let btnFontSize  = 11;      // px
let btnTracking  = 12;      // hundredths of em  (12 → 0.12em)
let btnPadV      = 18;      // vertical padding px
let btnRadius    = 0;       // border-radius px
let btnBorderW   = 1;       // border width px
let btnGap       = 1;       // gap between buttons px
let btnAreaPad   = 0;       // padding around button row px

const pillW        = () => pinR * 0.95;
const pillD        = () => pinR * 1.4;
const pinMargin    = () => pinR * 0.6;
const ghostW       = () => Math.max(1.5, strW * 0.35);
const lengthMargin = () => (H * (1 - stringLen)) / 2;
const vibDecay     = () => 0.3 + 5.7 * (1 - vibSustain / 100);

// ─────────────────────────────────────────────────────────────
// SVG state
// ─────────────────────────────────────────────────────────────
let W = 0, H = 0;
const cx  = [0, 0];
const vib = [false, false];
let mainPath = [], ghostEls = [], blurDev = [], grpEls = [], pinEls = [];
let shadowPathEls = [], shadowBlurDevEls = [];
let bodyCircle = null;

function xRatio(i) { return 0.5 + (i === 0 ? -1 : 1) * spacing / (2 * W); }
function pinTopY() { return pinR + pinMargin() + lengthMargin(); }
function pinBotY() { return H - pinR - pinMargin() - lengthMargin(); }
function strTopY() { return pinTopY() + pinR - pillD() + pillW() / 2; }
function strBotY() { return pinBotY() - pinR + pillD() - pillW() / 2; }

function stringD(i, offset) {
  const x = W * xRatio(i), top = strTopY(), bot = strBotY();
  return `M ${x} ${top} Q ${x + offset} ${(top + bot) / 2} ${x} ${bot}`;
}
function ghostD(i, k) {
  const frac = NUM_GHOSTS > 1 ? (k / (NUM_GHOSTS - 1)) * 2 - 1 : 0;
  return stringD(i, cx[i] * frac);
}
function ghostOpacity(k, env) {
  const frac = NUM_GHOSTS > 1 ? k / (NUM_GHOSTS - 1) : 0.5;
  return (0.12 + Math.abs(frac * 2 - 1) * 0.30) * Math.min(env * 2, 1);
}

function buildSVG() {
  const svg = document.getElementById('svg');
  const rect = document.getElementById('stage').getBoundingClientRect();
  W = rect.width; H = rect.height;
  const topY = pinTopY(), botY = pinBotY();
  const pw = pillW(), pd = pillD();

  let defs = '<defs>';
  for (let i = 0; i < NUM_STRINGS; i++) {
    const x = W * xRatio(i), px = x - pw / 2, rxv = pw / 2;
    defs += `
      <filter id="fblur-${i}" x="-60%" y="-10%" width="220%" height="120%">
        <feGaussianBlur id="fdev-${i}" stdDeviation="0 0"/>
      </filter>
      <filter id="fshad-${i}" filterUnits="userSpaceOnUse"
              x="${x-200}" y="-50" width="400" height="${H+100}">
        <feGaussianBlur id="fshad-dev-${i}" stdDeviation="${shadowBlur}"/>
      </filter>
      <mask id="mask-top-${i}">
        <circle cx="${x}" cy="${topY}" r="${pinR}" fill="white"/>
        <rect x="${px}" y="${topY+pinR-pd}" width="${pw}" height="${pd+pinR}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>
      <mask id="mask-bot-${i}">
        <circle cx="${x}" cy="${botY}" r="${pinR}" fill="white"/>
        <rect x="${px}" y="${botY-pinR-pinR}" width="${pw}" height="${pd+pinR}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>`;
  }
  defs += '</defs>';
  svg.innerHTML = defs;
  mainPath = []; ghostEls = []; blurDev = []; grpEls = []; pinEls = [];
  shadowPathEls = []; shadowBlurDevEls = []; bodyCircle = null;

  for (let i = 0; i < NUM_STRINGS; i++) {
    shadowBlurDevEls.push(document.getElementById(`fshad-dev-${i}`));
    const sh = document.createElementNS(SVGNS, 'path');
    sh.setAttribute('d', stringD(i, 0)); sh.setAttribute('stroke', shadowCol);
    sh.setAttribute('stroke-width', strW); sh.setAttribute('fill', 'none');
    sh.setAttribute('stroke-linecap', 'round');
    sh.setAttribute('stroke-opacity', shadowOp / 100);
    sh.setAttribute('transform', `translate(${shadowDx},${shadowDy})`);
    sh.setAttribute('filter', `url(#fshad-${i})`);
    svg.appendChild(sh); shadowPathEls.push(sh);
  }

  const body = document.createElementNS(SVGNS, 'circle');
  body.setAttribute('cx', W / 2); body.setAttribute('cy', H / 2);
  body.setAttribute('r', bodyRadius); body.setAttribute('fill', bodyColor);
  svg.appendChild(body); bodyCircle = body;

  for (let i = 0; i < NUM_STRINGS; i++) {
    blurDev.push(document.getElementById(`fdev-${i}`));
    const grp = document.createElementNS(SVGNS, 'g');
    svg.appendChild(grp); grpEls.push(grp);
    const gs = [];
    for (let k = 0; k < NUM_GHOSTS; k++) {
      const g = document.createElementNS(SVGNS, 'path');
      g.setAttribute('stroke', strCol); g.setAttribute('stroke-width', ghostW());
      g.setAttribute('fill', 'none'); g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('opacity', '0'); grp.appendChild(g); gs.push(g);
    }
    ghostEls.push(gs);
  }

  for (let i = 0; i < NUM_STRINGS; i++) {
    const x = W * xRatio(i);
    const path = document.createElementNS(SVGNS, 'path');
    path.setAttribute('d', stringD(i, 0)); path.setAttribute('stroke', strCol);
    path.setAttribute('stroke-width', strW); path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path); mainPath.push(path);

    const pt = document.createElementNS(SVGNS, 'circle');
    pt.setAttribute('cx', x); pt.setAttribute('cy', topY);
    pt.setAttribute('r', pinR); pt.setAttribute('fill', holeCol);
    pt.setAttribute('mask', `url(#mask-top-${i})`); svg.appendChild(pt);

    const pb = document.createElementNS(SVGNS, 'circle');
    pb.setAttribute('cx', x); pb.setAttribute('cy', botY);
    pb.setAttribute('r', pinR); pb.setAttribute('fill', holeCol);
    pb.setAttribute('mask', `url(#mask-bot-${i})`); svg.appendChild(pb);
    pinEls.push([pt, pb]);
  }
  for (let i = 0; i < NUM_STRINGS; i++) redraw(i);
}

function redraw(i) {
  if (!mainPath[i]) return;
  const d = vib[i] ? stringD(i, 0) : stringD(i, cx[i]);
  mainPath[i].setAttribute('d', d);
  if (shadowPathEls[i]) shadowPathEls[i].setAttribute('d', d);
  if (vib[i]) {
    grpEls[i].setAttribute('filter', `url(#fblur-${i})`);
    const env = Math.min(cx[i] / bowAmount, 1);
    for (let k = 0; k < NUM_GHOSTS; k++) {
      ghostEls[i][k].setAttribute('d', ghostD(i, k));
      ghostEls[i][k].setAttribute('opacity', ghostOpacity(k, env).toFixed(3));
    }
    blurDev[i].setAttribute('stdDeviation', (vibBlurAmt * env).toFixed(2) + ' 0');
  } else {
    grpEls[i].setAttribute('filter', 'none');
    for (let k = 0; k < NUM_GHOSTS; k++) ghostEls[i][k].setAttribute('opacity', '0');
  }
}

// ── Apply helpers ─────────────────────────────────────────────
function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : null;
}
function applyBg()    { document.body.style.background = bg; }
function applyColors() {
  applyBg();
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (mainPath[i]) mainPath[i].setAttribute('stroke', strCol);
    if (ghostEls[i]) ghostEls[i].forEach(g => g.setAttribute('stroke', strCol));
    if (pinEls[i]) { pinEls[i][0].setAttribute('fill', holeCol); pinEls[i][1].setAttribute('fill', holeCol); }
  }
}
function applyStringWidth() {
  const gw = ghostW();
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (mainPath[i]) mainPath[i].setAttribute('stroke-width', strW);
    if (ghostEls[i]) ghostEls[i].forEach(g => g.setAttribute('stroke-width', gw));
    if (shadowPathEls[i]) shadowPathEls[i].setAttribute('stroke-width', strW);
  }
  applyDropShadow();
}
function applyDropShadow() {
  const sop = shadowOp / 100;
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (!shadowPathEls[i]) continue;
    shadowPathEls[i].setAttribute('stroke', shadowCol);
    shadowPathEls[i].setAttribute('stroke-opacity', sop);
    shadowPathEls[i].setAttribute('stroke-width', strW);
    shadowPathEls[i].setAttribute('transform', `translate(${shadowDx},${shadowDy})`);
    if (shadowBlurDevEls[i]) shadowBlurDevEls[i].setAttribute('stdDeviation', shadowBlur);
  }
}
function applyBody() {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('r', bodyRadius);
  bodyCircle.setAttribute('fill', bodyColor);
}
function applyButtonStyles() {
  const rgb = hexToRgb(btnColor) || { r:235, g:235, b:235 };
  const rs = `rgba(${rgb.r},${rgb.g},${rgb.b}`;
  document.documentElement.style.setProperty('--btn-ready',        `${rs},.80)`);
  document.documentElement.style.setProperty('--btn-dim',          `${rs},.18)`);
  document.documentElement.style.setProperty('--btn-border-ready', `${rs},.55)`);
  document.documentElement.style.setProperty('--btn-border-dim',   `${rs},.10)`);
  document.querySelectorAll('.abtn').forEach(b => {
    b.style.fontSize      = btnFontSize + 'px';
    b.style.letterSpacing = (btnTracking / 100) + 'em';
    b.style.paddingTop    = btnPadV + 'px';
    b.style.paddingBottom = btnPadV + 'px';
    b.style.borderRadius  = btnRadius + 'px';
    b.style.borderWidth   = btnBorderW + 'px';
    b.style.borderStyle   = 'solid';
  });
  const ans = document.getElementById('answers');
  ans.style.gap     = btnGap + 'px';
  ans.style.padding = btnAreaPad + 'px';
}

// ─────────────────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────────────────
let audioCtx = null;
const stringFreqs = [440, 440];

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq * 1.004, now);
  osc.frequency.exponentialRampToValueAtTime(freq, now + 0.08);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.30, now + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 3.2);
  osc.start(now); osc.stop(now + 3.3);
}

// ─────────────────────────────────────────────────────────────
// Pluck
// ─────────────────────────────────────────────────────────────
let hasPlucked = false;

function pluckString(idx, amp0) {
  playTone(stringFreqs[idx]);
  pulseBody();
  if (!hasPlucked) { hasPlucked = true; setButtonsReady(true); }
  vib[idx] = true;
  const decay = vibDecay(), t0 = performance.now();
  (function tick() {
    const t = (performance.now() - t0) / 1000, env = Math.exp(-decay * t);
    cx[idx] = amp0 * env; redraw(idx);
    if (env > 0.004) requestAnimationFrame(tick);
    else { cx[idx] = 0; vib[idx] = false; redraw(idx); }
  })();
}
function pulseBody() {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('r', bodyRadius * 1.055);
  setTimeout(() => bodyCircle.setAttribute('r', bodyRadius), 200);
}
function flashBody(correct) {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('fill', correct ? '#1e2e1e' : '#2e1e1e');
  setTimeout(() => bodyCircle.setAttribute('fill', bodyColor), 750);
}

// ─────────────────────────────────────────────────────────────
// Interaction
// ─────────────────────────────────────────────────────────────
const ptr = { active: false, idx: -1, startX: 0, moved: false };
function nearestString(clientX) {
  let best = -1, dist = Infinity;
  for (let i = 0; i < NUM_STRINGS; i++) {
    const d = Math.abs(clientX - W * xRatio(i));
    if (d < dist) { dist = d; best = i; }
  }
  return dist <= 80 ? best : -1;
}
function onDown(clientX) {
  if (!W || phase === 'feedback') return;
  const i = nearestString(clientX);
  if (i < 0 || vib[i]) return;
  ptr.active = true; ptr.idx = i; ptr.startX = clientX; ptr.moved = false;
}
function onMove(clientX) {
  if (!ptr.active) return;
  if (Math.abs(clientX - ptr.startX) > 4) ptr.moved = true;
  cx[ptr.idx] = Math.max(-bowAmount, Math.min(bowAmount,
    (clientX - W * xRatio(ptr.idx)) * 1.3));
  redraw(ptr.idx);
}
function onUp() {
  if (!ptr.active) return;
  const i = ptr.idx; ptr.active = false; ptr.idx = -1;
  if (!ptr.moved) { cx[i] = 0; pluckString(i, bowAmount * TAP_FRAC); return; }
  if (Math.abs(cx[i]) < MIN_PLUCK) { cx[i] = 0; redraw(i); return; }
  pluckString(i, Math.abs(cx[i]));
}
const stage = document.getElementById('stage');
stage.addEventListener('mousedown',  e => onDown(e.clientX));
stage.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX); }, { passive: false });
window.addEventListener('mousemove',  e => onMove(e.clientX));
window.addEventListener('mouseup',   onUp);
window.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
window.addEventListener('touchend',  onUp);
window.addEventListener('resize', buildSVG);

// ─────────────────────────────────────────────────────────────
// Game logic
// ─────────────────────────────────────────────────────────────
const ROOT = 440, MAX_D = 50, MIN_D = 1;
const LS_GAME = 'pitch-game-v1';
let deviation = MAX_D, bestDev = MAX_D, phase = 'play', roundDir = 'sharp';
let lastCorrect = null, oscillations = 0, history = [];

function loadGame() {
  try { const s = JSON.parse(localStorage.getItem(LS_GAME)); if (s?.best != null) bestDev = +s.best; } catch(e) {}
}
function saveGame() { localStorage.setItem(LS_GAME, JSON.stringify({ best: bestDev })); }
function fmt(c) { return c >= 10 ? Math.round(c) : c.toFixed(1); }

function updateHeader() {
  document.getElementById('threshold').innerHTML = `±${fmt(deviation)}<span class="unit">¢</span>`;
  document.getElementById('best').textContent = bestDev < MAX_D ? `best  ±${fmt(bestDev)}¢` : '';
  document.getElementById('history').innerHTML =
    history.map(ok => `<div class="dot ${ok ? 'ok' : 'err'}"></div>`).join('');
}
function setButtonsReady(ready) {
  document.querySelectorAll('.abtn').forEach(b => ready ? b.classList.add('ready') : b.classList.remove('ready'));
}
function newRound() {
  const inTuneP = 0.1 + 0.2 * (1 - Math.min(deviation, MAX_D) / MAX_D);
  const r = Math.random();
  roundDir = r < inTuneP ? 'in_tune' : Math.random() < 0.5 ? 'sharp' : 'flat';
  stringFreqs[0] = ROOT;
  stringFreqs[1] = roundDir === 'sharp'  ? ROOT * Math.pow(2,  deviation / 1200)
                 : roundDir === 'flat'   ? ROOT * Math.pow(2, -deviation / 1200)
                 : ROOT;
  phase = 'play'; hasPlucked = false;
  clearButtons(); updateHeader();
}
function adjust(correct) {
  if (lastCorrect !== null && lastCorrect !== correct) oscillations = Math.min(oscillations + 1, 10);
  else oscillations = Math.max(0, oscillations - 1);
  lastCorrect = correct;
  if (correct) {
    deviation = Math.max(MIN_D, deviation * (oscillations > 4 ? 0.90 : 0.75));
    if (deviation < bestDev) { bestDev = deviation; saveGame(); }
  } else {
    const bigStep  = history.slice(-4).filter(x => !x).length >= 4;
    const tightStep = oscillations > 4;
    deviation = Math.min(MAX_D, deviation * (bigStep ? 1.8 : tightStep ? 1.1 : 1.3));
  }
}
function answer(userAns) {
  if (phase !== 'play' || !hasPlucked) return;
  phase = 'feedback';
  const correct = userAns === roundDir;
  adjust(correct);
  history.push(correct); if (history.length > 7) history.shift();
  flashBody(correct); revealButtons(userAns, correct); updateHeader();
  setTimeout(newRound, 950);
}
function revealButtons(userAns, correct) {
  document.querySelectorAll('.abtn').forEach(b => {
    b.classList.remove('ready');
    if (b.dataset.ans === roundDir) b.classList.add('reveal-correct');
    if (!correct && b.dataset.ans === userAns) b.classList.add('reveal-wrong');
  });
}
function clearButtons() {
  document.querySelectorAll('.abtn').forEach(b =>
    b.classList.remove('ready', 'reveal-correct', 'reveal-wrong'));
}
document.querySelectorAll('.abtn').forEach(b =>
  b.addEventListener('click', () => answer(b.dataset.ans)));

    if (s.btnRadius   != null) btnRadius   = +s.btnRadius;

function saveVis() { localStorage.setItem(LS_VIS, JSON.stringify(currentVis())); }
