<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pitch Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100vw; height: 100dvh; overflow: hidden;
      background: #444444; color: #ebebeb;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none; user-select: none; -webkit-user-select: none;
      display: flex; flex-direction: column;
    }

    /* ── Header ────────────────────────────────── */
    #header {
      flex-shrink: 0; height: 58px;
      padding: 0 22px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #threshold { font-size: 22px; letter-spacing: 0.5px; opacity: .85; }
    #threshold .unit { font-size: 13px; opacity: .45; margin-left: 1px; }
    #best { font-size: 10px; letter-spacing: 2px; opacity: .3; margin-top: 3px; }

    #header-right { display: flex; align-items: center; gap: 14px; }
    #history { display: flex; gap: 6px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(235,235,235,.14); transition: background .3s; }
    .dot.ok  { background: rgba(235,235,235,.75); }
    .dot.err { background: rgba(255,100,100,.65); }

    #gear {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(235,235,235,.2);
      background: rgba(235,235,235,.06);
      color: rgba(235,235,235,.5);
      font: 8px 'Courier New', monospace; letter-spacing: 1px;
      cursor: pointer; flex-shrink: 0;
    }
    #gear:active { background: rgba(235,235,235,.15); }

    /* ── Stage ─────────────────────────────────── */
    #stage { flex: 1; position: relative; overflow: hidden; }
    #svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

    /* ── Answer buttons (piano style) ──────────── */
    #answers {
      flex-shrink: 0;
      padding: 0 0 0 0;
      display: flex;
      gap: 1px;
    }
    .abtn {
      flex: 1;
      padding: 18px 4px;
      background: transparent;
      border: none;
      border-top: 1px solid rgba(235,235,235,.1);
      color: rgba(235,235,235,.18);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .15s;
      pointer-events: none;
    }
    .abtn.ready {
      border-color: rgba(235,235,235,.55);
      color: rgba(235,235,235,.8);
      pointer-events: all;
    }
    .abtn.ready:active { background: rgba(235,235,235,.07); }
    .abtn.reveal-correct {
      border-color: rgba(120,220,120,.55);
      color: rgba(160,255,160,.9);
      pointer-events: none;
    }
    .abtn.reveal-wrong {
      border-color: rgba(255,80,80,.45);
      color: rgba(255,150,150,.8);
      pointer-events: none;
    }
    .abtn:disabled { pointer-events: none; }

    /* ── Dev settings panel ─────────────────────── */
    #panel {
      position: fixed; top: 0; right: 0;
      width: min(260px, 82vw); height: 100%;
      background: rgba(40,40,38,.97); color: #ebebeb;
      border-left: 1px solid rgba(235,235,235,.1);
      box-shadow: -8px 0 24px rgba(0,0,0,.25);
      padding: 68px 20px 24px;
      transform: translateX(100%); transition: transform .22s ease;
      z-index: 25; font-size: 10px; letter-spacing: 1.5px; overflow-y: auto;
    }
    #panel.open { transform: translateX(0); }
    #panel h2 { font-size: 11px; letter-spacing: 3px; opacity: .35; margin-bottom: 24px; font-weight: normal; }
    #panel .section {
      font-size: 9px; letter-spacing: 3px; opacity: .28;
      margin: 24px 0 14px;
      border-top: 1px solid rgba(235,235,235,.08); padding-top: 12px;
    }
    #panel .row { margin-bottom: 20px; }
    #panel label { display: flex; justify-content: space-between; margin-bottom: 9px; opacity: .5; }
    #panel .val { opacity: .6; }
    #panel input[type="range"] { width: 100%; accent-color: #aaa; }
    #panel input[type="color"] {
      width: 100%; height: 28px;
      border: 1px solid rgba(235,235,235,.15);
      background: none; cursor: pointer; padding: 2px;
    }
    #panel button {
      font: 10px 'Courier New', monospace; letter-spacing: 1.5px;
      border: 1px solid rgba(235,235,235,.18); background: rgba(235,235,235,.04);
      color: rgba(235,235,235,.6);
      padding: 7px 10px; cursor: pointer; width: 100%; margin-top: 6px;
    }
    #panel button:active { background: rgba(235,235,235,.12); }
    #panel textarea {
      width: 100%; font: 10px 'Courier New', monospace;
      background: rgba(235,235,235,.04); color: rgba(235,235,235,.6);
      border: 1px solid rgba(235,235,235,.12);
      padding: 8px; resize: none; line-height: 1.5;
    }
    #panel .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    #panel .btn-row button { width: auto; flex: 1; margin-top: 0; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <div id="threshold">—<span class="unit">¢</span></div>
    <div id="best"></div>
  </div>
  <div id="header-right">
    <div id="history"></div>
    <button id="gear">SET</button>
  </div>
</div>

<div id="stage"><svg id="svg"></svg></div>

<div id="answers">
  <button class="abtn" data-ans="flat">↓ flat</button>
  <button class="abtn" data-ans="in_tune">≈ in tune</button>
  <button class="abtn" data-ans="sharp">↑ sharp</button>
</div>

<!-- Dev Settings Panel -->
<div id="panel">
  <h2>VISUAL SETTINGS</h2>
  <div class="row"><label>BACKGROUND</label>
    <input type="color" id="pBg" autocomplete="off"></div>
  <div class="row"><label>STRING COLOR</label>
    <input type="color" id="pStrCol" autocomplete="off"></div>
  <div class="row"><label>HOLE COLOR</label>
    <input type="color" id="pHoleCol" autocomplete="off"></div>
  <div class="row"><label>STRING THICKNESS <span class="val" id="pStrWV"></span></label>
    <input type="range" id="pStrW" min="2" max="20" step="1" autocomplete="off"></div>
  <div class="row"><label>HOLE SIZE <span class="val" id="pPinRV"></span></label>
    <input type="range" id="pPinR" min="8" max="28" step="1" autocomplete="off"></div>
  <div class="row"><label>STRING LENGTH <span class="val" id="pLenV"></span></label>
    <input type="range" id="pLen" min="30" max="100" step="1" autocomplete="off"></div>
  <div class="row"><label>SPACING <span class="val" id="pSpacingV"></span></label>
    <input type="range" id="pSpacing" min="0" max="200" step="1" autocomplete="off"></div>

  <div class="section">BODY</div>
  <div class="row"><label>COLOR</label>
    <input type="color" id="pBodyCol" autocomplete="off"></div>
  <div class="row"><label>RADIUS <span class="val" id="pBodyRV"></span></label>
    <input type="range" id="pBodyR" min="0" max="220" step="5" autocomplete="off"></div>

  <div class="section">VIBRATION</div>
  <div class="row"><label>BOW <span class="val" id="pBowV"></span></label>
    <input type="range" id="pBow" min="20" max="150" step="5" autocomplete="off"></div>
  <div class="row"><label>BLUR <span class="val" id="pVibBlurV"></span></label>
    <input type="range" id="pVibBlur" min="0" max="10" step="1" autocomplete="off"></div>
  <div class="row"><label>SUSTAIN <span class="val" id="pSustainV"></span></label>
    <input type="range" id="pSustain" min="1" max="100" step="1" autocomplete="off"></div>

  <div class="section">SHADOW</div>
  <div class="row"><label>COLOR</label>
    <input type="color" id="pShadCol" autocomplete="off"></div>
  <div class="row"><label>OPACITY <span class="val" id="pShadOpV"></span></label>
    <input type="range" id="pShadOp" min="0" max="100" step="1" autocomplete="off"></div>
  <div class="row"><label>BLUR <span class="val" id="pShadBlurV"></span></label>
    <input type="range" id="pShadBlur" min="0" max="20" step="1" autocomplete="off"></div>
  <div class="row"><label>OFFSET X <span class="val" id="pShadDxV"></span></label>
    <input type="range" id="pShadDx" min="-20" max="20" step="1" autocomplete="off"></div>
  <div class="row"><label>OFFSET Y <span class="val" id="pShadDyV"></span></label>
    <input type="range" id="pShadDy" min="-20" max="20" step="1" autocomplete="off"></div>

  <div class="section">PRESET</div>
  <button id="pSave">SET AS DEFAULT</button>
  <div class="row" style="margin-top:14px">
    <label>EXPORT / IMPORT</label>
    <textarea id="pJson" rows="3" spellcheck="false" autocomplete="off"></textarea>
    <div class="btn-row">
      <button id="pCopy">COPY</button>
      <button id="pApply">APPLY</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Visual settings  (all let — editable via panel)
// ─────────────────────────────────────────────────────────────
const NUM_STRINGS = 2;
const NUM_GHOSTS  = 12;
const MIN_PLUCK   = 8;
const TAP_FRAC    = 0.44;
const SVGNS       = 'http://www.w3.org/2000/svg';

let bg           = '#444444';
let strCol       = '#ebebeb';
let holeCol      = '#232323';
let strW         = 6;
let pinR         = 13;
let stringLen    = 0.69;
let spacing      = 85;
let bodyColor    = '#232323';
let bodyRadius   = 100;
let bowAmount    = 90;
let vibBlurAmt   = 3;
let vibSustain   = 64;
let shadowCol    = '#000000';
let shadowOp     = 17;
let shadowBlur   = 2;
let shadowDx     = 5;
let shadowDy     = -3;

const pillW        = () => pinR * 0.95;
const pillD        = () => pinR * 1.4;
const pinMargin    = () => pinR * 0.6;
const ghostW       = () => Math.max(1.5, strW * 0.35);
const lengthMargin = () => (H * (1 - stringLen)) / 2;
const vibDecay     = () => 0.3 + 5.7 * (1 - vibSustain / 100);

// ─────────────────────────────────────────────────────────────
// SVG state
// ─────────────────────────────────────────────────────────────
let W = 0, H = 0;
const cx  = [0, 0];
const vib = [false, false];
let mainPath = [], ghostEls = [], blurDev = [], grpEls = [], pinEls = [];
let shadowPathEls = [], shadowBlurDevEls = [];
let bodyCircle = null;

function xRatio(i) { return 0.5 + (i === 0 ? -1 : 1) * spacing / (2 * W); }
function pinTopY() { return pinR + pinMargin() + lengthMargin(); }
function pinBotY() { return H - pinR - pinMargin() - lengthMargin(); }
function strTopY() { return pinTopY() + pinR - pillD() + pillW() / 2; }
function strBotY() { return pinBotY() - pinR + pillD() - pillW() / 2; }

function stringD(i, offset) {
  const x = W * xRatio(i), top = strTopY(), bot = strBotY();
  return `M ${x} ${top} Q ${x + offset} ${(top + bot) / 2} ${x} ${bot}`;
}
function ghostD(i, k) {
  const frac = NUM_GHOSTS > 1 ? (k / (NUM_GHOSTS - 1)) * 2 - 1 : 0;
  return stringD(i, cx[i] * frac);
}
function ghostOpacity(k, env) {
  const frac = NUM_GHOSTS > 1 ? k / (NUM_GHOSTS - 1) : 0.5;
  return (0.12 + Math.abs(frac * 2 - 1) * 0.30) * Math.min(env * 2, 1);
}

function buildSVG() {
  const svg  = document.getElementById('svg');
  const rect = document.getElementById('stage').getBoundingClientRect();
  W = rect.width; H = rect.height;
  const topY = pinTopY(), botY = pinBotY();
  const pw = pillW(), pd = pillD();

  let defs = '<defs>';
  for (let i = 0; i < NUM_STRINGS; i++) {
    const x = W * xRatio(i), px = x - pw / 2, rxv = pw / 2;
    defs += `
      <filter id="fblur-${i}" x="-60%" y="-10%" width="220%" height="120%">
        <feGaussianBlur id="fdev-${i}" stdDeviation="0 0"/>
      </filter>
      <filter id="fshad-${i}" filterUnits="userSpaceOnUse"
              x="${x-200}" y="-50" width="400" height="${H+100}">
        <feGaussianBlur id="fshad-dev-${i}" stdDeviation="${shadowBlur}"/>
      </filter>
      <mask id="mask-top-${i}">
        <circle cx="${x}" cy="${topY}" r="${pinR}" fill="white"/>
        <rect x="${px}" y="${topY+pinR-pd}" width="${pw}" height="${pd+pinR}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>
      <mask id="mask-bot-${i}">
        <circle cx="${x}" cy="${botY}" r="${pinR}" fill="white"/>
        <rect x="${px}" y="${botY-pinR-pinR}" width="${pw}" height="${pd+pinR}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>`;
  }
  defs += '</defs>';
  svg.innerHTML = defs;
  mainPath = []; ghostEls = []; blurDev = []; grpEls = []; pinEls = [];
  shadowPathEls = []; shadowBlurDevEls = []; bodyCircle = null;

  for (let i = 0; i < NUM_STRINGS; i++) {          // 1 — shadows
    shadowBlurDevEls.push(document.getElementById(`fshad-dev-${i}`));
    const sh = document.createElementNS(SVGNS, 'path');
    sh.setAttribute('d', stringD(i, 0));
    sh.setAttribute('stroke', shadowCol); sh.setAttribute('stroke-width', strW);
    sh.setAttribute('fill', 'none'); sh.setAttribute('stroke-linecap', 'round');
    sh.setAttribute('stroke-opacity', shadowOp / 100);
    sh.setAttribute('transform', `translate(${shadowDx},${shadowDy})`);
    sh.setAttribute('filter', `url(#fshad-${i})`);
    svg.appendChild(sh); shadowPathEls.push(sh);
  }

  const body = document.createElementNS(SVGNS, 'circle');   // 2 — body
  body.setAttribute('cx', W / 2); body.setAttribute('cy', H / 2);
  body.setAttribute('r', bodyRadius); body.setAttribute('fill', bodyColor);
  svg.appendChild(body); bodyCircle = body;

  for (let i = 0; i < NUM_STRINGS; i++) {          // 3 — ghost groups
    blurDev.push(document.getElementById(`fdev-${i}`));
    const grp = document.createElementNS(SVGNS, 'g');
    svg.appendChild(grp); grpEls.push(grp);
    const gs = [];
    for (let k = 0; k < NUM_GHOSTS; k++) {
      const g = document.createElementNS(SVGNS, 'path');
      g.setAttribute('stroke', strCol); g.setAttribute('stroke-width', ghostW());
      g.setAttribute('fill', 'none'); g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('opacity', '0');
      grp.appendChild(g); gs.push(g);
    }
    ghostEls.push(gs);
  }

  for (let i = 0; i < NUM_STRINGS; i++) {          // 4 — strings + pins
    const x = W * xRatio(i);
    const path = document.createElementNS(SVGNS, 'path');
    path.setAttribute('d', stringD(i, 0)); path.setAttribute('stroke', strCol);
    path.setAttribute('stroke-width', strW); path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path); mainPath.push(path);

    const pt = document.createElementNS(SVGNS, 'circle');
    pt.setAttribute('cx', x); pt.setAttribute('cy', topY);
    pt.setAttribute('r', pinR); pt.setAttribute('fill', holeCol);
    pt.setAttribute('mask', `url(#mask-top-${i})`); svg.appendChild(pt);

    const pb = document.createElementNS(SVGNS, 'circle');
    pb.setAttribute('cx', x); pb.setAttribute('cy', botY);
    pb.setAttribute('r', pinR); pb.setAttribute('fill', holeCol);
    pb.setAttribute('mask', `url(#mask-bot-${i})`); svg.appendChild(pb);
    pinEls.push([pt, pb]);
  }
  for (let i = 0; i < NUM_STRINGS; i++) redraw(i);
}

function redraw(i) {
  if (!mainPath[i]) return;
  const d = vib[i] ? stringD(i, 0) : stringD(i, cx[i]);
  mainPath[i].setAttribute('d', d);
  if (shadowPathEls[i]) shadowPathEls[i].setAttribute('d', d);
  if (vib[i]) {
    grpEls[i].setAttribute('filter', `url(#fblur-${i})`);
    const env = Math.min(cx[i] / bowAmount, 1);
    for (let k = 0; k < NUM_GHOSTS; k++) {
      ghostEls[i][k].setAttribute('d', ghostD(i, k));
      ghostEls[i][k].setAttribute('opacity', ghostOpacity(k, env).toFixed(3));
    }
    blurDev[i].setAttribute('stdDeviation', (vibBlurAmt * env).toFixed(2) + ' 0');
  } else {
    grpEls[i].setAttribute('filter', 'none');
    for (let k = 0; k < NUM_GHOSTS; k++) ghostEls[i][k].setAttribute('opacity', '0');
  }
}

// ── Apply helpers ─────────────────────────────────────────────
function applyBg()     { document.body.style.background = bg; }
function applyColors() {
  applyBg();
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (mainPath[i]) mainPath[i].setAttribute('stroke', strCol);
    if (ghostEls[i]) ghostEls[i].forEach(g => g.setAttribute('stroke', strCol));
    if (pinEls[i]) { pinEls[i][0].setAttribute('fill', holeCol); pinEls[i][1].setAttribute('fill', holeCol); }
  }
}
function applyStringWidth() {
  const gw = ghostW();
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (mainPath[i]) mainPath[i].setAttribute('stroke-width', strW);
    if (ghostEls[i]) ghostEls[i].forEach(g => g.setAttribute('stroke-width', gw));
    if (shadowPathEls[i]) shadowPathEls[i].setAttribute('stroke-width', strW);
  }
  applyDropShadow();
}
function applyDropShadow() {
  const sop = shadowOp / 100;
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (!shadowPathEls[i]) continue;
    shadowPathEls[i].setAttribute('stroke', shadowCol);
    shadowPathEls[i].setAttribute('stroke-opacity', sop);
    shadowPathEls[i].setAttribute('stroke-width', strW);
    shadowPathEls[i].setAttribute('transform', `translate(${shadowDx},${shadowDy})`);
    if (shadowBlurDevEls[i]) shadowBlurDevEls[i].setAttribute('stdDeviation', shadowBlur);
  }
}
function applyBody() {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('r', bodyRadius);
  bodyCircle.setAttribute('fill', bodyColor);
}

// ─────────────────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────────────────
let audioCtx = null;
const stringFreqs = [440, 440];

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq * 1.004, now);
  osc.frequency.exponentialRampToValueAtTime(freq, now + 0.08);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.30, now + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 3.2);
  osc.start(now); osc.stop(now + 3.3);
}

// ─────────────────────────────────────────────────────────────
// Pluck
// ─────────────────────────────────────────────────────────────
let hasPlucked = false;

function pluckString(idx, amp0) {
  playTone(stringFreqs[idx]);
  pulseBody();

  // First pluck this round → unlock buttons
  if (!hasPlucked) { hasPlucked = true; setButtonsReady(true); }

  vib[idx] = true;
  const decay = vibDecay(), t0 = performance.now();
  (function tick() {
    const t = (performance.now() - t0) / 1000, env = Math.exp(-decay * t);
    cx[idx] = amp0 * env; redraw(idx);
    if (env > 0.004) requestAnimationFrame(tick);
    else { cx[idx] = 0; vib[idx] = false; redraw(idx); }
  })();
}

function pulseBody() {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('r', bodyRadius * 1.055);
  setTimeout(() => bodyCircle.setAttribute('r', bodyRadius), 200);
}
function flashBody(correct) {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('fill', correct ? '#1e2e1e' : '#2e1e1e');
  setTimeout(() => bodyCircle.setAttribute('fill', bodyColor), 750);
}

// ─────────────────────────────────────────────────────────────
// Interaction
// ─────────────────────────────────────────────────────────────
const ptr = { active: false, idx: -1, startX: 0, moved: false };

function nearestString(clientX) {
  let best = -1, dist = Infinity;
  for (let i = 0; i < NUM_STRINGS; i++) {
    const d = Math.abs(clientX - W * xRatio(i));
    if (d < dist) { dist = d; best = i; }
  }
  return dist <= 80 ? best : -1;
}
function onDown(clientX) {
  if (!W || phase === 'feedback') return;
  const i = nearestString(clientX);
  if (i < 0 || vib[i]) return;
  ptr.active = true; ptr.idx = i; ptr.startX = clientX; ptr.moved = false;
}
function onMove(clientX) {
  if (!ptr.active) return;
  if (Math.abs(clientX - ptr.startX) > 4) ptr.moved = true;
  cx[ptr.idx] = Math.max(-bowAmount, Math.min(bowAmount,
    (clientX - W * xRatio(ptr.idx)) * 1.3));
  redraw(ptr.idx);
}
function onUp() {
  if (!ptr.active) return;
  const i = ptr.idx; ptr.active = false; ptr.idx = -1;
  if (!ptr.moved) { cx[i] = 0; pluckString(i, bowAmount * TAP_FRAC); return; }
  if (Math.abs(cx[i]) < MIN_PLUCK) { cx[i] = 0; redraw(i); return; }
  pluckString(i, Math.abs(cx[i]));
}

const stage = document.getElementById('stage');
stage.addEventListener('mousedown',  e => onDown(e.clientX));
stage.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX); }, { passive: false });
window.addEventListener('mousemove',  e => onMove(e.clientX));
window.addEventListener('mouseup',   onUp);
window.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
window.addEventListener('touchend',  onUp);
window.addEventListener('resize', buildSVG);

// ─────────────────────────────────────────────────────────────
// Game logic
// ─────────────────────────────────────────────────────────────
const ROOT   = 440;
const MAX_D  = 50;
const MIN_D  = 1;
const LS_GAME = 'pitch-game-v1';

let deviation    = MAX_D;
let bestDev      = MAX_D;
let phase        = 'play';
let roundDir     = 'sharp';
let lastCorrect  = null;
let oscillations = 0;
let history      = [];

function loadGame() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_GAME));
    if (s && s.best != null) bestDev = +s.best;
  } catch(e) {}
}
function saveGame() {
  localStorage.setItem(LS_GAME, JSON.stringify({ best: bestDev }));
}

function fmt(c) { return c >= 10 ? Math.round(c) : c.toFixed(1); }

function updateHeader() {
  document.getElementById('threshold').innerHTML =
    `±${fmt(deviation)}<span class="unit">¢</span>`;
  document.getElementById('best').textContent =
    bestDev < MAX_D ? `best  ±${fmt(bestDev)}¢` : '';
  document.getElementById('history').innerHTML =
    history.map(ok => `<div class="dot ${ok ? 'ok' : 'err'}"></div>`).join('');
}

function setButtonsReady(ready) {
  document.querySelectorAll('.abtn').forEach(b => {
    if (ready) b.classList.add('ready');
    else b.classList.remove('ready');
  });
}

function newRound() {
  const inTuneP = 0.1 + 0.2 * (1 - Math.min(deviation, MAX_D) / MAX_D);
  const r = Math.random();
  roundDir = r < inTuneP ? 'in_tune' : (Math.random() < 0.5 ? 'sharp' : 'flat');

  stringFreqs[0] = ROOT;
  stringFreqs[1] = roundDir === 'sharp'  ? ROOT * Math.pow(2,  deviation / 1200)
                 : roundDir === 'flat'   ? ROOT * Math.pow(2, -deviation / 1200)
                 : ROOT;

  phase = 'play';
  hasPlucked = false;
  clearButtons();
  updateHeader();
}

function adjust(correct) {
  if (lastCorrect !== null && lastCorrect !== correct)
    oscillations = Math.min(oscillations + 1, 10);
  else
    oscillations = Math.max(0, oscillations - 1);
  lastCorrect = correct;

  if (correct) {
    const tight = oscillations > 4;
    deviation = Math.max(MIN_D, deviation * (tight ? 0.90 : 0.75));
    if (deviation < bestDev) { bestDev = deviation; saveGame(); }
  } else {
    const tightStep = oscillations > 4;
    const recentWrongs = history.slice(-4).filter(x => !x).length;
    const bigStep = recentWrongs >= 4;
    deviation = Math.min(MAX_D, deviation * (bigStep ? 1.8 : tightStep ? 1.1 : 1.3));
  }
}

function answer(userAns) {
  if (phase !== 'play' || !hasPlucked) return;
  phase = 'feedback';
  const correct = userAns === roundDir;
  adjust(correct);
  history.push(correct); if (history.length > 7) history.shift();
  flashBody(correct);
  revealButtons(userAns, correct);
  updateHeader();
  setTimeout(newRound, 950);
}

function revealButtons(userAns, correct) {
  document.querySelectorAll('.abtn').forEach(b => {
    b.classList.remove('ready');
    if (b.dataset.ans === roundDir) b.classList.add('reveal-correct');
    if (!correct && b.dataset.ans === userAns) b.classList.add('reveal-wrong');
  });
}
function clearButtons() {
  document.querySelectorAll('.abtn').forEach(b => {
    b.classList.remove('ready', 'reveal-correct', 'reveal-wrong');
  });
}

document.querySelectorAll('.abtn').forEach(b =>
  b.addEventListener('click', () => answer(b.dataset.ans)));

// ─────────────────────────────────────────────────────────────
// Dev Settings Panel
// ─────────────────────────────────────────────────────────────
const LS_VIS = 'pitch-game-settings-v1';

function currentVis() {
  return { bg, strCol, holeCol, strW, pinR,
    stringLen: +stringLen.toFixed(2), spacing,
    bodyColor, bodyRadius, bowAmount, vibBlurAmt, vibSustain,
    shadowCol, shadowOp, shadowBlur, shadowDx, shadowDy };
}
function syncPanel() {
  document.getElementById('pBg').value       = bg;
  document.getElementById('pStrCol').value   = strCol;
  document.getElementById('pHoleCol').value  = holeCol;
  document.getElementById('pStrW').value     = strW;       document.getElementById('pStrWV').textContent    = strW;
  document.getElementById('pPinR').value     = pinR;       document.getElementById('pPinRV').textContent    = pinR;
  document.getElementById('pLen').value      = Math.round(stringLen * 100);
                                                            document.getElementById('pLenV').textContent    = Math.round(stringLen*100) + '%';
  document.getElementById('pSpacing').value  = spacing;    document.getElementById('pSpacingV').textContent = spacing + 'px';
  document.getElementById('pBodyCol').value  = bodyColor;
  document.getElementById('pBodyR').value    = bodyRadius;  document.getElementById('pBodyRV').textContent   = bodyRadius;
  document.getElementById('pBow').value      = bowAmount;   document.getElementById('pBowV').textContent     = bowAmount;
  document.getElementById('pVibBlur').value  = vibBlurAmt;  document.getElementById('pVibBlurV').textContent = vibBlurAmt;
  document.getElementById('pSustain').value  = vibSustain;  document.getElementById('pSustainV').textContent = vibSustain;
  document.getElementById('pShadCol').value  = shadowCol;
  document.getElementById('pShadOp').value   = shadowOp;    document.getElementById('pShadOpV').textContent  = shadowOp + '%';
  document.getElementById('pShadBlur').value = shadowBlur;  document.getElementById('pShadBlurV').textContent= shadowBlur;
  document.getElementById('pShadDx').value   = shadowDx;    document.getElementById('pShadDxV').textContent  = shadowDx;
  document.getElementById('pShadDy').value   = shadowDy;    document.getElementById('pShadDyV').textContent  = shadowDy;
  document.getElementById('pJson').value = JSON.stringify(currentVis());
}
function loadVis() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_VIS));
    if (!s) return;
    if (s.bg         != null) bg         = s.bg;
    if (s.strCol     != null) strCol     = s.strCol;
    if (s.holeCol    != null) holeCol    = s.holeCol;
    if (s.strW       != null) strW       = +s.strW;
    if (s.pinR       != null) pinR       = +s.pinR;
    if (s.stringLen  != null) stringLen  = +s.stringLen;
    if (s.spacing    != null) spacing    = +s.spacing < 2 ? 85 : +s.spacing;
    if (s.bodyColor  != null) bodyColor  = s.bodyColor;
    if (s.bodyRadius != null) bodyRadius = +s.bodyRadius;
    if (s.bowAmount  != null) bowAmount  = +s.bowAmount;
    if (s.vibBlurAmt != null) vibBlurAmt = +s.vibBlurAmt;
    if (s.vibSustain != null) vibSustain = +s.vibSustain;
    if (s.shadowCol  != null) shadowCol  = s.shadowCol;
    if (s.shadowOp   != null) shadowOp   = +s.shadowOp;
    if (s.shadowBlur != null) shadowBlur = +s.shadowBlur;
    if (s.shadowDx   != null) shadowDx   = +s.shadowDx;
    if (s.shadowDy   != null) shadowDy   = +s.shadowDy;
  } catch(e) {}
}
function saveVis() { localStorage.setItem(LS_VIS, JSON.stringify(currentVis())); }
function applyVisJson(s) {
  if (s.bg         != null) bg         = s.bg;
  if (s.strCol     != null) strCol     = s.strCol;
  if (s.holeCol    != null) holeCol    = s.holeCol;
  if (s.strW       != null) strW       = +s.strW;
  if (s.pinR       != null) pinR       = +s.pinR;
  if (s.stringLen  != null) stringLen  = +s.stringLen;
  if (s.spacing    != null) spacing    = +s.spacing < 2 ? 85 : +s.spacing;
  if (s.bodyColor  != null) bodyColor  = s.bodyColor;
  if (s.bodyRadius != null) bodyRadius = +s.bodyRadius;
  if (s.bowAmount  != null) bowAmount  = +s.bowAmount;
  if (s.vibBlurAmt != null) vibBlurAmt = +s.vibBlurAmt;
  if (s.vibSustain != null) vibSustain = +s.vibSustain;
  if (s.shadowCol  != null) shadowCol  = s.shadowCol;
  if (s.shadowOp   != null) shadowOp   = +s.shadowOp;
  if (s.shadowBlur != null) shadowBlur = +s.shadowBlur;
  if (s.shadowDx   != null) shadowDx   = +s.shadowDx;
  if (s.shadowDy   != null) shadowDy   = +s.shadowDy;
}

// Panel inputs
const panel = document.getElementById('panel');
const gear  = document.getElementById('gear');
gear.addEventListener('click', () => {
  const open = panel.classList.toggle('open');
  gear.textContent = open ? '✕' : 'SET';
  if (open) syncPanel();
});
panel.addEventListener('input', () => {
  document.getElementById('pJson').value = JSON.stringify(currentVis());
});

document.getElementById('pBg').addEventListener('input',       e => { bg = e.target.value; applyBg(); });
document.getElementById('pStrCol').addEventListener('input',   e => { strCol = e.target.value; applyColors(); });
document.getElementById('pHoleCol').addEventListener('input',  e => { holeCol = e.target.value; applyColors(); });
document.getElementById('pStrW').addEventListener('input',     e => { strW = +e.target.value; document.getElementById('pStrWV').textContent = strW; applyStringWidth(); });
document.getElementById('pPinR').addEventListener('input',     e => { pinR = +e.target.value; document.getElementById('pPinRV').textContent = pinR; buildSVG(); });
document.getElementById('pLen').addEventListener('input',      e => { stringLen = +e.target.value/100; document.getElementById('pLenV').textContent = e.target.value+'%'; buildSVG(); });
document.getElementById('pSpacing').addEventListener('input',  e => { spacing = +e.target.value; document.getElementById('pSpacingV').textContent = spacing+'px'; buildSVG(); });
document.getElementById('pBodyCol').addEventListener('input',  e => { bodyColor = e.target.value; applyBody(); });
document.getElementById('pBodyR').addEventListener('input',    e => { bodyRadius = +e.target.value; document.getElementById('pBodyRV').textContent = bodyRadius; applyBody(); });
document.getElementById('pBow').addEventListener('input',      e => { bowAmount = +e.target.value; document.getElementById('pBowV').textContent = bowAmount; });
document.getElementById('pVibBlur').addEventListener('input',  e => { vibBlurAmt = +e.target.value; document.getElementById('pVibBlurV').textContent = vibBlurAmt; });
document.getElementById('pSustain').addEventListener('input',  e => { vibSustain = +e.target.value; document.getElementById('pSustainV').textContent = vibSustain; });
document.getElementById('pShadCol').addEventListener('input',  e => { shadowCol = e.target.value; applyDropShadow(); });
document.getElementById('pShadOp').addEventListener('input',   e => { shadowOp = +e.target.value; document.getElementById('pShadOpV').textContent = shadowOp+'%'; applyDropShadow(); });
document.getElementById('pShadBlur').addEventListener('input', e => { shadowBlur = +e.target.value; document.getElementById('pShadBlurV').textContent = shadowBlur; applyDropShadow(); });
document.getElementById('pShadDx').addEventListener('input',   e => { shadowDx = +e.target.value; document.getElementById('pShadDxV').textContent = shadowDx; applyDropShadow(); });
document.getElementById('pShadDy').addEventListener('input',   e => { shadowDy = +e.target.value; document.getElementById('pShadDyV').textContent = shadowDy; applyDropShadow(); });

document.getElementById('pSave').addEventListener('click', () => {
  saveVis();
  const b = document.getElementById('pSave');
  b.textContent = 'SAVED ✓'; setTimeout(() => b.textContent = 'SET AS DEFAULT', 1500);
});
document.getElementById('pCopy').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('pJson').value)
    .then(() => { const b = document.getElementById('pCopy'); b.textContent='COPIED ✓'; setTimeout(()=>b.textContent='COPY',1500); })
    .catch(() => { const ta=document.getElementById('pJson'); ta.select(); document.execCommand('copy'); });
});
document.getElementById('pApply').addEventListener('click', () => {
  try {
    applyVisJson(JSON.parse(document.getElementById('pJson').value));
    syncPanel(); applyBg(); applyColors(); applyStringWidth(); applyBody(); applyDropShadow(); buildSVG();
  } catch(e) {}
});

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
loadVis();
loadGame();
deviation = Math.min(MAX_D, bestDev * 1.5);
applyBg();
buildSVG();
newRound();
</script>
