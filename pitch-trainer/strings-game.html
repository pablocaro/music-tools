<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pitch Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100vw; height: 100dvh; overflow: hidden;
      background: #444444; color: #f7f2e8;
      font-family: 'Rubik', system-ui, sans-serif;
      touch-action: none; user-select: none; -webkit-user-select: none;
      display: flex; flex-direction: column;
    }

    /* ── Header ────────────────────────────── */
    #header {
      flex-shrink: 0; min-height: 58px;
      /* safe-area clears the notch/status bar; --hdr-top is a manual nudge on top of that */
      padding: calc(env(safe-area-inset-top, 0px) + var(--hdr-top, 0px)) 20px 6px;
      display: flex; align-items: flex-start; justify-content: space-between;
      position: relative; z-index: 5;   /* sits above the strings that run up to the top */
    }
    /* gear + cent pill share one top-aligned row; best/dots flow below the cent pill */
    #header-left { display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0; }
    #cent-col { display: flex; flex-direction: column; }
    /* Cent readout doubles as the reset button (tap → inline confirm) */
    #centChip {
      display: inline-flex; align-items: center; gap: 8px;
      height: var(--hbtn-size, 34px); padding: 0 14px; border-radius: 999px; cursor: pointer; touch-action: manipulation;
      border: var(--hbtn-stroke, 1px) solid color-mix(in srgb, var(--hbtn-border, #f7f2e8) 42%, transparent);
      background: rgba(247,242,232,.06);
      font-family: var(--top-font, 'Rubik', system-ui, sans-serif); font-size: var(--chip-size, 15px);
      font-weight: var(--weight-standard); letter-spacing: .5px; color: color-mix(in srgb, var(--hbtn-col, #f7f2e8) 90%, transparent);
    }
    #centChip:active { background: rgba(247,242,232,.12); }
    #threshold { line-height: 1; }   /* size / weight / colour inherited from #centChip */
    #threshold .unit { font-size: .72em; opacity: .55; margin-left: 1px; }
    #centConfirm { display: none; align-items: center; gap: 6px; }   /* font + colour inherited */
    #centChip.confirming #threshold { display: none; }
    #centChip.confirming #centConfirm { display: inline-flex; }
    #resetYes, #resetNo {
      width: 22px; height: 22px; border-radius: 50%; padding: 0; cursor: pointer; touch-action: manipulation;
      border: 1px solid color-mix(in srgb, var(--hbtn-border, #f7f2e8) 30%, transparent);
      background: rgba(247,242,232,.08); font-size: 12px; line-height: 1;
      color: var(--hbtn-col, #f7f2e8);
      display: inline-flex; align-items: center; justify-content: center;
    }
    #resetYes svg, #resetNo svg { width: 11px; height: 11px; display: block; }
    #best { font-size: 10px; letter-spacing: 2px; opacity: .3; margin-top: 3px; }
    #header-right { display: flex; align-items: center; gap: 8px; min-width: 0; }
    #gear {
      width: var(--hbtn-size, 34px); height: var(--hbtn-size, 34px); border-radius: 50%; padding: 0;
      border: var(--hbtn-stroke, 1px) solid color-mix(in srgb, var(--hbtn-border, #f7f2e8) 42%, transparent); background: rgba(247,242,232,.06);
      color: color-mix(in srgb, var(--hbtn-col, #f7f2e8) 90%, transparent);
      cursor: pointer; flex-shrink: 0; touch-action: manipulation;
      display: inline-flex; align-items: center; justify-content: center;
    }
    #gear svg { width: 55%; height: 55%; display: block; }
    #gear:active { background: rgba(247,242,232,.15); }
    /* Single selector button — label adapts, width follows the text */
    #niWrap { position: relative; display: flex; min-width: 0; }
    #niBtn {
      display: inline-flex; align-items: center; gap: 5px; max-width: 58vw; flex-shrink: 1; min-width: 0;
      height: var(--hbtn-size, 34px); padding: 0 13px; border-radius: 999px; cursor: pointer; touch-action: manipulation;
      border: var(--hbtn-stroke, 1px) solid color-mix(in srgb, var(--hbtn-border, #f7f2e8) 42%, transparent);
      background: rgba(247,242,232,.06);
      color: color-mix(in srgb, var(--hbtn-col, #f7f2e8) 90%, transparent);
      font-family: var(--top-font, 'Rubik', system-ui, sans-serif); font-size: var(--chip-size, 15px); font-weight: var(--weight-standard); letter-spacing: .5px;
      white-space: nowrap;
    }
    #niBtn:active { background: rgba(247,242,232,.12); }
    #niLabel { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .ni-caret { font-size: 10px; opacity: .55; line-height: 1; }
    /* Custom grid popover */
    #niPop {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 40;
      display: none; flex-direction: column; gap: 3px; width: max-content;
      padding: 10px; border-radius: 14px;
      background: #33231a; border: 1px solid rgba(247,242,232,.12);
      box-shadow: 0 12px 34px rgba(0,0,0,.4);
    }
    #niWrap.open #niPop { display: flex; }
    /* transparent tap-catcher: closes on outside tap, no dim, swallows the board pluck */
    #niScrim { position: fixed; inset: 0; z-index: 39; display: none; }
    #niWrap.open #niScrim { display: block; }
    .nip-sec { font: var(--weight-standard) var(--type-caption) 'Rubik', system-ui, sans-serif; letter-spacing: 1.5px;
      color: rgba(247,242,232,.4); margin: 3px 2px 1px; }
    .nip-grid { display: grid; gap: 5px; }
    .nip-notes { grid-template-columns: repeat(4, 1fr); }
    .nip-ints  { grid-template-columns: repeat(5, 1fr); }
    .nip-wide  { grid-column: 1 / -1; }
    .nip-cell {
      min-width: 42px; height: 32px; padding: 0 6px; border-radius: 8px; cursor: pointer; touch-action: manipulation;
      border: 1px solid rgba(247,242,232,.1); background: rgba(247,242,232,.05);
      color: rgba(247,242,232,.72); font-family: 'Rubik', system-ui, sans-serif; font-size: var(--type-label); font-weight: var(--weight-standard);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .nip-cell:active { background: rgba(247,242,232,.16); }
    .nip-cell.sel { background: color-mix(in srgb, var(--hbtn-col, #f7f2e8) 90%, transparent); color: #33231a; border-color: transparent; }

    /* ── Stage ──────────────────────────────── */
    #stage { flex: 1; position: relative; overflow: visible; }
    /* purely visual; the vOffset transform shifts its box down over the answer buttons,
       so it must not intercept touches — all interaction is handled on #stage by coords */
    #svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    /* ── Bottom bar ───────────────────────────
       One region, three states. #answers stays in normal flow and defines the
       bar's height; #prompt and #feedback overlay it (absolute) so switching
       states never changes the bar height — the board above never jumps. */
    #bottom { flex-shrink: 0; position: relative; padding-bottom: env(safe-area-inset-bottom, 0px); }
    #answers { display: flex; justify-content: center; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .18s ease; }
    #answers.active { opacity: 1; visibility: visible; pointer-events: auto; }
    #prompt, #feedback {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center; text-align: center;
      opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .2s ease;
    }
    #prompt.active { opacity: 1; visibility: visible; }
    #feedback.active { opacity: 1; visibility: visible; pointer-events: auto; }
    /* Feedback: plain cream text (no pill), matching the answer-button label */
    #fbPill {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: 'Rubik', system-ui, sans-serif;
      transform-origin: center; touch-action: manipulation;
    }
    /* Two ghost circle buttons: ♪ (in-tune toggle) and › (continue). ♪ fills when lit. */
    #fbNext, #fbTune {
      display: none; align-items: center; justify-content: center;
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%; padding: 0;
      border: 1.5px solid var(--btn-border-ready); background: transparent;
      color: var(--btn-ready); font-family: inherit; line-height: 1;
      cursor: pointer; touch-action: manipulation;
    }
    #feedback.has-next #fbNext, #feedback.has-next #fbTune { display: inline-flex; }
    /* Material Symbols glyphs (music_note / chevron) inherit the button colour */
    #fbTune svg, #fbNext svg { width: 64%; height: 64%; display: block; }

    :root {
      --btn-ready:        rgba(247,242,232, .80);
      --btn-dim:          rgba(247,242,232, .18);
      --btn-border-ready: rgba(247,242,232, .55);
      --btn-border-dim:   rgba(247,242,232, .10);
      /* ── Type system ───────────────────────────
         Ruler (raw sizes) → Jobs (generic roles). Named by job, not by app part,
         so the block lifts into a shared tokens file for the other apps unchanged. */
      --fs-1: 11px;   /* caption */
      --fs-2: 14px;   /* label   */
      --fs-3: 16px;   /* title   */
      --type-caption: var(--fs-1);   /* best line · popover section headers */
      --type-label:   var(--fs-2);   /* answer buttons · picker cells */
      --type-title:   var(--fs-3);   /* cent readout · top chips · feedback · prompt */
      /* weight variants */
      --weight-standard:  500;   /* everything, for now */
      --weight-prominent: 600;   /* reserved — not used yet */
    }
    .abtn {
      flex: 1;
      touch-action: manipulation;
      background: transparent;
      border: 1px solid var(--btn-border-dim);
      color: var(--btn-dim);
      font-family: 'Rubik', system-ui, sans-serif;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .15s;
      pointer-events: none;
    }
    .abtn.ready {
      border-color: var(--btn-border-ready);
      color: var(--btn-ready);
      pointer-events: all;
    }
    .abtn.ready:active { background: var(--btn-press, rgba(247,242,232,.12)); }

    /* ── Overlay (tap-outside-to-close) ─────── */

    /* ── Settings panel ─────────────────────── */
    /* Side drawer — overlays from the right (does NOT push the app), no dim */
    #panel {
      position: fixed; top: 0; right: 0;
      width: min(270px, 84vw); height: 100%;
      background: rgba(36,36,34,.98); color: #f7f2e8;
      border-left: 1px solid rgba(247,242,232,.08);
      box-shadow: -10px 0 30px rgba(0,0,0,.35);
      transform: translateX(100%); transition: transform .22s ease;
      z-index: 25; font-size: 10px; letter-spacing: 1.5px;
      display: flex; flex-direction: column;
    }
    #panel.open { transform: translateX(0); }

    #panel-head {
      flex-shrink: 0; padding: 18px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(247,242,232,.07);
    }
    #panel-head h2 { font-size: 10px; letter-spacing: 3px; opacity: .35; font-weight: normal; }
    #pClose {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(247,242,232,.18); background: rgba(247,242,232,.05);
      color: rgba(247,242,232,.5); font-size: 13px; cursor: pointer; touch-action: manipulation;
    }
    #pClose:active { background: rgba(247,242,232,.15); }

    #panel-scroll { flex: 1; overflow-y: auto; padding: 6px 18px calc(24px + env(safe-area-inset-bottom, 0px)); }

    /* Collapsible sections */
    .psec-hdr {
      font-size: 9px; letter-spacing: 3px; opacity: .32; cursor: pointer;
      padding: 14px 0 10px;
      border-top: 1px solid rgba(247,242,232,.07);
      display: flex; align-items: center; gap: 7px;
      user-select: none; -webkit-user-select: none;
    }
    .psec-hdr:first-child { border-top: none; padding-top: 10px; }
    .psec-hdr:hover { opacity: .5; }
    .psec-arrow { font-size: 8px; opacity: .6; transition: transform .15s; }
    .psec-body { overflow: hidden; max-height: 1200px; transition: max-height .25s ease; }
    .psec-body.collapsed { max-height: 0; }

    .prow { margin-bottom: 11px; }
    .prow label { display: flex; justify-content: space-between; margin-bottom: 5px; opacity: .48; }
    .prow .v { opacity: .6; }
    .prow input[type="range"] { width: 100%; accent-color: #999; display: block; }
    /* Color rows: label left, compact swatch chip right */
    .prow:has(input[type="color"]) { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .prow:has(input[type="color"]) label { margin-bottom: 0; flex: 1; }
    .prow input[type="color"] {
      width: 30px; height: 24px; flex-shrink: 0; padding: 2px; border-radius: 6px;
      border: 1px solid rgba(247,242,232,.18); background: none; cursor: pointer;
    }
    .prow button, #panel-scroll button {
      font: 10px 'Courier New', monospace; letter-spacing: 1.5px;
      border: 1px solid rgba(247,242,232,.16); background: rgba(247,242,232,.04);
      color: rgba(247,242,232,.55); padding: 7px 10px; cursor: pointer; width: 100%;
    }
    .prow button:active, #panel-scroll button:active { background: rgba(247,242,232,.12); }
    #panel textarea {
      width: 100%; font: 10px 'Courier New', monospace;
      background: rgba(247,242,232,.03); color: rgba(247,242,232,.55);
      border: 1px solid rgba(247,242,232,.1); padding: 8px;
      resize: none; line-height: 1.5; margin-top: 10px;
    }
    .pbtn-row { display: flex; gap: 8px; margin-top: 8px; }
    .pbtn-row button { flex: 1; }
    .prow.check label { justify-content: flex-start; gap: 9px; cursor: pointer; margin-bottom: 0; }
    .prow.check input[type="checkbox"] { width: 15px; height: 15px; accent-color: #999; cursor: pointer; }
    .prow input[type="text"], .prow select {
      width: 100%; font: 11px 'Courier New', monospace; letter-spacing: 1px;
      background: rgba(247,242,232,.03); color: rgba(247,242,232,.7);
      border: 1px solid rgba(247,242,232,.12); padding: 7px 8px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <button id="gear" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div id="cent-col">
      <div id="centChip" aria-label="Threshold; tap to reset">
        <span id="threshold">—<span class="unit">¢</span></span>
        <span id="centConfirm">Reset?<button id="resetYes" aria-label="Confirm reset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 13l4 4L19 7"/></svg></button><button id="resetNo" aria-label="Cancel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg></button></span>
      </div>
      <div id="best"></div>
    </div>
  </div>
  <div id="header-right">
    <div id="niWrap">
      <button id="niBtn" aria-label="Notes and intervals"><span id="niLabel">All Notes &amp; Ints</span><span class="ni-caret">⌄</span></button>
      <div id="niScrim"></div>
      <div id="niPop">
        <div class="nip-sec">NOTE</div>
        <div class="nip-grid nip-notes">
          <button class="nip-cell nip-wide" data-note="rnd">All Notes</button>
          <button class="nip-cell" data-note="0">C</button><button class="nip-cell" data-note="1">C#</button>
          <button class="nip-cell" data-note="2">D</button><button class="nip-cell" data-note="3">D#</button>
          <button class="nip-cell" data-note="4">E</button><button class="nip-cell" data-note="5">F</button>
          <button class="nip-cell" data-note="6">F#</button><button class="nip-cell" data-note="7">G</button>
          <button class="nip-cell" data-note="8">G#</button><button class="nip-cell" data-note="9">A</button>
          <button class="nip-cell" data-note="10">A#</button><button class="nip-cell" data-note="11">B</button>
        </div>
        <div class="nip-sec">INTERVAL</div>
        <div class="nip-grid nip-ints">
          <button class="nip-cell" data-int="any">All</button>
          <button class="nip-cell" data-int="0">Uni</button><button class="nip-cell" data-int="5">4th</button>
          <button class="nip-cell" data-int="7">5th</button><button class="nip-cell" data-int="12">8ve</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="stage"><svg id="svg"></svg></div>

<div id="bottom">
  <div id="prompt"></div>
  <div id="answers">
    <button class="abtn" data-ans="flat">↓ flat</button>
    <button class="abtn" data-ans="in_tune">≈ in tune</button>
    <button class="abtn" data-ans="sharp">↑ sharp</button>
  </div>
  <div id="feedback"><div id="fbPill"><span id="fbLabel"></span><button id="fbTune" aria-label="Compare in tune"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></button><button id="fbNext" aria-label="Next round"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button></div></div>
</div>


<div id="panel">
  <div id="panel-head">
    <h2>VISUAL SETTINGS</h2>
    <button id="pClose">✕</button>
  </div>
  <div id="panel-scroll">

    <!-- HEADER (top bar) -->
    <div class="psec-hdr" onclick="toggleSec('hdr')">
      <span class="psec-arrow" id="arr-hdr">▾</span>HEADER
    </div>
    <div class="psec-body" id="sec-hdr">
      <div class="prow"><label>TOP OFFSET <span class="v" id="pHdrTopV"></span></label>
        <input type="range" id="pHdrTop" min="0" max="90" step="1" autocomplete="off"></div>
      <div class="prow"><label>TOP BTN COLOR</label>
        <input type="color" id="pHdrBtnCol" autocomplete="off"></div>
      <div class="prow"><label>TOP BTN BORDER</label>
        <input type="color" id="pHdrBtnBorder" autocomplete="off"></div>
      <div class="prow"><label>TOP BTN SIZE <span class="v" id="pHdrBtnSizeV"></span></label>
        <input type="range" id="pHdrBtnSize" min="26" max="48" step="1" autocomplete="off"></div>
      <div class="prow"><label>TOP BTN STROKE <span class="v" id="pHdrBtnStrokeV"></span></label>
        <input type="range" id="pHdrBtnStroke" min="0" max="4" step="0.5" autocomplete="off"></div>
      <div class="prow"><label>↺ GLYPH SIZE <span class="v" id="pRedoSizeV"></span></label>
        <input type="range" id="pRedoSize" min="10" max="28" step="1" autocomplete="off"></div>
      <div class="prow"><label>TOP TEXT SIZE <span class="v" id="pChipSizeV"></span></label>
        <input type="range" id="pChipSize" min="8" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>FONT</label>
        <select id="pHdrFont" autocomplete="off">
          <option value="Rubik">Rubik</option><option value="System">System</option>
          <option value="Serif">Serif</option><option value="Mono">Mono</option>
        </select></div>
      <div class="prow"><label>BEST SIZE <span class="v" id="pBestSizeV"></span></label>
        <input type="range" id="pBestSize" min="6" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>BEST OPACITY <span class="v" id="pBestOpV"></span></label>
        <input type="range" id="pBestOp" min="0" max="100" step="5" autocomplete="off"></div>
      <div class="prow"><label>GAP: CENT → BEST <span class="v" id="pBestGapV"></span></label>
        <input type="range" id="pBestGap" min="0" max="40" step="1" autocomplete="off"></div>
    </div>

    <!-- APPEARANCE -->
    <div class="psec-hdr" onclick="toggleSec('appearance')">
      <span class="psec-arrow" id="arr-appearance">▾</span>APPEARANCE
    </div>
    <div class="psec-body" id="sec-appearance">
      <div class="prow"><label>BACKGROUND</label>
        <input type="color" id="pBg" autocomplete="off"></div>
      <div class="prow"><label>BACKGROUND 2 (gradient)</label>
        <input type="color" id="pBgCol2" autocomplete="off"></div>
      <div class="prow"><label>BG GRADIENT ANGLE <span class="v" id="pBgAngleV"></span></label>
        <input type="range" id="pBgAngle" min="0" max="360" step="1" autocomplete="off"></div>
      <div class="prow"><label>STRING COLOR</label>
        <input type="color" id="pStrCol" autocomplete="off"></div>
      <div class="prow"><label>THICKNESS <span class="v" id="pStrWV"></span></label>
        <input type="range" id="pStrW" min="2" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>MUTED COLOR</label>
        <input type="color" id="pMutedCol" autocomplete="off"></div>
      <div class="prow"><label>MUTED OPACITY <span class="v" id="pMutedOpacityV"></span></label>
        <input type="range" id="pMutedOpacity" min="0" max="100" step="5" autocomplete="off"></div>
      <div class="prow"><label>MUTED BLEND</label>
        <select id="pMutedBlend" autocomplete="off">

let btnDimCol    = PALETTE.cream;   // dim (not-ready) state colour

let btnFont      = 'Rubik';  // family key (see FONT_STACKS)

let btnPadV      = 9;       // vertical padding px
let btnRadius    = 22;      // border-radius px

let btnAreaPad   = 28;      // padding around button row px

let rosetteRoundIn  = 24;   // roundness % of the INNER points (valleys)

let ringSpacing   = 8;      // px between rings

let innerBand     = true;   // thin circle just outside the hole

let bandW         = 2.5;    // band stroke px
let bandCol       = PALETTE.brown;

let bandFillCol   = '#eb7c48';  // that fill colour
let bridgeW      = 210;     // bridge plate width (fixed px)
let bridgeCol    = PALETTE.brown;
let saddleWFrac  = 0.65;    // saddle line width as fraction of the board
let saddleThick  = 5;       // px saddle line thickness
let saddleYOff   = 27;      // px the saddle sits above the bridge pin row
let saddleCol    = PALETTE.cream;
let pinCol       = PALETTE.cream;  // grommet outer disc
let pinHoleR     = 3;          // grommet inner hole radius
let pinHoleCol   = PALETTE.hole;  // grommet inner hole

const pillW        = () => pinR * 0.95;
const pillD        = () => pinR * 1.4;
const pinMargin    = () => pinR * 0.6;
const ghostW       = () => Math.max(1.5, strW * 0.35);
const vibDecay     = () => 0.3 + 5.7 * (1 - vibSustain / 100);

// ─────────────────────────────────────────────────────────────
// SVG state
// ─────────────────────────────────────────────────────────────
let W = 0, H = 0;
const cx  = [0, 0];
const vib = [false, false];
const grabY = [null, null];   // logical y where each string was last grabbed (null → bow at hole centre)
let mainPath = [], ghostEls = [], blurDev = [], grpEls = [], pinEls = [];
let bodyCircle = null, rosetteGrp = null, rosetteBands = [], bridgeGrp = null, saddleLine = null;
let rosetteAngle = 0;            // accumulates one notch per round → the rosette spin
// Whole-UI scale, stepped by viewport width (like Cmd +). Phones stay 1.0.
function uiScale() { const w = window.innerWidth; return w >= 1000 ? 1.30 : w >= 600 ? 1.15 : 1.0; }
const BRIDGE_PATH = 'M0.427937 7.39967L8.79791 60.3275C9.06274 62.0021 10.5063 63.2353 12.2017 63.2353C32.4322 63.2353 52.1332 69.0626 70.9013 76.6145C83.2111 81.5676 97.6181 86 109.758 86C121.897 86 136.304 81.5676 148.614 76.6145C167.382 69.0626 187.083 63.2353 207.314 63.2353C209.009 63.2353 210.453 62.0021 210.718 60.3275L219.088 7.39967C219.491 4.85148 219.692 3.57738 219.317 2.58547C218.988 1.71493 218.366 0.98639 217.557 0.525332C216.636 0 215.346 0 212.766 0H6.74938C4.16952 0 2.8796 0 1.95844 0.525332C1.14998 0.98639 0.527602 1.71493 0.198483 2.58547C-0.176517 3.57738 0.0249675 4.85148 0.427937 7.39967Z';

function xRatio(i) { return 0.5 + (i === 0 ? -1 : 1) * spacing / (2 * W); }
const bridgeCY = () => H * bridgePos;     // bridge pin row Y (bottom of the strings)
const holeCY   = () => bridgeCY() - holePos;  // soundhole/rosette sit holePos px above the pins

// Rosette as a rounded N-point star (Figma-style). Valleys sit `rosetteGap` out
// from the hole edge; peaks bump out a further `rosetteDepth`. Roundness is set
// per vertex type — rosetteRoundOut (lobe tips) and rosetteRoundIn (valleys),
// 0 = sharp … higher = rounder, bulgier.
function rosettePath(cx, cy, rv) {                   // rv = this ring's valley radius
  const n = Math.round(rosettePoints);
  if (n < 3 || rosetteDepth <= 0) {                 // degenerate → plain circle ring
    return `M ${(cx - rv).toFixed(2)} ${cy.toFixed(2)} `
         + `a ${rv} ${rv} 0 1 0 ${(2 * rv).toFixed(2)} 0 `
         + `a ${rv} ${rv} 0 1 0 ${(-2 * rv).toFixed(2)} 0 Z`;
  }
  const rp = rv + rosetteDepth;                     // peak radius (lobe tips)
  // Per-vertex handle scale: even index = outer point (peak), odd = inner point (valley).
  const sOut = (rosetteRoundOut / 100) * 1.3, sIn = (rosetteRoundIn / 100) * 1.3;
  const sFor = idx => (idx % 2 === 0 ? sOut : sIn);
  const pts = [];
  for (let i = 0; i < 2 * n; i++) {
    const ang = Math.PI * i / n - Math.PI / 2;      // first peak at top
    const r = (i % 2 === 0) ? rp : rv;
    pts.push([cx + r * Math.cos(ang), cy + r * Math.sin(ang)]);
  }
  // Closed Catmull-Rom spline; each vertex's handle is scaled by its own roundness.
  const m = pts.length;
  let d = `M ${pts[0][0].toFixed(2)} ${pts[0][1].toFixed(2)} `;
  for (let i = 0; i < m; i++) {
    const p0 = pts[(i - 1 + m) % m], p1 = pts[i], p2 = pts[(i + 1) % m], p3 = pts[(i + 2) % m];
    const s1 = sFor(i), s2 = sFor(i + 1);
    const c1x = p1[0] + (p2[0] - p0[0]) * s1 / 6, c1y = p1[1] + (p2[1] - p0[1]) * s1 / 6;
    const c2x = p2[0] - (p3[0] - p1[0]) * s2 / 6, c2y = p2[1] - (p3[1] - p1[1]) * s2 / 6;
    d += `C ${c1x.toFixed(2)} ${c1y.toFixed(2)} ${c2x.toFixed(2)} ${c2y.toFixed(2)} ${p2[0].toFixed(2)} ${p2[1].toFixed(2)} `;
  }
  return d + 'Z';

const ptr = { active: false, idx: -1, skip: -1, grabFx: 0, startX: 0, lastFx: 0, lastY: 0, stageTop: 0, moved: false };
const stringX     = i => W * xRatio(i);
const strumSlipPx = () => strumSlip * spacing;      // drag distance before a held string slips off
const canCatch    = j => !(j === 1 && !played[0]);  // target stays locked until the reference has sounded
const belowBoard  = localY => localY / uiScale() > strBotY() + vOffset / uiScale() + pinR;
function bendHeld(fx) {                               // bend follows the drag FROM the contact point (no snap)
  cx[ptr.idx] = Math.max(-bowAmount, Math.min(bowAmount, fx - ptr.grabFx));
  redraw(ptr.idx);
}
function grabString(j, fx, localY) {                 // catch string j at the finger
  grabY[j] = (localY - vOffset) / uiScale();
  if (vib[j]) { vibGen[j]++; vib[j] = false; cx[j] = 0; redraw(j); }   // silence a still-ringing string
  ptr.idx = j; ptr.grabFx = fx; bendHeld(fx);        // grabFx = contact point → starts at rest, no yank
}
function slipHeld() {                                 // the held string slips off the finger → it sounds
  const i = ptr.idx;
  pluckString(i, Math.max(Math.abs(cx[i]), bowAmount * TAP_FRAC));
  ptr.idx = -1; ptr.skip = i;
}
function nearestString(clientX, localY) {
  // A string only exists from the top of the board down to its bridge pin.
  // Ignore grabs below that line (bridge body, toast, button band) — otherwise
  // the string's hit area would span the whole stage height. (SVG is shifted by
  // vOffset, so the pin sits at strBotY() + vOffset in stage-local coords.)
  // Geometry is logical (viewBox scales by uiScale) — map the touch coords in.
  const S = uiScale();
  clientX /= S;
  if (localY != null && localY / S > strBotY() + vOffset / S + pinR) return -1;
  let best = -1, dist = Infinity;
  for (let i = 0; i < NUM_STRINGS; i++) {
    const d = Math.abs(clientX - W * xRatio(i));
    if (d < dist) { dist = d; best = i; }
  }
  return dist <= grabZone ? best : -1;
}
function onDown(clientX, clientY) {
  initAudio(); // pre-warm context as early as possible so resume() has time to complete
  if (!W || phase === 'feedback') return;
  ptr.stageTop = document.getElementById('stage').getBoundingClientRect().top;
  const localY = clientY - ptr.stageTop;
  if (belowBoard(localY)) return;              // presses below the strings don't start a gesture
  ptr.active = true; ptr.idx = -1; ptr.skip = -1;
  ptr.startX = clientX; ptr.lastFx = clientX / uiScale(); ptr.lastY = localY; ptr.moved = false;
  // Grab a string right under the finger (tap/pull); otherwise the drag stays free to
  // catch strings as it sweeps across them.
  const i = nearestString(clientX, localY);
  if (i >= 0 && canCatch(i)) grabString(i, clientX / uiScale(), localY);
}
function onMove(clientX, clientY) {
  if (!ptr.active) return;
  const fx = clientX / uiScale();
  const localY = clientY != null ? clientY - ptr.stageTop : ptr.lastY;
  ptr.lastY = localY;
  if (Math.abs(clientX - ptr.startX) > 4) ptr.moved = true;
  // Holding a string: apex follows the finger's y, bend follows its x, and it slips
  // off once dragged far enough.
  if (ptr.idx >= 0) {
    grabY[ptr.idx] = Math.min(strBotY() - 4, (localY - vOffset) / uiScale());   // bend where the finger is
    bendHeld(fx);
    if (Math.abs(fx - ptr.grabFx) >= strumSlipPx()) slipHeld();                 // slipped once dragged far enough
  }
  // Free hand: catch a string as the finger reaches/crosses its line. A pull that
  // continues all the way to the other string strums it; a short pluck (which never
  // reaches it) doesn't. Tight tolerance + crossing = no magnet, no accidental catch.
  if (ptr.idx < 0 && !belowBoard(localY)) {
    const touch = Math.max(strW * 2, 10);
    let pick = -1, pd = Infinity;
    for (let j = 0; j < NUM_STRINGS; j++) {
      if (j === ptr.skip || !canCatch(j)) continue;
      const xj = stringX(j), d = Math.abs(fx - xj);
      const crossed = (xj - ptr.lastFx) * (xj - fx) <= 0;   // finger swept over the string this move
      if ((crossed || d <= touch) && d < pd) { pick = j; pd = d; }
    }
    if (pick >= 0) grabString(pick, fx, localY);
    // Release the skip lock once the finger has moved off the just-slipped string.
    if (ptr.skip >= 0 && Math.abs(fx - stringX(ptr.skip)) > Math.max(strW * 2, 10)) ptr.skip = -1;
  }
  ptr.lastFx = fx;
}
function onUp(e) {
  if (!ptr.active) return;
  // A release landing on the answer buttons isn't a string release. Drop it
  // silently instead of letting a button tap fire a phantom pluck.
  if (e && e.target && e.target.closest && e.target.closest('#answers')) {
    ptr.active = false; ptr.idx = -1; ptr.skip = -1; return;
  }
  const i = ptr.idx; ptr.active = false; ptr.idx = -1; ptr.skip = -1;
  // Lift while holding a string → it sounds. Strength scales with the bow, floored
  // at a light tap so small drags never land in a silent dead zone. Free hand → nothing.
  if (i >= 0) pluckString(i, Math.max(Math.abs(cx[i]), bowAmount * TAP_FRAC));
}
// Gesture interrupted (OS gesture, scroll takeover, focus loss): drop it without
// sounding, so it can't linger and fire on the next unrelated release.
function onCancel() { ptr.active = false; ptr.idx = -1; ptr.skip = -1; }
const stage = document.getElementById('stage');
// Strings run up behind the (transparent) header, so accept grabs there too — the
// header's buttons stopPropagation below so they still capture their own taps.
[stage, document.getElementById('header')].forEach(el => {
  el.addEventListener('mousedown',  e => onDown(e.clientX, e.clientY));
  el.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
});
['gear', 'centChip', 'niWrap'].forEach(id => ['mousedown', 'touchstart'].forEach(evt =>
  document.getElementById(id).addEventListener(evt, e => e.stopPropagation())));
window.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
window.addEventListener('mouseup',   onUp);
window.addEventListener('touchmove',  e => { if (!ptr.active) return; e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
window.addEventListener('touchend',  onUp);
window.addEventListener('touchcancel', onCancel);
window.addEventListener('blur', onCancel);
window.addEventListener('resize', () => {
  applyHeader(); applyButtonStyles();   // re-scale the chrome when the viewport tier changes
  buildSVG();
});

// ─────────────────────────────────────────────────────────────
// Game logic
// ─────────────────────────────────────────────────────────────
const ROOT = 440, MAX_D = 50, MIN_D = 1;
const START_DEV = 20;   // fixed easy warm-up each session (ignores best; staircase ratchets down from here)
const LS_GAME = 'pitch-game-v1';
let deviation = MAX_D, bestDev = MAX_D, phase = 'play', roundDir = 'sharp';
let compareInTune = false, compareChallengeFreq = 0;   // wrong-answer review: snap the target string in/out of tune
let lastCorrect = null, oscillations = 0, wrongStreak = 0, advanceTimer = null;
// Reference note for the exercise. ROOT (440) is A4; rootSemi 0=C…11=B.
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
let rootSemi = 9, rootOct = 4;   // A4 by default
let randomNote = true, lastRandSemi = -1;    // RND mode (default): a fresh pitch class each round
function noteFreq() { return ROOT * Math.pow(2, (rootOct - 4) + (rootSemi - 9) / 12); }
function pickRandomNote() {
  let s;
  do { s = Math.floor(Math.random() * 12); } while (s === lastRandSemi);
  lastRandSemi = s; rootSemi = s;
}
// Interval between the two strings (semitones above the root). ANY INT draws from the pool.
const INTERVAL_POOL = [0, 5, 7, 12];   // unison, P4, P5, octave
let intervalSemi = 0, randomInterval = false, lastRandInt = -1;
function pickRandomInterval() {
  let v;
  do { v = INTERVAL_POOL[Math.floor(Math.random() * INTERVAL_POOL.length)]; } while (v === lastRandInt);
  lastRandInt = v; intervalSemi = v;
}
const ANSWER_WORD = { sharp: 'sharp', flat: 'flat', in_tune: 'in tune' };
const FB_CORRECT = [
  "Great! Correct", "Yay, you got it!", "Nice ear!", "Spot on!", "Nailed it!",
  "Yes! Correct", "Well done!", "Perfect!", "That's it!", "Right on!"
];
const FB_INCORRECT = [
  "Oops, it was {ans}", "Uh-oh, it was {ans}", "Nope, that was {ans}", "Not quite — {ans}",
  "So close! It was {ans}", "Actually, {ans}", "Hmm, {ans}", "Try again — it was {ans}",
  "Almost! It was {ans}", "Nice try — it was {ans}"
];
let lastFbMsg = '';
function pickMsg(list) {
  let m;
  do { m = list[Math.floor(Math.random() * list.length)]; } while (list.length > 1 && m === lastFbMsg);
  lastFbMsg = m;
  return m;
}

function loadGame() {
  // Note selection is intentionally NOT persisted — every load starts at RND.
  try { const s = JSON.parse(localStorage.getItem(LS_GAME)); if (s?.best != null) bestDev = +s.best; } catch(e) {}
}
function saveGame() { localStorage.setItem(LS_GAME, JSON.stringify({ best: bestDev })); }
function fmt(c) { return c >= 10 ? Math.round(c) : c.toFixed(1); }

function updateHeader() {
  document.getElementById('threshold').innerHTML = `±${fmt(deviation)}<span class="unit">¢</span>`;
  document.getElementById('best').textContent = bestDev < MAX_D ? `best  ±${fmt(bestDev)}¢` : '';
}
// The target (right) string stays dimmed + unpluckable until the reference (left) is played.
function applyMute() {
  if (!mainPath[1]) return;
  const el = mainPath[1], s = el.style;   // style overrides the attribute stroke; pin stays opaque
  if (!played[0]) {              // muted — snap (transition off → set → reflow → re-arm) so round-starts don't smear
    s.transition = 'none';
    s.stroke = mutedCol; s.strokeOpacity = mutedOpacity / 100; s.mixBlendMode = mutedBlend;
    void el.getBoundingClientRect();
    s.transition = 'stroke .45s ease, stroke-opacity .45s ease';
  } else {                       // revealed — the armed transition eases the string up to full yellow
    s.stroke = strCol; s.strokeOpacity = '1'; s.mixBlendMode = 'normal';
  }
}
function setButtonsReady(ready) {
  document.querySelectorAll('.abtn').forEach(b => ready ? b.classList.add('ready') : b.classList.remove('ready'));
}
// The bottom bar shows exactly one region at a time: the prompt, the answer
// buttons, or the feedback pill.
function setBottom(state) {   // 'prompt' | 'answers' | 'feedback'
  document.getElementById('prompt').classList.toggle('active',   state === 'prompt');
  document.getElementById('answers').classList.toggle('active',  state === 'answers');
  document.getElementById('feedback').classList.toggle('active', state === 'feedback');
}
// "Play strings" is the teaching prompt — shown only on the first round of the
// session. Once the player has completed a round, it drops to the terser "Ready".
let taughtPlay = false;
function showPrompt() {
  document.getElementById('prompt').textContent = taughtPlay ? 'Ready' : 'Play strings';
  setBottom('prompt');
}
function setRoundFreqs() {
  const root = noteFreq();
  const target = root * Math.pow(2, intervalSemi / 12);   // the chosen interval's in-tune frequency
  stringFreqs[0] = root;
  stringFreqs[1] = roundDir === 'sharp'  ? target * Math.pow(2,  deviation / 1200)
                 : roundDir === 'flat'   ? target * Math.pow(2, -deviation / 1200)
                 : target;
}
// Ratchet the rosette one notch (one lobe-step) per round, easing into place.
function rosetteNotch() { const n = Math.round(rosettePoints); return 360 / (n >= 3 ? n : 8); }
function bumpRosette() {
  if (!rosetteGrp) return;
  rosetteAngle += rosetteNotch();
  rosetteGrp.style.transition = 'transform .7s cubic-bezier(.16, 1, .3, 1)';   // heavy ease-out (easeOutExpo)
  rosetteGrp.style.transform  = 'rotate(' + rosetteAngle + 'deg)';
}
function newRound() {
  const inTuneP = 0.1 + 0.2 * (1 - Math.min(deviation, MAX_D) / MAX_D);
  const r = Math.random();
  roundDir = r < inTuneP ? 'in_tune' : Math.random() < 0.5 ? 'sharp' : 'flat';
  if (randomNote) pickRandomNote();         // fresh pitch class each round in ANY NOTE mode
  if (randomInterval) pickRandomInterval(); // fresh interval each round in ANY INT mode
  setRoundFreqs();
  phase = 'play'; hasPlucked = false; played[0] = played[1] = false;
  setButtonsReady(false); showPrompt(); updateHeader();
  bumpRosette();                              // rosette ratchets a notch each round
  applyMute();                                // target muted again until the reference is played
}
// ── Notes × intervals selector: one button + custom grid popover ──
const NI_WRAP  = document.getElementById('niWrap');
const NI_BTN   = document.getElementById('niBtn');
const NI_LABEL = document.getElementById('niLabel');
const NI_POP   = document.getElementById('niPop');
const NI_SCRIM = document.getElementById('niScrim');
const INT_NAMES  = { 0: 'Uni', 5: '4th', 7: '5th', 12: '8ve' };
const INT_PLURAL = { 5: '4ths', 7: '5ths', 12: '8ves' };

// Compact, human-readable label for the current note × interval selection.
function selLabel() {
  const isUni = !randomInterval && intervalSemi === 0;
  if (randomNote && randomInterval) return 'All Notes & Ints';
  if (randomNote && isUni)          return 'All Notes';
  if (randomNote)                   return INT_PLURAL[intervalSemi];   // any note, fixed interval → "5ths"
  const n = NOTE_NAMES[rootSemi];
  if (randomInterval)               return n + ' · All Ints';
  if (isUni)                        return n;                          // unison → just the note
  return n + ' · ' + INT_NAMES[intervalSemi];
}
// Push state → button label + highlight the live cells in the grid.
function updateSel() {
  NI_LABEL.textContent = selLabel();
  const noteVal = randomNote ? 'rnd' : String(rootSemi);
  const intVal  = randomInterval ? 'any' : String(intervalSemi);
  NI_POP.querySelectorAll('[data-note]').forEach(c => c.classList.toggle('sel', c.dataset.note === noteVal));
  NI_POP.querySelectorAll('[data-int]').forEach(c => c.classList.toggle('sel', c.dataset.int === intVal));
}
function selectNote(v) {
  if (v === 'rnd') { randomNote = true; pickRandomNote(); }
  else             { randomNote = false; rootSemi = +v; }
  setRoundFreqs(); updateSel();       // retune the current round to the picked note
}
function selectInt(v) {
  if (v === 'any') { randomInterval = true; pickRandomInterval(); }
  else             { randomInterval = false; intervalSemi = +v; }
  setRoundFreqs(); updateSel();       // retune the current round to the picked interval
}

// Open/close — a transparent full-screen scrim catches the outside tap (no dim,
// and it swallows the tap so the board doesn't pluck on dismiss).
function openNiPop()  { NI_WRAP.classList.add('open'); }
function closeNiPop() { NI_WRAP.classList.remove('open'); }
NI_BTN.addEventListener('click', () => NI_WRAP.classList.contains('open') ? closeNiPop() : openNiPop());
NI_SCRIM.addEventListener('click', closeNiPop);

// Cell taps: handle touchend directly and guard the synthesized click (reliable on iOS).
// Selecting does NOT close the popover — pick a note and an interval, then tap outside.
let niTouched = false;
function onCellTap(e) {
  const cell = e.target.closest('.nip-cell');
  if (!cell) return;
  e.preventDefault();
  if (cell.dataset.note !== undefined)     selectNote(cell.dataset.note);
  else if (cell.dataset.int !== undefined) selectInt(cell.dataset.int);
}
NI_POP.addEventListener('touchend', e => { niTouched = true; onCellTap(e); setTimeout(() => niTouched = false, 400); }, { passive: false });
NI_POP.addEventListener('click', e => { e.stopPropagation(); if (!niTouched) onCellTap(e); });
// Soft reset: restart the run at the easiest level and clear the streak, but keep
// the best score. Triggered by the ↺ next to the cent readout.
function resetExercise() {
  clearTimeout(advanceTimer);
  deviation = MAX_D; wrongStreak = 0; oscillations = 0; lastCorrect = null;
  newRound(); resetStrings();
}
function adjust(correct) {
  if (lastCorrect !== null && lastCorrect !== correct) oscillations = Math.min(oscillations + 1, 10);
  else oscillations = Math.max(0, oscillations - 1);
  lastCorrect = correct;
  if (correct) {
    deviation = Math.max(MIN_D, deviation * (oscillations > 4 ? 0.90 : 0.75));
    if (deviation < bestDev) { bestDev = deviation; saveGame(); }
  } else {
    const bigStep  = wrongStreak >= 4;
    const tightStep = oscillations > 4;
    deviation = Math.min(MAX_D, deviation * (bigStep ? 1.8 : tightStep ? 1.1 : 1.3));
  }
}
function answer(userAns) {
  if (phase !== 'play' || !bothPlayed()) return;   // must hear reference + target before answering
  const correct = userAns === roundDir;
  adjust(correct);
  wrongStreak = correct ? 0 : wrongStreak + 1;   // feeds the "4 wrong in a row → bigger step" rule
  setButtonsReady(false); updateHeader();
  showFeedback(correct);
  if (correct) {
    phase = 'feedback';                       // brief lockout, then auto-advance
    celebrateRosette();                       // quick brown ripple out of the soundhole
    clearTimeout(advanceTimer);
    advanceTimer = setTimeout(advance, toastHold);
  } else {
    phase = 'review';                         // stay: re-pluck to listen, tap › to move on
  }
}
function advance() { clearTimeout(advanceTimer); hideFeedback(); newRound(); resetStrings(); }
function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  document.getElementById('fbLabel').textContent = correct
    ? pickMsg(FB_CORRECT)
    : pickMsg(FB_INCORRECT).replace('{ans}', ANSWER_WORD[roundDir]);
  fb.classList.toggle('has-next', !correct);
  // Wrong answer → arm the in-tune review: remember the challenge tuning, start toggled off.
  if (!correct) { compareInTune = false; compareChallengeFreq = stringFreqs[1]; }
  styleFeedback();
  setBottom('feedback');
}
function hideFeedback() { document.getElementById('feedback').classList.remove('active'); }
function styleFeedback() {
  const fb = document.getElementById('feedback');
  const pill = document.getElementById('fbPill'), lbl = document.getElementById('fbLabel');
  fb.style.transition = `opacity ${toastFade}ms ease`;
  // No pill — the message is plain cream text in the answer-button label style.
  pill.style.background = 'transparent';
  pill.style.transform = `scale(${uiScale()})`;
  pill.style.gap = '12px';
  pill.style.fontFamily = fontStack(btnFont);
  // Correct answers glow in the string yellow; wrong answers stay cream.
  lbl.style.color = document.getElementById('feedback').classList.contains('has-next') ? 'var(--btn-ready)' : strCol;
  lbl.style.fontSize = 'var(--type-title)';   // type token — decoupled from the button size
  lbl.style.letterSpacing = (btnTracking / 100) + 'em';
  lbl.style.textTransform = btnCase;
  lbl.style.fontWeight = 'var(--weight-standard)';
  paintTune();   // ♪/› colour + border come from CSS vars
}
// In-tune review toggle: silently re-tune the target string to perfect (on) or back to
// the challenge (off). No sound on tap — the player plucks the strings to compare.
function paintTune() {
  const t = document.getElementById('fbTune');
  if (compareInTune) { t.style.background = 'var(--btn-ready)'; t.style.color = bodyColor; }   // lit: in-tune tuning active
  else               { t.style.background = 'transparent'; t.style.color = 'var(--btn-ready)'; } // ghost: question's tuning
}
function toggleCompare() {
  compareInTune = !compareInTune;
  stringFreqs[1] = compareInTune
    ? noteFreq() * Math.pow(2, intervalSemi / 12)   // perfect target (root unchanged)
    : compareChallengeFreq;                          // back to exactly what played
  paintTune();
}
// Answer buttons: fire from touchend directly (more reliable on iOS than the
// synthesized click), with a per-button guard so desktop click doesn't double-fire.
// They're pointer-events:none until ready, so touchend only lands when tappable.
document.querySelectorAll('.abtn').forEach(b => {
  let touched = false;
  b.addEventListener('touchend', e => {
    e.preventDefault(); touched = true; answer(b.dataset.ans);
    setTimeout(() => { touched = false; }, 400);
  }, { passive: false });
  b.addEventListener('click', () => { if (!touched) answer(b.dataset.ans); });
});
// After a wrong answer, ONLY the › chevron advances — the message stays put while
// you toggle ♪ and re-pluck as much as you like. touchend-first for iOS, guarded
// so desktop click doesn't double-fire.
{
  const nextBtn = document.getElementById('fbNext');
  let nextTouched = false;
  nextBtn.addEventListener('touchend', e => {
    e.preventDefault(); e.stopPropagation(); nextTouched = true; advance();
    setTimeout(() => { nextTouched = false; }, 400);
  }, { passive: false });
  nextBtn.addEventListener('click', e => { e.stopPropagation(); if (!nextTouched) advance(); });
}

// The ≈ toggle handles its own taps (flip the target in/out of tune) and must NOT
// advance — so stop the tap from reaching the pill's advance handler. touchend-first
// for iOS, with a guard so desktop click doesn't double-fire.
{
  const tuneBtn = document.getElementById('fbTune');
  let tuneTouched = false;
  tuneBtn.addEventListener('touchend', e => {
    e.preventDefault(); e.stopPropagation(); tuneTouched = true; toggleCompare();
    setTimeout(() => { tuneTouched = false; }, 400);
  }, { passive: false });
  tuneBtn.addEventListener('click', e => { e.stopPropagation(); if (!tuneTouched) toggleCompare(); });
}

const LS_VIS = 'pitch-game-settings-v1';

// Side drawer overlays the app (no push); no overlay, so only the × closes it.

document.getElementById('pClose').addEventListener('click', closePanel);

// Cent readout doubles as the reset button: tap → inline "RESET? ✓ ✕"
{
  const chip = document.getElementById('centChip');
  const yes = document.getElementById('resetYes'), no = document.getElementById('resetNo');
  let armed = false, armTimer = 0;
  const disarm = () => { armed = false; chip.classList.remove('confirming'); clearTimeout(armTimer); };
  const arm = () => { armed = true; chip.classList.add('confirming'); clearTimeout(armTimer); armTimer = setTimeout(disarm, 5000); };
  chip.addEventListener('click', e => { if (e.target === yes || e.target === no) return; armed ? disarm() : arm(); });
  yes.addEventListener('click', e => { e.stopPropagation(); disarm(); resetExercise(); });
  no.addEventListener('click',  e => { e.stopPropagation(); disarm(); });
  document.addEventListener('click', e => { if (armed && !chip.contains(e.target)) disarm(); });
}

function syncPanel() {
  const g = id => document.getElementById(id);
  g('pBg').value       = bg;
  g('pBgCol2').value   = bgCol2;

on('pBtnColor',  e => { btnColor   = e.target.value; applyButtonStyles(); });
on('pBtnDimCol', e => { btnDimCol  = e.target.value; applyButtonStyles(); });
on('pBtnPressBg',e => { btnPressBg = e.target.value; applyButtonStyles(); });
on('pBtnFamily', e => { btnFont    = e.target.value; applyButtonStyles(); });
on('pBtnWeight', e => { btnWeight  = +e.target.value; document.getElementById('pBtnWeightV').textContent = btnWeight; applyButtonStyles(); });
on('pBtnCase',   e => { btnCase    = e.target.value; applyButtonStyles(); });
on('pBtnFont',   e => { btnFontSize= +e.target.value; document.getElementById('pBtnFontV').textContent = btnFontSize+'px'; applyButtonStyles(); });
on('pBtnTrack',  e => { btnTracking= +e.target.value; document.getElementById('pBtnTrackV').textContent= (btnTracking/100).toFixed(2)+'em'; applyButtonStyles(); });
on('pBtnPad',    e => { btnPadV    = +e.target.value; document.getElementById('pBtnPadV').textContent  = btnPadV+'px'; applyButtonStyles(); });
on('pBtnRad',    e => { btnRadius  = +e.target.value; document.getElementById('pBtnRadV').textContent  = btnRadius+'px'; applyButtonStyles(); });
on('pBtnBorder', e => { btnBorderW = +e.target.value; document.getElementById('pBtnBorderV').textContent= btnBorderW+'px'; applyButtonStyles(); });
on('pBtnGap',    e => { btnGap     = +e.target.value; document.getElementById('pBtnGapV').textContent  = btnGap+'px'; applyButtonStyles(); });
on('pBtnAreaPad',e => { btnAreaPad = +e.target.value; document.getElementById('pBtnAreaPadV').textContent= btnAreaPad+'px'; applyButtonStyles(); });
on('pBtnMinW',   e => { btnMinW    = +e.target.value; document.getElementById('pBtnMinWV').textContent  = btnMinW+'px'; applyButtonStyles(); });
on('pBtnMaxW',   e => { btnMaxW    = +e.target.value; document.getElementById('pBtnMaxWV').textContent  = btnMaxW+'px'; applyButtonStyles(); });
on('pToastHold',   e => { toastHold    = +e.target.value; document.getElementById('pToastHoldV').textContent = (toastHold/1000).toFixed(2)+'s'; });
on('pToastFade',   e => { toastFade    = +e.target.value; document.getElementById('pToastFadeV').textContent = toastFade+'ms'; document.getElementById('feedback').style.transition = `opacity ${toastFade}ms ease`; });
on('pHdrFont',     e => { hdrFont      = e.target.value; applyHeader(); });
on('pBestSize',    e => { bestSize     = +e.target.value; document.getElementById('pBestSizeV').textContent = bestSize+'px'; applyHeader(); });
on('pBestOp',      e => { bestOp       = +e.target.value; document.getElementById('pBestOpV').textContent = bestOp+'%'; applyHeader(); });
on('pHdrTop',      e => { hdrTop       = +e.target.value; document.getElementById('pHdrTopV').textContent = hdrTop+'px'; applyHeader(); });
on('pHdrBtnCol',   e => { hdrBtnCol    = e.target.value; applyHeader(); });
on('pHdrBtnBorder',e => { hdrBtnBorder = e.target.value; applyHeader(); });
on('pHdrBtnSize',  e => { hdrBtnSize   = +e.target.value; document.getElementById('pHdrBtnSizeV').textContent = hdrBtnSize+'px'; applyHeader(); });
on('pHdrBtnStroke',e => { hdrBtnStroke = +e.target.value; document.getElementById('pHdrBtnStrokeV').textContent = hdrBtnStroke+'px'; applyHeader(); });
on('pRedoSize',    e => { redoGlyphSize= +e.target.value; document.getElementById('pRedoSizeV').textContent = redoGlyphSize+'px'; applyHeader(); });
on('pChipSize',    e => { chipTextSize = +e.target.value; document.getElementById('pChipSizeV').textContent = chipTextSize+'px'; applyHeader(); });
on('pBestGap',     e => { bestGap      = +e.target.value; document.getElementById('pBestGapV').textContent = bestGap+'px'; applyHeader(); });
on('pVOff',      e => { vOffset    = +e.target.value; document.getElementById('pVOffV').textContent     = vOffset+'px'; applyVOffset(); });

// Keep textarea live when any slider moves
document.getElementById('panel-scroll').addEventListener('input',
  () => document.getElementById('pJson').value = JSON.stringify(currentVis()));

document.getElementById('pSave').addEventListener('click', () => {
  saveVis();
  const b = document.getElementById('pSave');
  b.textContent = 'SAVED ✓'; setTimeout(() => b.textContent = 'SET AS DEFAULT', 1500);
});
document.getElementById('pReset').addEventListener('click', () => {
  // Clear the saved snapshot so the code-baked defaults load fresh
  localStorage.removeItem(LS_VIS);
  location.reload();
});
document.getElementById('pCopy').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('pJson').value)
    .then(() => { const b=document.getElementById('pCopy'); b.textContent='COPIED ✓'; setTimeout(()=>b.textContent='COPY',1500); })
    .catch(() => { const ta=document.getElementById('pJson'); ta.select(); document.execCommand('copy'); });
});
document.getElementById('pApply').addEventListener('click', () => {
  try {
    applyVisObj(JSON.parse(document.getElementById('pJson').value));
    syncPanel(); applyBg(); applyColors(); applyStringWidth();
    applyBody(); applyHeader(); applyButtonStyles(); buildSVG();
  } catch(e) {}
});

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
loadVis(); loadGame();
deviation = START_DEV;   // always begin at the fixed easy step, regardless of best
applyBg();
applyHeader();
updateSel();
applyButtonStyles();  // size the buttons first so #answers has its final height…
buildSVG();           // …then buildSVG measures it correctly for vertical centering
newRound();
// Start with every panel section collapsed
document.querySelectorAll('.psec-body').forEach(b => b.classList.add('collapsed'));
document.querySelectorAll('.psec-arrow').forEach(a => a.textContent = '▸');
// Web font (Rubik) loads async and nudges the buttons-bar height — recenter once ready
if (document.fonts && document.fonts.ready) document.fonts.ready.then(applyVOffset);
</script>
</body>
</html>
