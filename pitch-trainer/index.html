<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pitch Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100vw; height: 100dvh; overflow: hidden;
      background: #444444; color: #ebebeb;
      font-family: 'Rubik', system-ui, sans-serif;
      touch-action: none; user-select: none; -webkit-user-select: none;
      display: flex; flex-direction: column;
    }

    /* ── Header ────────────────────────────── */
    #header {
      flex-shrink: 0; min-height: 58px;
      /* safe-area clears the notch/status bar; --hdr-top is a manual nudge on top of that */
      padding: calc(env(safe-area-inset-top, 0px) + var(--hdr-top, 0px)) 20px 6px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 5;   /* sits above the strings that run up to the top */
    }
    #threshold-row { display: flex; align-items: center; gap: 11px; }
    #threshold { font-size: 22px; letter-spacing: 0.5px; opacity: .85; }
    #threshold .unit { font-size: 13px; opacity: .45; margin-left: 1px; }
    #reset {
      width: 34px; height: 34px; border-radius: 50%; padding: 0;
      border: 1px solid rgba(235,235,235,.2); background: rgba(235,235,235,.06);
      color: rgba(235,235,235,.5); font-size: 16px; line-height: 1; cursor: pointer;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    #reset:active { background: rgba(235,235,235,.15); color: rgba(235,235,235,.85); }
    #best { font-size: 10px; letter-spacing: 2px; opacity: .3; margin-top: 3px; }
    #header-right { display: flex; align-items: center; gap: 12px; }
    #history { display: flex; gap: var(--dot-gap, 6px); align-items: center; margin-top: 8px; }
    .dot { width: var(--dot-size, 7px); height: var(--dot-size, 7px); border-radius: 50%; background: rgba(235,235,235,.14); transition: background .3s; }
    .dot.ok  { background: color-mix(in srgb, var(--dot-ok, #ebebeb) 75%, transparent); }
    .dot.err { background: color-mix(in srgb, var(--dot-err, #ff6464) 65%, transparent); }
    #gear {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(235,235,235,.2); background: rgba(235,235,235,.06);
      color: rgba(235,235,235,.5); font: 8px 'Courier New', monospace;
      letter-spacing: 1px; cursor: pointer; flex-shrink: 0; touch-action: manipulation;
    }
    #gear:active { background: rgba(235,235,235,.15); }
    #noteChip {
      min-width: 52px; height: 34px; border-radius: 17px; padding: 0 14px;
      border: 1px solid rgba(235,235,235,.2); background: rgba(235,235,235,.06);
      color: rgba(235,235,235,.62); font-family: 'Rubik', system-ui, sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: .5px; cursor: pointer;
      flex-shrink: 0; touch-action: manipulation;
    }
    #noteChip:active { background: rgba(235,235,235,.15); color: rgba(235,235,235,.9); }

    /* ── Stage ──────────────────────────────── */
    #stage { flex: 1; position: relative; overflow: visible; }
    #svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
    #feedback {
      position: absolute; left: 0; right: 0; text-align: center; z-index: 2;
      opacity: 0; transition: opacity .25s ease; pointer-events: none;
    }
    #feedback.show { opacity: 1; }
    #fbPill {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Rubik', system-ui, sans-serif;
      border-radius: 999px; padding: var(--tpv, 12px) var(--tph, 22px);
      transform-origin: center; touch-action: manipulation;
    }
    /* During review the whole pill is the tap target (advance), not just the › */
    #feedback.has-next #fbPill { padding-right: 8px; pointer-events: auto; cursor: pointer; }
    #fbNext {
      display: none; align-items: center; justify-content: center;
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%;
      pointer-events: none;
      border: none; font-family: inherit; line-height: 1; padding: 0;
    }
    #feedback.has-next #fbNext { display: inline-flex; }
    #toastPrev { display: flex; justify-content: center; padding: 4px 0; }

    /* ── Answer buttons ─────────────────────── */
    #answers { flex-shrink: 0; display: flex; justify-content: center; }

    :root {
      --btn-ready:        rgba(235,235,235, .80);
      --btn-dim:          rgba(235,235,235, .18);
      --btn-border-ready: rgba(235,235,235, .55);
      --btn-border-dim:   rgba(235,235,235, .10);
    }
    .abtn {
      flex: 1;
      touch-action: manipulation;
      background: transparent;
      border: 1px solid var(--btn-border-dim);
      color: var(--btn-dim);
      font-family: 'Rubik', system-ui, sans-serif;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .15s;
      pointer-events: none;
    }
    .abtn.ready {
      border-color: var(--btn-border-ready);
      color: var(--btn-ready);
      pointer-events: all;
    }
    .abtn.ready:active { background: rgba(235,235,235,.07); }

    /* ── Overlay (tap-outside-to-close) ─────── */
    #overlay {
      position: fixed; inset: 0; z-index: 24;
      background: rgba(0,0,0,0); pointer-events: none;
      transition: background .22s;
    }
    #overlay.on { pointer-events: all; background: rgba(0,0,0,.25); }

    /* ── Settings panel ─────────────────────── */
    #panel {
      position: fixed; top: 0; right: 0;
      width: min(270px, 84vw); height: 100%;
      background: rgba(36,36,34,.98); color: #ebebeb;
      border-left: 1px solid rgba(235,235,235,.08);
      box-shadow: -10px 0 30px rgba(0,0,0,.35);
      transform: translateX(100%); transition: transform .22s ease;
      z-index: 25; font-size: 10px; letter-spacing: 1.5px;
      display: flex; flex-direction: column;
    }
    #panel.open { transform: translateX(0); }

    #panel-head {
      flex-shrink: 0; padding: 18px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(235,235,235,.07);
    }
    #panel-head h2 { font-size: 10px; letter-spacing: 3px; opacity: .35; font-weight: normal; }
    #pClose {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(235,235,235,.18); background: rgba(235,235,235,.05);
      color: rgba(235,235,235,.5); font-size: 13px; cursor: pointer;
    }
    #pClose:active { background: rgba(235,235,235,.15); }

    #panel-scroll { flex: 1; overflow-y: auto; padding: 6px 18px 24px; }

    /* Collapsible sections */
    .psec-hdr {
      font-size: 9px; letter-spacing: 3px; opacity: .32; cursor: pointer;
      padding: 14px 0 10px;
      border-top: 1px solid rgba(235,235,235,.07);
      display: flex; align-items: center; gap: 7px;
      user-select: none; -webkit-user-select: none;
    }
    .psec-hdr:first-child { border-top: none; padding-top: 10px; }
    .psec-hdr:hover { opacity: .5; }
    .psec-arrow { font-size: 8px; opacity: .6; transition: transform .15s; }
    .psec-body { overflow: hidden; max-height: 1200px; transition: max-height .25s ease; }
    .psec-body.collapsed { max-height: 0; }

    .prow { margin-bottom: 18px; }
    .prow label { display: flex; justify-content: space-between; margin-bottom: 8px; opacity: .48; }
    .prow .v { opacity: .6; }
    .prow input[type="range"] { width: 100%; accent-color: #999; }
    .prow input[type="color"] {
      width: 100%; height: 26px; padding: 2px;
      border: 1px solid rgba(235,235,235,.12); background: none; cursor: pointer;
    }
    .prow button, #panel button {
      font: 10px 'Courier New', monospace; letter-spacing: 1.5px;
      border: 1px solid rgba(235,235,235,.16); background: rgba(235,235,235,.04);
      color: rgba(235,235,235,.55); padding: 7px 10px; cursor: pointer; width: 100%;
    }
    .prow button:active, #panel button:active { background: rgba(235,235,235,.12); }
    #panel textarea {
      width: 100%; font: 10px 'Courier New', monospace;
      background: rgba(235,235,235,.03); color: rgba(235,235,235,.55);
      border: 1px solid rgba(235,235,235,.1); padding: 8px;
      resize: none; line-height: 1.5; margin-top: 10px;
    }
    .pbtn-row { display: flex; gap: 8px; margin-top: 8px; }
    .pbtn-row button { flex: 1; }
    .prow.check label { justify-content: flex-start; gap: 9px; cursor: pointer; margin-bottom: 0; }
    .prow.check input[type="checkbox"] { width: 15px; height: 15px; accent-color: #999; cursor: pointer; }
    .prow input[type="text"], .prow select {
      width: 100%; font: 11px 'Courier New', monospace; letter-spacing: 1px;
      background: rgba(235,235,235,.03); color: rgba(235,235,235,.7);
      border: 1px solid rgba(235,235,235,.12); padding: 7px 8px; cursor: pointer;
    }
    #pToastChevron { text-align: center; font-size: 15px; letter-spacing: 0; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <div id="threshold-row">
      <div id="threshold">—<span class="unit">¢</span></div>
      <button id="reset" aria-label="Reset exercise" title="Reset">↺</button>
    </div>
    <div id="best"></div>
    <div id="history"></div>
  </div>
  <div id="header-right">
    <button id="noteChip" aria-label="Test note">A4</button>
    <button id="gear">SET</button>
  </div>
</div>

<div id="stage"><svg id="svg"></svg>
  <div id="feedback"><div id="fbPill"><span id="fbLabel"></span><button id="fbNext" aria-label="Next round">›</button></div></div>
</div>

<div id="answers">
  <button class="abtn" data-ans="flat">↓ flat</button>
  <button class="abtn" data-ans="in_tune">≈ in tune</button>
  <button class="abtn" data-ans="sharp">↑ sharp</button>
</div>

<div id="overlay"></div>

<div id="panel">
  <div id="panel-head">
    <h2>VISUAL SETTINGS</h2>
    <button id="pClose">✕</button>
  </div>
  <div id="panel-scroll">

    <!-- HEADER (top bar) -->
    <div class="psec-hdr" onclick="toggleSec('hdr')">
      <span class="psec-arrow" id="arr-hdr">▾</span>HEADER
    </div>
    <div class="psec-body" id="sec-hdr">
      <div class="prow"><label>TOP OFFSET <span class="v" id="pHdrTopV"></span></label>
        <input type="range" id="pHdrTop" min="0" max="90" step="1" autocomplete="off"></div>
      <div class="prow"><label>FONT</label>
        <select id="pHdrFont" autocomplete="off">
          <option value="Rubik">Rubik</option><option value="System">System</option>
          <option value="Serif">Serif</option><option value="Mono">Mono</option>
        </select></div>
      <div class="prow"><label>CENT SIZE <span class="v" id="pThreshSizeV"></span></label>
        <input type="range" id="pThreshSize" min="12" max="40" step="1" autocomplete="off"></div>
      <div class="prow"><label>CENT COLOR</label>
        <input type="color" id="pThreshCol" autocomplete="off"></div>
      <div class="prow"><label>CENT WEIGHT <span class="v" id="pThreshWeightV"></span></label>
        <input type="range" id="pThreshWeight" min="300" max="900" step="100" autocomplete="off"></div>
      <div class="prow"><label>BEST SIZE <span class="v" id="pBestSizeV"></span></label>
        <input type="range" id="pBestSize" min="6" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>BEST OPACITY <span class="v" id="pBestOpV"></span></label>
        <input type="range" id="pBestOp" min="0" max="100" step="5" autocomplete="off"></div>
      <div class="prow"><label>DOT SIZE <span class="v" id="pDotSizeV"></span></label>
        <input type="range" id="pDotSize" min="3" max="16" step="1" autocomplete="off"></div>
      <div class="prow"><label>DOT GAP <span class="v" id="pDotGapV"></span></label>
        <input type="range" id="pDotGap" min="2" max="16" step="1" autocomplete="off"></div>
      <div class="prow"><label>DOT — CORRECT</label>
        <input type="color" id="pDotOk" autocomplete="off"></div>
      <div class="prow"><label>DOT — WRONG</label>
        <input type="color" id="pDotErr" autocomplete="off"></div>
      <div class="prow"><label>GAP: CENT → BEST <span class="v" id="pBestGapV"></span></label>
        <input type="range" id="pBestGap" min="0" max="40" step="1" autocomplete="off"></div>
      <div class="prow"><label>GAP: BEST → DOTS <span class="v" id="pHistGapV"></span></label>
        <input type="range" id="pHistGap" min="0" max="40" step="1" autocomplete="off"></div>
    </div>

    <!-- APPEARANCE -->
    <div class="psec-hdr" onclick="toggleSec('appearance')">
      <span class="psec-arrow" id="arr-appearance">▾</span>APPEARANCE
    </div>
    <div class="psec-body" id="sec-appearance">
      <div class="prow"><label>BACKGROUND</label>
        <input type="color" id="pBg" autocomplete="off"></div>
      <div class="prow"><label>BACKGROUND 2 (gradient)</label>
        <input type="color" id="pBgCol2" autocomplete="off"></div>
      <div class="prow"><label>BG GRADIENT ANGLE <span class="v" id="pBgAngleV"></span></label>
        <input type="range" id="pBgAngle" min="0" max="360" step="1" autocomplete="off"></div>
      <div class="prow"><label>STRING COLOR</label>
        <input type="color" id="pStrCol" autocomplete="off"></div>
      <div class="prow"><label>THICKNESS <span class="v" id="pStrWV"></span></label>
        <input type="range" id="pStrW" min="2" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>PIN SIZE <span class="v" id="pPinRV"></span></label>
        <input type="range" id="pPinR" min="8" max="28" step="1" autocomplete="off"></div>
      <div class="prow"><label>PIN COLOR</label>
        <input type="color" id="pPinCol" autocomplete="off"></div>
      <div class="prow"><label>PIN HOLE SIZE <span class="v" id="pPinHoleRV"></span></label>
        <input type="range" id="pPinHoleR" min="0" max="20" step="1" autocomplete="off"></div>
      <div class="prow"><label>PIN HOLE COLOR</label>
        <input type="color" id="pPinHoleCol" autocomplete="off"></div>
      <div class="prow"><label>STRING LENGTH <span class="v" id="pLenV"></span></label>
        <input type="range" id="pLen" min="30" max="100" step="1" autocomplete="off"></div>
      <div class="prow"><label>SPACING <span class="v" id="pSpacingV"></span></label>
        <input type="range" id="pSpacing" min="0" max="200" step="1" autocomplete="off"></div>
      <div class="prow"><label>VERTICAL OFFSET <span class="v" id="pVOffV"></span></label>
        <input type="range" id="pVOff" min="-200" max="200" step="1" autocomplete="off"></div>
    </div>

    <!-- BODY -->
    <div class="psec-hdr" onclick="toggleSec('body')">
      <span class="psec-arrow" id="arr-body">▾</span>BODY
    </div>
    <div class="psec-body" id="sec-body">
      <div class="prow"><label>COLOR (center)</label>
        <input type="color" id="pBodyCol" autocomplete="off"></div>
      <div class="prow"><label>EDGE (gradient)</label>
        <input type="color" id="pBodyCol2" autocomplete="off"></div>
      <div class="prow"><label>RADIUS <span class="v" id="pBodyRV"></span></label>
        <input type="range" id="pBodyR" min="0" max="220" step="5" autocomplete="off"></div>
      <div class="prow"><label>Y POSITION <span class="v" id="pBodyYV"></span></label>
        <input type="range" id="pBodyY" min="10" max="90" step="1" autocomplete="off"></div>
    </div>

    <!-- ROSETTE -->
    <div class="psec-hdr" onclick="toggleSec('rosette')">
      <span class="psec-arrow" id="arr-rosette">▾</span>ROSETTE
    </div>
    <div class="psec-body" id="sec-rosette">
      <div class="prow"><label>COLOR</label>
        <input type="color" id="pRosCol" autocomplete="off"></div>
      <div class="prow"><label>POINTS <span class="v" id="pRosPtsV"></span></label>
        <input type="range" id="pRosPts" min="0" max="16" step="1" autocomplete="off"></div>
      <div class="prow"><label>DEPTH <span class="v" id="pRosDepthV"></span></label>
        <input type="range" id="pRosDepth" min="0" max="60" step="1" autocomplete="off"></div>
      <div class="prow"><label>ROUNDNESS <span class="v" id="pRosRoundV"></span></label>
        <input type="range" id="pRosRound" min="0" max="50" step="1" autocomplete="off"></div>
      <div class="prow"><label>GAP (from hole) <span class="v" id="pRosGapV"></span></label>
        <input type="range" id="pRosGap" min="0" max="80" step="1" autocomplete="off"></div>
      <div class="prow"><label>STROKE <span class="v" id="pRosWV"></span></label>
        <input type="range" id="pRosW" min="0" max="20" step="1" autocomplete="off"></div>
    </div>

    <!-- SADDLE -->
    <div class="psec-hdr" onclick="toggleSec('saddle')">
      <span class="psec-arrow" id="arr-saddle">▾</span>SADDLE
    </div>
    <div class="psec-body" id="sec-saddle">
      <div class="prow"><label>HEIGHT (above pins) <span class="v" id="pSaddleYV"></span></label>
        <input type="range" id="pSaddleY" min="-20" max="100" step="1" autocomplete="off"></div>
      <div class="prow"><label>WIDTH <span class="v" id="pSaddleWV"></span></label>
        <input type="range" id="pSaddleW" min="20" max="100" step="1" autocomplete="off"></div>
      <div class="prow"><label>THICKNESS <span class="v" id="pSaddleThickV"></span></label>
        <input type="range" id="pSaddleThick" min="1" max="24" step="1" autocomplete="off"></div>
      <div class="prow"><label>COLOR</label>
        <input type="color" id="pSaddleCol" autocomplete="off"></div>
    </div>

    <!-- BRIDGE -->
    <div class="psec-hdr" onclick="toggleSec('bridge')">
      <span class="psec-arrow" id="arr-bridge">▾</span>BRIDGE
    </div>
    <div class="psec-body" id="sec-bridge">
      <div class="prow"><label>BOARD SCALE (width) <span class="v" id="pBridgeWV"></span></label>
        <input type="range" id="pBridgeW" min="120" max="360" step="5" autocomplete="off"></div>
      <div class="prow"><label>BOARD COLOR</label>
        <input type="color" id="pBridgeCol" autocomplete="off"></div>
    </div>

    <!-- VIBRATION -->
    <div class="psec-hdr" onclick="toggleSec('vib')">
      <span class="psec-arrow" id="arr-vib">▾</span>VIBRATION
    </div>
    <div class="psec-body" id="sec-vib">
      <div class="prow"><label>BOW <span class="v" id="pBowV"></span></label>
        <input type="range" id="pBow" min="20" max="150" step="5" autocomplete="off"></div>
      <div class="prow"><label>BLUR <span class="v" id="pVibBlurV"></span></label>
        <input type="range" id="pVibBlur" min="0" max="10" step="1" autocomplete="off"></div>
      <div class="prow"><label>SUSTAIN <span class="v" id="pSustainV"></span></label>
        <input type="range" id="pSustain" min="1" max="100" step="1" autocomplete="off"></div>
      <div class="prow"><label>GRAB ZONE <span class="v" id="pGrabV"></span></label>
        <input type="range" id="pGrab" min="40" max="260" step="5" autocomplete="off"></div>
      <div class="prow"><label>RESET ANIM <span class="v" id="pResetMsV"></span></label>
        <input type="range" id="pResetMs" min="0" max="800" step="25" autocomplete="off"></div>
    </div>

    <!-- BUTTONS -->
    <div class="psec-hdr" onclick="toggleSec('btns')">
      <span class="psec-arrow" id="arr-btns">▾</span>BUTTONS
    </div>
    <div class="psec-body" id="sec-btns">
      <div class="prow"><label>COLOR</label>
        <input type="color" id="pBtnColor" autocomplete="off"></div>
      <div class="prow"><label>FONT</label>
        <select id="pBtnFamily" autocomplete="off">
          <option value="Rubik">Rubik</option><option value="System">System</option>
          <option value="Serif">Serif</option><option value="Mono">Mono</option>
        </select></div>
      <div class="prow"><label>WEIGHT <span class="v" id="pBtnWeightV"></span></label>
        <input type="range" id="pBtnWeight" min="300" max="900" step="100" autocomplete="off"></div>
      <div class="prow"><label>CASE</label>
        <select id="pBtnCase" autocomplete="off">
          <option value="uppercase">ALL CAPS</option><option value="none">Sentence</option>
          <option value="lowercase">lower</option>
        </select></div>
      <div class="prow"><label>FONT SIZE <span class="v" id="pBtnFontV"></span></label>
        <input type="range" id="pBtnFont" min="8" max="18" step="1" autocomplete="off"></div>
      <div class="prow"><label>TRACKING <span class="v" id="pBtnTrackV"></span></label>
        <input type="range" id="pBtnTrack" min="0" max="60" step="2" autocomplete="off"></div>
      <div class="prow"><label>PADDING <span class="v" id="pBtnPadV"></span></label>
        <input type="range" id="pBtnPad" min="8" max="36" step="1" autocomplete="off"></div>
      <div class="prow"><label>CORNER RADIUS <span class="v" id="pBtnRadV"></span></label>
        <input type="range" id="pBtnRad" min="0" max="30" step="1" autocomplete="off"></div>
      <div class="prow"><label>BORDER <span class="v" id="pBtnBorderV"></span></label>
        <input type="range" id="pBtnBorder" min="0" max="4" step="1" autocomplete="off"></div>
      <div class="prow"><label>GAP <span class="v" id="pBtnGapV"></span></label>
        <input type="range" id="pBtnGap" min="0" max="16" step="1" autocomplete="off"></div>
      <div class="prow"><label>AREA PADDING <span class="v" id="pBtnAreaPadV"></span></label>
        <input type="range" id="pBtnAreaPad" min="0" max="80" step="1" autocomplete="off"></div>
      <div class="prow"><label>MIN WIDTH <span class="v" id="pBtnMinWV"></span></label>
        <input type="range" id="pBtnMinW" min="40" max="200" step="4" autocomplete="off"></div>
      <div class="prow"><label>MAX WIDTH <span class="v" id="pBtnMaxWV"></span></label>
        <input type="range" id="pBtnMaxW" min="80" max="400" step="8" autocomplete="off"></div>

<script>
// ─────────────────────────────────────────────────────────────
// Visual settings
// ─────────────────────────────────────────────────────────────
const NUM_STRINGS = 2;
const NUM_GHOSTS  = 12;
const MIN_PLUCK   = 8;
const TAP_FRAC    = 0.44;
const SVGNS       = 'http://www.w3.org/2000/svg';
const FONT_STACKS = {
  Rubik:  "'Rubik', system-ui, sans-serif",
  System: "system-ui, -apple-system, 'Segoe UI', sans-serif",
  Serif:  "Georgia, 'Times New Roman', serif",
  Mono:   "ui-monospace, 'Courier New', monospace"
};
const fontStack = k => FONT_STACKS[k] || FONT_STACKS.Rubik;

// SVG / visual
let bg           = '#f98a57';   // orange soundboard
let bgCol2       = '#f98a57';   // soundboard end (flat by default)
let bgAngle      = 180;         // background gradient angle (deg)
let strCol       = '#fff24b';   // yellow string
let strW         = 5;
let pinR         = 9;           // grommet outer radius
let stringLen    = 0.9;
let spacing      = 72;
let bodyColor    = '#7b3920';   // soundhole brown (center)
let bodyCol2     = '#7b3920';   // soundhole brown (edge)
let bodyRadius   = 80;          // soundhole radius
let bowAmount    = 90;
let vibBlurAmt   = 3;
let vibSustain   = 64;
let grabZone     = 40;      // px catch radius around a string for grab/pull
let resetMs      = 300;     // new-round reset: strings collapse width+fade out, then back (0 = off)

// Button appearance
let btnColor     = '#ebebeb';
let btnFont      = 'Rubik';  // family key (see FONT_STACKS)
let btnWeight    = 400;      // font-weight
let btnCase      = 'uppercase'; // text-transform: none | uppercase | lowercase
let btnFontSize  = 14;      // px
let btnTracking  = 10;      // hundredths of em  (10 → 0.10em)
let btnPadV      = 11;      // vertical padding px
let btnRadius    = 22;      // border-radius px
let btnBorderW   = 2;       // border width px
let btnGap       = 9;       // gap between buttons px
let btnAreaPad   = 37;      // padding around button row px
let btnMinW      = 68;      // min-width px
let btnMaxW      = 120;     // max-width px

// Feedback toast (pill) — independent of the string/bridge palette
let toastBg       = '#ffe44e';  // pill background
let toastTextCol  = '#7b3920';  // pill label text
let toastFont     = 'Rubik';    // family key (see FONT_STACKS)
let toastWeight   = 400;        // font-weight
let toastNextBg   = '#7b3920';  // next-button disc
let toastNextCol  = '#F7F2E8';  // next-button arrow
let toastFontSize = 14;         // px
let toastTracking = 4;          // hundredths of em (4 → 0.04em)
let toastHold     = 950;        // ms held before auto-advance on a correct answer
let toastFade     = 250;        // ms fade in/out
let toastScale    = 85;         // overall pill size, percent
let toastPad      = 7;          // pill vertical padding px (horizontal = +10)
let toastY        = -12;        // vertical nudge px (− up / + down)
let toastCase     = 'uppercase';// label case: 'none' = sentence (as authored) | 'uppercase' = ALL CAPS
let toastChevron  = '›';        // glyph shown inside the next button
let toastNextGap  = 11;         // px gap between the label and the chevron
let toastNextDY   = 0;          // px vertical nudge of the chevron

// Header ("top") visuals
let hdrFont      = 'Rubik';   // family key for the cent readout + best line
let threshSize   = 22;        // px cent readout size
let threshCol    = '#ebebeb'; // cent readout colour
let threshWeight = 400;       // cent readout weight
let bestSize     = 10;        // px best-line size
let bestOp       = 30;        // best-line opacity %
let dotSize      = 12;        // px streak-dot diameter
let dotGap       = 6;         // px gap between streak dots (horizontal)
let dotOkCol     = '#fff065'; // correct streak dot (shown at 75% via color-mix)
let dotErrCol    = '#7b3920'; // wrong streak dot (shown at 65% via color-mix)
let bestGap      = 3;         // px vertical gap: cent readout → best line
let histGap      = 8;         // px vertical gap: best line → streak dots
let hdrTop       = 10;        // px manual top nudge for the whole header (added to the safe area)

// Layout
let vOffset      = 60;      // manual vertical nudge px

// ── Bridge layout (ukulele) ──────────────────────────────────
let holePos      = 0.33;    // soundhole center Y (fraction of stage H)
let bridgePos    = 0.76;    // bridge pin row Y (fraction of stage H)
let rosetteGap    = 19;     // px gap from hole edge to the rosette's valleys
let rosetteW      = 5;      // px rosette stroke width
let rosetteCol    = '#7b3920';
let rosettePoints = 8;      // lobe count (<3 → plain circle ring)
let rosetteDepth  = 16;     // px the lobes bump out past the valley
let rosetteRound  = 50;     // corner rounding %: 0 = sharp star … 50 = smooth flower
let bridgeW      = 210;     // bridge plate width (fixed px)
let bridgeCol    = '#7B3920';
let saddleWFrac  = 0.65;    // saddle line width as fraction of the board
let saddleThick  = 5;       // px saddle line thickness
let saddleYOff   = 28;      // px the saddle sits above the bridge pin row
let saddleCol    = '#F7F2E8';
let pinCol       = '#F7F2E8';  // grommet outer disc
let pinHoleR     = 3;          // grommet inner hole radius
let pinHoleCol   = '#6B3A22';  // grommet inner hole

const pillW        = () => pinR * 0.95;
const pillD        = () => pinR * 1.4;
const pinMargin    = () => pinR * 0.6;
const ghostW       = () => Math.max(1.5, strW * 0.35);
const lengthMargin = () => (H * (1 - stringLen)) / 2;
const vibDecay     = () => 0.3 + 5.7 * (1 - vibSustain / 100);

// ─────────────────────────────────────────────────────────────
// SVG state
// ─────────────────────────────────────────────────────────────
let W = 0, H = 0;
const cx  = [0, 0];
const vib = [false, false];
let mainPath = [], ghostEls = [], blurDev = [], grpEls = [], pinEls = [];
let bodyCircle = null, rosetteCircle = null, bridgeGrp = null, saddleLine = null;
const BRIDGE_PATH = 'M0.427937 7.39967L8.79791 60.3275C9.06274 62.0021 10.5063 63.2353 12.2017 63.2353C32.4322 63.2353 52.1332 69.0626 70.9013 76.6145C83.2111 81.5676 97.6181 86 109.758 86C121.897 86 136.304 81.5676 148.614 76.6145C167.382 69.0626 187.083 63.2353 207.314 63.2353C209.009 63.2353 210.453 62.0021 210.718 60.3275L219.088 7.39967C219.491 4.85148 219.692 3.57738 219.317 2.58547C218.988 1.71493 218.366 0.98639 217.557 0.525332C216.636 0 215.346 0 212.766 0H6.74938C4.16952 0 2.8796 0 1.95844 0.525332C1.14998 0.98639 0.527602 1.71493 0.198483 2.58547C-0.176517 3.57738 0.0249675 4.85148 0.427937 7.39967Z';

function xRatio(i) { return 0.5 + (i === 0 ? -1 : 1) * spacing / (2 * W); }
const holeCY   = () => H * holePos;       // soundhole center Y
const bridgeCY = () => H * bridgePos;     // bridge pin row Y

// Rosette as a rounded N-point star (Figma-style). Valleys sit `rosetteGap` out
// from the hole edge; peaks bump out a further `rosetteDepth`. `rosetteRound`
// (0–50%) fillets each corner: 0 = sharp star, 50 = fully smooth flower.
function rosettePath(cx, cy) {
  const n = Math.round(rosettePoints);
  const rv = bodyRadius + rosetteGap;               // valley radius (near the hole)
  if (n < 3 || rosetteDepth <= 0) {                 // degenerate → plain circle ring
    return `M ${(cx - rv).toFixed(2)} ${cy.toFixed(2)} `
         + `a ${rv} ${rv} 0 1 0 ${(2 * rv).toFixed(2)} 0 `
         + `a ${rv} ${rv} 0 1 0 ${(-2 * rv).toFixed(2)} 0 Z`;
  }
  const rp = rv + rosetteDepth;                     // peak radius (lobe tips)
  const t  = Math.max(0, Math.min(0.5, rosetteRound / 100));
  const pts = [];
  for (let i = 0; i < 2 * n; i++) {
    const ang = Math.PI * i / n - Math.PI / 2;      // first peak at top
    const r = (i % 2 === 0) ? rp : rv;
    pts.push([cx + r * Math.cos(ang), cy + r * Math.sin(ang)]);
  }
  let d = '';
  const m = pts.length;
  for (let i = 0; i < m; i++) {
    const cur = pts[i], prev = pts[(i - 1 + m) % m], next = pts[(i + 1) % m];
    const ex = cur[0] + (prev[0] - cur[0]) * t, ey = cur[1] + (prev[1] - cur[1]) * t;
    const xx = cur[0] + (next[0] - cur[0]) * t, xy = cur[1] + (next[1] - cur[1]) * t;
    d += (i === 0 ? 'M' : 'L') + ` ${ex.toFixed(2)} ${ey.toFixed(2)} `
       + `Q ${cur[0].toFixed(2)} ${cur[1].toFixed(2)} ${xx.toFixed(2)} ${xy.toFixed(2)} `;
  }
  return d + 'Z';
}
function strTopY() { return -H * 0.5; }   // run well above the stage; body clips at the screen top
function strBotY() { return bridgeCY(); } // anchor at the bridge pin

function stringD(i, offset) {
  const x = W * xRatio(i), top = strTopY(), bot = strBotY();
  return `M ${x} ${top} Q ${x + offset} ${holeCY()} ${x} ${bot}`;  // bow bulges over the soundhole
}
function ghostD(i, k) {
  const frac = NUM_GHOSTS > 1 ? (k / (NUM_GHOSTS - 1)) * 2 - 1 : 0;
  return stringD(i, cx[i] * frac);
}
function ghostOpacity(k, env) {
  const frac = NUM_GHOSTS > 1 ? k / (NUM_GHOSTS - 1) : 0.5;
  return (0.12 + Math.abs(frac * 2 - 1) * 0.30) * Math.min(env * 2, 1);
}

function buildSVG() {
  const svg = document.getElementById('svg');
  const rect = document.getElementById('stage').getBoundingClientRect();
  W = rect.width; H = rect.height;
  applyVOffset();
  const hcy = holeCY(), bcy = bridgeCY();

  let defs = '<defs>';
  defs += `
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop id="bodyGradS0" offset="0%" stop-color="${bodyColor}"/>
      <stop id="bodyGradS1" offset="100%" stop-color="${bodyCol2}"/>
    </radialGradient>`;
  for (let i = 0; i < NUM_STRINGS; i++) {
    defs += `
      <filter id="fblur-${i}" x="-60%" y="-10%" width="220%" height="120%">
        <feGaussianBlur id="fdev-${i}" stdDeviation="0 0"/>
      </filter>`;
  }
  defs += '</defs>';
  svg.innerHTML = defs;
  mainPath = []; ghostEls = []; blurDev = []; grpEls = []; pinEls = [];
  bodyCircle = null; rosetteCircle = null; bridgeGrp = null; saddleLine = null;

  // 1) Soundhole (filled) + rosette ring
  const body = document.createElementNS(SVGNS, 'circle');
  body.setAttribute('cx', W / 2); body.setAttribute('cy', hcy);
  body.setAttribute('r', bodyRadius); body.setAttribute('fill', 'url(#bodyGrad)');
  svg.appendChild(body); bodyCircle = body;

  const rosette = document.createElementNS(SVGNS, 'path');
  rosette.setAttribute('d', rosettePath(W / 2, hcy));
  rosette.setAttribute('fill', 'none');
  rosette.setAttribute('stroke', rosetteCol);
  rosette.setAttribute('stroke-width', rosetteW);
  rosette.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(rosette); rosetteCircle = rosette;

  // 2) Bridge plate (scaled panel path) — positioned/sized live by applyBridge
  const bgrp = document.createElementNS(SVGNS, 'g');
  const bpath = document.createElementNS(SVGNS, 'path');
  bpath.setAttribute('d', BRIDGE_PATH);
  bgrp.appendChild(bpath); svg.appendChild(bgrp); bridgeGrp = bgrp;
  applyBridge();

  // 3) Saddle line, above the pins (positioned/sized live by applySaddle)
  const saddle = document.createElementNS(SVGNS, 'line');
  saddle.setAttribute('stroke-linecap', 'round');
  svg.appendChild(saddle); saddleLine = saddle;
  applySaddle();

  // 4) String motion-blur (ghost) groups
  for (let i = 0; i < NUM_STRINGS; i++) {
    blurDev.push(document.getElementById(`fdev-${i}`));
    const grp = document.createElementNS(SVGNS, 'g');
    svg.appendChild(grp); grpEls.push(grp);
    const gs = [];
    for (let k = 0; k < NUM_GHOSTS; k++) {
      const g = document.createElementNS(SVGNS, 'path');
      g.setAttribute('stroke', strCol); g.setAttribute('stroke-width', ghostW());
      g.setAttribute('fill', 'none'); g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('opacity', '0'); grp.appendChild(g); gs.push(g);
    }
    ghostEls.push(gs);
  }

  // 5) Main strings (flat) — over the hole, plate and saddle
  for (let i = 0; i < NUM_STRINGS; i++) {
    const path = document.createElementNS(SVGNS, 'path');
    path.setAttribute('d', stringD(i, 0)); path.setAttribute('stroke', strCol);
    path.setAttribute('stroke-width', strW); path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path); mainPath.push(path);
  }

  // 6) Grommet bridge pins (outer disc + inner hole) at the string ends
  for (let i = 0; i < NUM_STRINGS; i++) {
    const x = W * xRatio(i);
    const outer = document.createElementNS(SVGNS, 'circle');
    outer.setAttribute('cx', x); outer.setAttribute('cy', bcy);
    outer.setAttribute('r', pinR); outer.setAttribute('fill', pinCol);
    svg.appendChild(outer);
    const inner = document.createElementNS(SVGNS, 'circle');
    inner.setAttribute('cx', x); inner.setAttribute('cy', bcy);
    inner.setAttribute('r', pinHoleR); inner.setAttribute('fill', pinHoleCol);
    svg.appendChild(inner);
    pinEls.push([outer, inner]);
  }
  for (let i = 0; i < NUM_STRINGS; i++) redraw(i);
}

function redraw(i) {
  if (!mainPath[i]) return;
  const d = vib[i] ? stringD(i, 0) : stringD(i, cx[i]);
  mainPath[i].setAttribute('d', d);
  if (vib[i]) {
    grpEls[i].setAttribute('filter', `url(#fblur-${i})`);
    const env = Math.min(cx[i] / bowAmount, 1);
    for (let k = 0; k < NUM_GHOSTS; k++) {
      ghostEls[i][k].setAttribute('d', ghostD(i, k));
      ghostEls[i][k].setAttribute('opacity', ghostOpacity(k, env).toFixed(3));
    }
    blurDev[i].setAttribute('stdDeviation', (vibBlurAmt * env).toFixed(2) + ' 0');
  } else {
    grpEls[i].setAttribute('filter', 'none');
    for (let k = 0; k < NUM_GHOSTS; k++) ghostEls[i][k].setAttribute('opacity', '0');
  }
}

// ── Apply helpers ─────────────────────────────────────────────
function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : null;
}
function applyVOffset() {
  document.getElementById('svg').style.transform = `translateY(${vOffset}px)`;
}
function applyBg() {
  document.body.style.background = `linear-gradient(${bgAngle}deg, ${bg}, ${bgCol2})`;
}
function applyColors() {
  applyBg();
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (mainPath[i]) mainPath[i].setAttribute('stroke', strCol);
    if (ghostEls[i]) ghostEls[i].forEach(g => g.setAttribute('stroke', strCol));
  }
}
function applyStringWidth() {
  const gw = ghostW();
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (mainPath[i]) mainPath[i].setAttribute('stroke-width', strW);
    if (ghostEls[i]) ghostEls[i].forEach(g => g.setAttribute('stroke-width', gw));
  }
}
// New-round "reset": collapse the strings (width→0 + fade out), then bring them
// back (width→strW + fade in). Cosmetic punctuation that a fresh try has begun.
let resetGen = 0;
function clearStringAnim() {                     // restore solid, full-width strings
  for (let i = 0; i < NUM_STRINGS; i++) if (mainPath[i]) {
    mainPath[i].setAttribute('stroke-width', strW);
    mainPath[i].setAttribute('opacity', 1);
    mainPath[i].style.strokeDasharray = '';
    mainPath[i].style.strokeDashoffset = '';
  }
}
function resetStrings() {
  if (!mainPath[0]) return;
  if (resetMs <= 0) { clearStringAnim(); return; }
  // Settle any lingering ring so the redraw runs on straight strings.
  for (let i = 0; i < NUM_STRINGS; i++) { vibGen[i]++; vib[i] = false; cx[i] = 0; redraw(i); }
  const myGen = ++resetGen, t0 = performance.now();
  const outMs = resetMs * 0.4;                  // collapse takes 40%, redraw gets the rest
  const lens = mainPath.map(p => p ? p.getTotalLength() : 0);
  // The string runs well above the viewport; only map the redraw to the on-screen
  // length (pin → top of stage) so the visible draw spans the whole phase.
  const offTop = Math.max(0, H * 0.5 - vOffset);
  (function frame() {
    if (myGen !== resetGen) return;              // a newer reset superseded this one
    const t = performance.now() - t0;
    if (t >= resetMs) { clearStringAnim(); return; }
    for (let i = 0; i < NUM_STRINGS; i++) {
      const p = mainPath[i]; if (!p) continue;
      if (t < outMs) {                            // phase 1: collapse + fade the old string away
        const f = 1 - t / outMs;
        p.setAttribute('stroke-width', (strW * f).toFixed(2));
        p.setAttribute('opacity', f.toFixed(3));
        p.style.strokeDasharray = ''; p.style.strokeDashoffset = '';
      } else {                                    // phase 2: draw up from the pin, full width/opacity
        // Reveal the LAST `drawn` units of the path with a gap-then-dash pattern, so the
        // visible segment sits at the pin end and grows upward. Mapped to the on-screen
        // length so the draw spans the whole phase instead of finishing off-screen.
        const drawP = (t - outMs) / (resetMs - outMs), L = lens[i];
        const visLen = Math.max(L * 0.3, L - offTop);
        const drawn = drawP * visLen;
        // Pattern "0 gap dash": a zero lead dash, then a gap of (L−drawn), then the visible
        // dash of length `drawn` — so the drawn segment sits at the pin end and grows up.
        p.setAttribute('stroke-width', strW);
        p.setAttribute('opacity', 1);
        p.style.strokeDasharray = `0 ${(L - drawn).toFixed(1)} ${drawn.toFixed(1)}`;
        p.style.strokeDashoffset = '0';
      }
    }
    requestAnimationFrame(frame);
  })();
  // Safety net: rAF is throttled in background tabs, so guarantee the strings are
  // restored to full even if the frame loop stalls mid-animation.
  setTimeout(() => { if (myGen === resetGen) clearStringAnim(); }, resetMs + 80);
}
function applyBridge() {
  if (!bridgeGrp) return;
  const bscale = bridgeW / 220, bh = 86 * bscale;
  bridgeGrp.setAttribute('transform',
    `translate(${W / 2 - bridgeW / 2},${bridgeCY() - bh * 0.58}) scale(${bscale})`);
  const bpath = bridgeGrp.querySelector('path');
  if (bpath) bpath.setAttribute('fill', bridgeCol);
}
function applyPins() {
  for (let i = 0; i < NUM_STRINGS; i++) {
    if (!pinEls[i]) continue;
    const [outer, inner] = pinEls[i];
    outer.setAttribute('r', pinR);  outer.setAttribute('fill', pinCol);

// ─────────────────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────────────────
let audioCtx = null;
const stringFreqs = [440, 440];
const activeNotes = [null, null]; // currently-ringing {osc,gain} per string, for re-pluck damping

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume(); // fire-and-forget pre-warm
}
async function playTone(freq, idx) {
  initAudio();
  // Wait until context is actually running before scheduling —
  // avoids the "quiet blip then delayed full volume" on first play
  if (audioCtx.state !== 'running') {
    try { await audioCtx.resume(); } catch(e) {}
  }
  const now = audioCtx.currentTime;
  // Damp a note still ringing on this string so rapid re-plucks don't stack
  if (idx != null && activeNotes[idx]) {
    const prev = activeNotes[idx];
    try {
      prev.gain.gain.cancelScheduledValues(now);
      prev.gain.gain.setValueAtTime(Math.max(prev.gain.gain.value, 0.0001), now);
      prev.gain.gain.exponentialRampToValueAtTime(0.0008, now + 0.06);
      prev.osc.stop(now + 0.08);
    } catch(e) {}
  }
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';                                          // clean tone (matches the piano prototype)
  osc.frequency.setValueAtTime(freq, now);                    // no pitch glide
  gain.gain.value = 0; // ensure 0 before any scheduled ramps
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.34, now + 0.028);       // soft attack
  gain.gain.exponentialRampToValueAtTime(0.22, now + 0.5);    // gentle decay into the body
  gain.gain.exponentialRampToValueAtTime(0.0008, now + 4.2);  // long smooth tail — notes ring while you compare
  osc.start(now); osc.stop(now + 4.3);
  if (idx != null) {
    const note = { osc, gain };
    activeNotes[idx] = note;
    osc.onended = () => { if (activeNotes[idx] === note) activeNotes[idx] = null; };
  }
}

// ─────────────────────────────────────────────────────────────
// Pluck
// ─────────────────────────────────────────────────────────────
let hasPlucked = false;
const vibGen = [0, 0]; // per-string token; bumping it cancels a running decay tick

function pluckString(idx, amp0) {
  playTone(stringFreqs[idx], idx);
  if (!hasPlucked) { hasPlucked = true; setButtonsReady(true); }
  vib[idx] = true;
  const myGen = ++vibGen[idx];   // supersede any prior decay tick for this string
  const decay = vibDecay(), t0 = performance.now();
  (function tick() {
    if (vibGen[idx] !== myGen) return;   // a newer pluck/grab took over — stop
    const t = (performance.now() - t0) / 1000, env = Math.exp(-decay * t);
    cx[idx] = amp0 * env; redraw(idx);
    if (env > 0.004) requestAnimationFrame(tick);
    else { cx[idx] = 0; vib[idx] = false; redraw(idx); }
  })();
}
function pulseBody() {
  if (!bodyCircle) return;
  bodyCircle.setAttribute('r', bodyRadius * 1.055);
  setTimeout(() => bodyCircle.setAttribute('r', bodyRadius), 200);
}
// ─────────────────────────────────────────────────────────────
// Interaction
// ─────────────────────────────────────────────────────────────
const ptr = { active: false, idx: -1, startX: 0, moved: false };
function nearestString(clientX, localY) {
  // A string only exists from the top of the board down to its bridge pin.
  // Ignore grabs below that line (bridge body, toast, button band) — otherwise
  // the string's hit area would span the whole stage height. (SVG is shifted by
  // vOffset, so the pin sits at strBotY() + vOffset in stage-local coords.)
  if (localY != null && localY > strBotY() + vOffset + pinR) return -1;
  let best = -1, dist = Infinity;
  for (let i = 0; i < NUM_STRINGS; i++) {
    const d = Math.abs(clientX - W * xRatio(i));
    if (d < dist) { dist = d; best = i; }
  }
  return dist <= grabZone ? best : -1;
}
function onDown(clientX, clientY) {
  initAudio(); // pre-warm context as early as possible so resume() has time to complete
  if (!W || phase === 'feedback') return;
  const localY = clientY - document.getElementById('stage').getBoundingClientRect().top;
  const i = nearestString(clientX, localY);
  if (i < 0) return;
  // Re-grab a still-ringing string: cancel its decay so it bows fresh
  if (vib[i]) { vibGen[i]++; vib[i] = false; cx[i] = 0; redraw(i); }
  ptr.active = true; ptr.idx = i; ptr.startX = clientX; ptr.moved = false;
}
function onMove(clientX) {
  if (!ptr.active) return;
  if (Math.abs(clientX - ptr.startX) > 4) ptr.moved = true;
  cx[ptr.idx] = Math.max(-bowAmount, Math.min(bowAmount,
    (clientX - W * xRatio(ptr.idx)) * 1.3));
  redraw(ptr.idx);
}
function onUp(e) {
  if (!ptr.active) return;
  // A release landing on the answer buttons isn't a string release. This only
  // runs when a grab is somehow still active (e.g. a stray/stuck pointer), so
  // drop it silently instead of letting a button tap fire a phantom pluck.
  if (e && e.target && e.target.closest && e.target.closest('#answers')) {
    ptr.active = false; ptr.idx = -1; return;
  }
  const i = ptr.idx; ptr.active = false; ptr.idx = -1;
  // Tap or pull, a released grab always sounds. Pull strength scales with the
  // bow, floored at a light tap so small drags never land in a silent dead zone.
  pluckString(i, Math.max(Math.abs(cx[i]), bowAmount * TAP_FRAC));
}
// Grab interrupted (OS gesture, scroll takeover, focus loss): drop it without
// sounding, so it can't linger and fire on the next unrelated release.
function onCancel() { ptr.active = false; ptr.idx = -1; }
const stage = document.getElementById('stage');
stage.addEventListener('mousedown',  e => onDown(e.clientX, e.clientY));
stage.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
window.addEventListener('mousemove',  e => onMove(e.clientX));
window.addEventListener('mouseup',   onUp);
window.addEventListener('touchmove',  e => { if (!ptr.active) return; e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
window.addEventListener('touchend',  onUp);
window.addEventListener('touchcancel', onCancel);
window.addEventListener('blur', onCancel);
window.addEventListener('resize', buildSVG);

// ─────────────────────────────────────────────────────────────
// Game logic
// ─────────────────────────────────────────────────────────────
const ROOT = 440, MAX_D = 50, MIN_D = 1;
const LS_GAME = 'pitch-game-v1';
let deviation = MAX_D, bestDev = MAX_D, phase = 'play', roundDir = 'sharp';
let lastCorrect = null, oscillations = 0, history = [], advanceTimer = null;
// Reference note for the exercise. ROOT (440) is A4; rootSemi 0=C…11=B.
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
let rootSemi = 9, rootOct = 4;   // A4 by default
let randomNote = true, lastRandSemi = -1;    // RND mode (default): a fresh pitch class each round
function noteFreq() { return ROOT * Math.pow(2, (rootOct - 4) + (rootSemi - 9) / 12); }
function pickRandomNote() {
  let s;
  do { s = Math.floor(Math.random() * 12); } while (s === lastRandSemi);
  lastRandSemi = s; rootSemi = s;
}
const ANSWER_WORD = { sharp: 'sharp', flat: 'flat', in_tune: 'in tune' };
const FB_CORRECT = [
  "Great! Correct", "Yay, you got it!", "Nice ear!", "Spot on!", "Nailed it!",
  "Yes! Correct", "Well done!", "Perfect!", "That's it!", "Right on!"
];
const FB_INCORRECT = [
  "Oops, it was {ans}", "Uh-oh, it was {ans}", "Nope, that was {ans}", "Not quite — {ans}",
  "So close! It was {ans}", "Actually, {ans}", "Hmm, {ans}", "Try again — it was {ans}",
  "Almost! It was {ans}", "Nice try — it was {ans}"
];
let lastFbMsg = '';
function pickMsg(list) {
  let m;
  do { m = list[Math.floor(Math.random() * list.length)]; } while (list.length > 1 && m === lastFbMsg);
  lastFbMsg = m;
  return m;
}

function loadGame() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_GAME));
    if (s?.best != null) bestDev = +s.best;
    if (s?.rootSemi != null) rootSemi = +s.rootSemi;
    if (s?.rootOct  != null) rootOct  = +s.rootOct;
    if (s?.randomNote != null) randomNote = !!s.randomNote;
  } catch(e) {}
}
function saveGame() { localStorage.setItem(LS_GAME, JSON.stringify({ best: bestDev, rootSemi, rootOct, randomNote })); }
function fmt(c) { return c >= 10 ? Math.round(c) : c.toFixed(1); }

function updateHeader() {
  document.getElementById('threshold').innerHTML = `±${fmt(deviation)}<span class="unit">¢</span>`;
  document.getElementById('best').textContent = bestDev < MAX_D ? `best  ±${fmt(bestDev)}¢` : '';
  document.getElementById('history').innerHTML =
    history.map(ok => `<div class="dot ${ok ? 'ok' : 'err'}"></div>`).join('');
}
function setButtonsReady(ready) {
  document.querySelectorAll('.abtn').forEach(b => ready ? b.classList.add('ready') : b.classList.remove('ready'));
}
function setRoundFreqs() {
  const root = noteFreq();
  stringFreqs[0] = root;
  stringFreqs[1] = roundDir === 'sharp'  ? root * Math.pow(2,  deviation / 1200)
                 : roundDir === 'flat'   ? root * Math.pow(2, -deviation / 1200)
                 : root;
}
function newRound() {
  const inTuneP = 0.1 + 0.2 * (1 - Math.min(deviation, MAX_D) / MAX_D);
  const r = Math.random();
  roundDir = r < inTuneP ? 'in_tune' : Math.random() < 0.5 ? 'sharp' : 'flat';
  if (randomNote) pickRandomNote();   // fresh pitch class each round in RND mode
  setRoundFreqs();
  phase = 'play'; hasPlucked = false;
  setButtonsReady(false); hideFeedback(); updateHeader();
}
const NOTE_CHIP = document.getElementById('noteChip');
function updateNoteChip() { NOTE_CHIP.textContent = randomNote ? 'RND' : NOTE_NAMES[rootSemi] + rootOct; }
function cycleNote() {
  // Cycle C4…B4, then RND, then wrap back to C4.
  if (randomNote)          { randomNote = false; rootSemi = 0; }
  else if (rootSemi >= 11) { randomNote = true; pickRandomNote(); }
  else                     { rootSemi++; }
  updateNoteChip();
  setRoundFreqs();                   // retune the current round (fixed note, or the freshly-picked random one)
  saveGame();
}
// Drive the chip from touchend directly (the page's touch-action:none can make the
// synthesized click flaky on iOS); guard so desktop click doesn't double-fire.
let chipTouchHandled = false;
NOTE_CHIP.addEventListener('touchend', e => {
  e.preventDefault(); chipTouchHandled = true; cycleNote();
  setTimeout(() => { chipTouchHandled = false; }, 400);
}, { passive: false });
NOTE_CHIP.addEventListener('click', () => { if (!chipTouchHandled) cycleNote(); });
// Soft reset: restart the run at the easiest level and clear the streak, but keep
// the best score. Triggered by the ↺ next to the cent readout.
function resetExercise() {
  clearTimeout(advanceTimer);
  deviation = MAX_D; history = []; oscillations = 0; lastCorrect = null;
  newRound(); resetStrings();
}
function adjust(correct) {
  if (lastCorrect !== null && lastCorrect !== correct) oscillations = Math.min(oscillations + 1, 10);
  else oscillations = Math.max(0, oscillations - 1);
  lastCorrect = correct;
  if (correct) {
    deviation = Math.max(MIN_D, deviation * (oscillations > 4 ? 0.90 : 0.75));
    if (deviation < bestDev) { bestDev = deviation; saveGame(); }
  } else {
    const bigStep  = history.slice(-4).filter(x => !x).length >= 4;
    const tightStep = oscillations > 4;
    deviation = Math.min(MAX_D, deviation * (bigStep ? 1.8 : tightStep ? 1.1 : 1.3));
  }
}
function answer(userAns) {
  if (phase !== 'play' || !hasPlucked) return;
  const correct = userAns === roundDir;
  adjust(correct);
  history.push(correct); if (history.length > 5) history.shift();
  setButtonsReady(false); updateHeader();
  showFeedback(correct);
  if (correct) {
    phase = 'feedback';                       // brief lockout, then auto-advance
    clearTimeout(advanceTimer);
    advanceTimer = setTimeout(advance, toastHold);
  } else {
    phase = 'review';                         // stay: re-pluck to listen, tap › to move on
  }
}
function advance() { clearTimeout(advanceTimer); hideFeedback(); newRound(); resetStrings(); }
function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  document.getElementById('fbLabel').textContent = correct
    ? pickMsg(FB_CORRECT)
    : pickMsg(FB_INCORRECT).replace('{ans}', ANSWER_WORD[roundDir]);
  fb.classList.toggle('has-next', !correct);
  styleFeedback(); positionFeedback();
  fb.classList.add('show');
}
function hideFeedback() { document.getElementById('feedback').classList.remove('show'); }
function positionFeedback() {
  const plateBottom = bridgeCY() + 86 * (bridgeW / 220) * 0.42;  // board bottom (svg coords)
  document.getElementById('feedback').style.top = (plateBottom + vOffset + 26) + 'px';
}
function styleFeedback() {
  const fb = document.getElementById('feedback');
  const pill = document.getElementById('fbPill'), lbl = document.getElementById('fbLabel'), nxt = document.getElementById('fbNext');
  fb.style.transition = `opacity ${toastFade}ms ease`;
  pill.style.background = toastBg;
  pill.style.color = toastTextCol;
  pill.style.setProperty('--tpv', toastPad + 'px');
  pill.style.setProperty('--tph', (toastPad + 10) + 'px');
  pill.style.transform = `translateY(${toastY}px) scale(${toastScale / 100})`;
  pill.style.gap = toastNextGap + 'px';
  pill.style.fontFamily = fontStack(toastFont);
  lbl.style.fontSize = toastFontSize + 'px';
  lbl.style.letterSpacing = (toastTracking / 100) + 'em';
  lbl.style.textTransform = toastCase;
  lbl.style.fontWeight = toastWeight;
  nxt.style.background = toastNextBg;
  nxt.style.color = toastNextCol;
  nxt.style.fontSize = (toastFontSize + 4) + 'px';
  nxt.style.transform = `translateY(${toastNextDY}px)`;
  nxt.textContent = toastChevron;
}
// Static swatch in the panel so toast colours/size can be tuned without playing a round
function renderToastPreview() {
  const pill = document.getElementById('toastPrevPill'), nxt = document.getElementById('toastPrevNext');
  if (!pill) return;
  pill.style.cssText = `display:inline-flex;align-items:center;gap:${toastNextGap}px;`
    + `font-family:${fontStack(toastFont)};border-radius:999px;`
    + `padding:${toastPad}px 8px ${toastPad}px ${toastPad + 10}px;`
    + `transform:scale(${toastScale / 100});transform-origin:center;`
    + `background:${toastBg};color:${toastTextCol};font-weight:${toastWeight};`

// Answer buttons: fire from touchend directly (more reliable on iOS than the
// synthesized click), with a per-button guard so desktop click doesn't double-fire.
// They're pointer-events:none until ready, so touchend only lands when tappable.
document.querySelectorAll('.abtn').forEach(b => {
  let touched = false;

    e.preventDefault(); touched = true; answer(b.dataset.ans);

['mousedown', 'touchstart', 'mouseup', 'touchend'].forEach(evt =>
  fbPillEl.addEventListener(evt, e => e.stopPropagation()));

on('pToastY',      e => { toastY       = +e.target.value; document.getElementById('pToastYV').textContent     = toastY+'px'; styleFeedback(); });
on('pToastHold',   e => { toastHold    = +e.target.value; document.getElementById('pToastHoldV').textContent = (toastHold/1000).toFixed(2)+'s'; });
on('pToastFade',   e => { toastFade    = +e.target.value; document.getElementById('pToastFadeV').textContent = toastFade+'ms'; document.getElementById('feedback').style.transition = `opacity ${toastFade}ms ease`; });
on('pHdrFont',     e => { hdrFont      = e.target.value; applyHeader(); });
on('pThreshSize',  e => { threshSize   = +e.target.value; document.getElementById('pThreshSizeV').textContent = threshSize+'px'; applyHeader(); });
on('pThreshCol',   e => { threshCol    = e.target.value; applyHeader(); });
on('pThreshWeight',e => { threshWeight = +e.target.value; document.getElementById('pThreshWeightV').textContent = threshWeight; applyHeader(); });
on('pBestSize',    e => { bestSize     = +e.target.value; document.getElementById('pBestSizeV').textContent = bestSize+'px'; applyHeader(); });
on('pBestOp',      e => { bestOp       = +e.target.value; document.getElementById('pBestOpV').textContent = bestOp+'%'; applyHeader(); });
on('pDotSize',     e => { dotSize      = +e.target.value; document.getElementById('pDotSizeV').textContent = dotSize+'px'; applyHeader(); });
on('pDotGap',      e => { dotGap       = +e.target.value; document.getElementById('pDotGapV').textContent = dotGap+'px'; applyHeader(); });
on('pDotOk',       e => { dotOkCol     = e.target.value; applyHeader(); });
on('pDotErr',      e => { dotErrCol    = e.target.value; applyHeader(); });
on('pHdrTop',      e => { hdrTop       = +e.target.value; document.getElementById('pHdrTopV').textContent = hdrTop+'px'; applyHeader(); });
on('pBestGap',     e => { bestGap      = +e.target.value; document.getElementById('pBestGapV').textContent = bestGap+'px'; applyHeader(); });
on('pHistGap',     e => { histGap      = +e.target.value; document.getElementById('pHistGapV').textContent = histGap+'px'; applyHeader(); });
on('pVOff',      e => { vOffset    = +e.target.value; document.getElementById('pVOffV').textContent     = vOffset+'px'; applyVOffset(); });

// Keep textarea live when any slider moves
document.getElementById('panel-scroll').addEventListener('input',
  () => document.getElementById('pJson').value = JSON.stringify(currentVis()));

document.getElementById('pSave').addEventListener('click', () => {
  saveVis();
  const b = document.getElementById('pSave');
  b.textContent = 'SAVED ✓'; setTimeout(() => b.textContent = 'SET AS DEFAULT', 1500);
});
document.getElementById('pReset').addEventListener('click', () => {
  // Clear the saved snapshot so the code-baked defaults load fresh
  localStorage.removeItem(LS_VIS);
  location.reload();
});
document.getElementById('pCopy').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('pJson').value)
    .then(() => { const b=document.getElementById('pCopy'); b.textContent='COPIED ✓'; setTimeout(()=>b.textContent='COPY',1500); })
    .catch(() => { const ta=document.getElementById('pJson'); ta.select(); document.execCommand('copy'); });
});
document.getElementById('pApply').addEventListener('click', () => {
  try {
    applyVisObj(JSON.parse(document.getElementById('pJson').value));
    syncPanel(); applyBg(); applyColors(); applyStringWidth();
    applyBody(); applyHeader(); applyButtonStyles(); buildSVG();
  } catch(e) {}
});

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
loadVis(); loadGame();
deviation = Math.min(MAX_D, bestDev * 1.5);
applyBg();
applyHeader();
updateNoteChip();
applyButtonStyles();  // size the buttons first so #answers has its final height…
buildSVG();           // …then buildSVG measures it correctly for vertical centering
newRound();
// Start with every panel section collapsed
document.querySelectorAll('.psec-body').forEach(b => b.classList.add('collapsed'));
document.querySelectorAll('.psec-arrow').forEach(a => a.textContent = '▸');
// Web font (Rubik) loads async and nudges the buttons-bar height — recenter once ready
if (document.fonts && document.fonts.ready) document.fonts.ready.then(applyVOffset);
</script>
</body>
</html>
