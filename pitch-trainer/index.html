<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pitch Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --green: #a8ff78;
      --red:   #ff6b6b;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px 0;
      flex-shrink: 0;
    }
    #title, #score {
      font-size: 10px;
      letter-spacing: 0.2em;
      opacity: 0.35;
    }

    #stage {
      flex: 1;
      position: relative;
      width: 100%;
      min-height: 0;
    }
    #svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #hint, #result {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
    }
    #hint {
      bottom: 16px;
      font-size: 10px;
      letter-spacing: 0.18em;
      opacity: 0;
      transition: opacity 0.4s;
      text-transform: uppercase;
    }
    #hint.visible { opacity: 0.35; }
    #result {
      bottom: 44px;
      font-size: 13px;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #result.visible { opacity: 1; }

    #bottom {
      flex-shrink: 0;
      padding: 12px 16px 32px;
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 17px 4px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.2);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.15s;
      pointer-events: none;
    }
    .btn.ready {
      border-color: rgba(255,255,255,0.6);
      color: rgba(255,255,255,0.85);
      pointer-events: all;
    }
    .btn.ready:active { background: rgba(255,255,255,0.08); }
    .btn.correct { border-color: var(--green); color: var(--green); }
    .btn.wrong   { border-color: var(--red);   color: var(--red); opacity: 0.65; }
    .btn.muted   { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div id="topbar">
  <span id="title">PITCH TRAINER</span>
  <span id="score">0 / 0</span>
</div>

<div id="stage">
  <svg id="svg"></svg>
  <div id="hint"></div>
  <div id="result"></div>
</div>

<div id="bottom">
  <button class="btn" id="btn-flat">♭ Flat</button>
  <button class="btn" id="btn-check">Check</button>
  <button class="btn" id="btn-sharp">Sharp ♯</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  Config
// ══════════════════════════════════════════════════════════════
const BASE_FREQ  = 220;
const AUDIO_DUR  = 3.0;
const MIN_PLUCK  = 8;
const DETUNE_MIN = 14;
const DETUNE_MAX = 36;
const X_RATIOS   = [0.33, 0.67];
const LABELS     = ['REFERENCE', 'COMPARE'];

// Buzz visuals (BLUR model — chosen in vibration-compare.html)
const NUM_GHOSTS = 12;
const STRING_W   = 10;
const GHOST_W    = 3.5;
const VIB_DECAY     = 2.34;   // sustain: how long it rings (was SUSTAIN 54)
const BLUR_STRENGTH = 3.42;   // max horizontal motion blur px (was BLUR 19)

// Pin geometry (sandbox defaults)
const PIN_R   = 20;
const PILL_W  = 19;
const PILL_D  = 28;
const INSET   = 0;
const PIN_MARGIN = 12;   // gap from canvas edge to pin center

const SVGNS = 'http://www.w3.org/2000/svg';

// ══════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════
let state   = 'WAIT_REF';   // WAIT_REF | PLAYING_REF | WAIT_CMP | PLAYING_CMP | JUDGE | REVEALED
let detune  = randomDetune();
let audioCtx = null;
let W = 0, H = 0;
let correct = 0, total = 0;

const cx     = [0, 0];        // current control-point offset per string
const vib    = [false, false];
const active = [true, false];

let rafId = null;
const drag = { active: false, idx: -1 };

// SVG element handles
let mainPath = [], ghostEls = [[], []], blurDev = [], grpEls = [], labelEls = [];

// ══════════════════════════════════════════════════════════════
//  Geometry helpers
// ══════════════════════════════════════════════════════════════
function pinTopY()  { return PIN_R + PIN_MARGIN; }
function pinBotY()  { return H - PIN_R - PIN_MARGIN; }

// String ends at the center of each notch's rounded cap, so the string's
// round cap is concentric with the pill arc → even gap all around.
function strTopY() { return pinTopY() + PIN_R - PILL_D + PILL_W / 2; }
function strBotY() { return pinBotY() - PIN_R + PILL_D - PILL_W / 2; }

function stringD(i, offset) {
  const x   = W * X_RATIOS[i];
  const top = strTopY();
  const bot = strBotY();
  const mid = (top + bot) / 2;
  return `M ${x} ${top} Q ${x + offset} ${mid} ${x} ${bot}`;
}

function ghostD(i, k) {
  const frac = NUM_GHOSTS > 1 ? (k / (NUM_GHOSTS - 1)) * 2 - 1 : 0;
  return stringD(i, cx[i] * frac);
}

function ghostOpacity(k, env) {
  const frac = NUM_GHOSTS > 1 ? k / (NUM_GHOSTS - 1) : 0.5;
  const edge = Math.abs(frac * 2 - 1);
  return (0.12 + edge * 0.30) * Math.min(env * 2, 1);
}

function randomDetune() {
  const amt = DETUNE_MIN + Math.random() * (DETUNE_MAX - DETUNE_MIN);
  return Math.random() > 0.5 ? amt : -amt;
}

// ══════════════════════════════════════════════════════════════
//  SVG build
// ══════════════════════════════════════════════════════════════
function buildSVG() {
  const svg = document.getElementById('svg');
  const rect = document.getElementById('stage').getBoundingClientRect();
  W = rect.width;
  H = rect.height;

  // Defs: per-string horizontal motion-blur filter + per-pin notch mask
  let defs = '<defs>';
  for (let i = 0; i < 2; i++) {
    defs += `
      <filter id="fblur-${i}" x="-60%" y="-10%" width="220%" height="120%">
        <feGaussianBlur id="fdev-${i}" stdDeviation="0 0"/>
      </filter>`;
  }

  const topY = pinTopY();
  const botY = pinBotY();
  for (let i = 0; i < 2; i++) {
    const x = W * X_RATIOS[i];
    const px = x - PILL_W / 2;
    const rxv = PILL_W / 2;
    // top pin: pill enters from below
    const topPillY = topY + PIN_R - PILL_D;
    const topPillH = PILL_D + PIN_R;
    // bottom pin: pill enters from above
    const botPillY = botY - PIN_R - PIN_R;
    const botPillH = PILL_D + PIN_R;
    defs += `
      <mask id="mask-top-${i}">
        <circle cx="${x}" cy="${topY}" r="${PIN_R}" fill="white"/>
        <rect x="${px}" y="${topPillY}" width="${PILL_W}" height="${topPillH}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>
      <mask id="mask-bot-${i}">
        <circle cx="${x}" cy="${botY}" r="${PIN_R}" fill="white"/>
        <rect x="${px}" y="${botPillY}" width="${PILL_W}" height="${botPillH}" rx="${rxv}" ry="${rxv}" fill="black"/>
      </mask>`;
  }
  defs += '</defs>';
  svg.innerHTML = defs;

  mainPath = [];
  ghostEls = [[], []];
  blurDev  = [];
  grpEls   = [];
  labelEls = [];

  for (let i = 0; i < 2; i++) {
    const x = W * X_RATIOS[i];

    // Label
    const label = document.createElementNS(SVGNS, 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', topY - PIN_R - 8);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#fff');
    label.setAttribute('font-family', 'Courier New, monospace');
    label.setAttribute('font-size', '9');
    label.setAttribute('letter-spacing', '2');
    label.setAttribute('opacity', i === 0 ? 0.45 : 0.1);
    label.textContent = LABELS[i];
    svg.appendChild(label);
    labelEls.push(label);

    // Blurred group (behind pins): ghosts + string share one motion-blur filter
    const grp = document.createElementNS(SVGNS, 'g');
    svg.appendChild(grp);
    grpEls.push(grp);
    blurDev.push(document.getElementById(`fdev-${i}`));

    // Ghosts (drawn first, under the string)
    for (let k = 0; k < NUM_GHOSTS; k++) {
      const g = document.createElementNS(SVGNS, 'path');
      g.setAttribute('stroke', '#fff');
      g.setAttribute('stroke-width', GHOST_W);
      g.setAttribute('fill', 'none');
      g.setAttribute('stroke-linecap', 'round');
      g.setAttribute('opacity', '0');
      grp.appendChild(g);
      ghostEls[i].push(g);
    }

    // String outside the blur group so width stays constant;
    // sits between the blur group and the pins in draw order.
    const path = document.createElementNS(SVGNS, 'path');
    path.setAttribute('d', stringD(i, 0));
    path.setAttribute('stroke', '#fff');
    path.setAttribute('stroke-width', STRING_W);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('opacity', i === 0 ? 1 : 0.15);
    svg.appendChild(path);
    mainPath.push(path);

    // Pins (on top, masked with notch)
    const pinTop = document.createElementNS(SVGNS, 'circle');
    pinTop.setAttribute('cx', x); pinTop.setAttribute('cy', topY);
    pinTop.setAttribute('r', PIN_R); pinTop.setAttribute('fill', '#fff');
    pinTop.setAttribute('mask', `url(#mask-top-${i})`);
    svg.appendChild(pinTop);

    const pinBot = document.createElementNS(SVGNS, 'circle');
    pinBot.setAttribute('cx', x); pinBot.setAttribute('cy', botY);
    pinBot.setAttribute('r', PIN_R); pinBot.setAttribute('fill', '#fff');
    pinBot.setAttribute('mask', `url(#mask-bot-${i})`);
    svg.appendChild(pinBot);
  }

  redraw(0);
  redraw(1);
}

// ══════════════════════════════════════════════════════════════
//  Redraw (per string, imperative)
// ══════════════════════════════════════════════════════════════
function redraw(i) {
  if (!mainPath[i]) return;
  const v = vib[i], a = active[i];

  if (v) {
    // BLUR model: string centered, symmetric blurred fan of half-width cx[i]
    grpEls[i].setAttribute('filter', `url(#fblur-${i})`);
    mainPath[i].setAttribute('d', stringD(i, 0));
    mainPath[i].setAttribute('opacity', 1);
    const env = Math.min(cx[i] / 90, 1);
    for (let k = 0; k < NUM_GHOSTS; k++) {
      ghostEls[i][k].setAttribute('d', ghostD(i, k));
      ghostEls[i][k].setAttribute('opacity', ghostOpacity(k, env).toFixed(3));
    }
    blurDev[i].setAttribute('stdDeviation', (BLUR_STRENGTH * env).toFixed(2) + ' 0');
  } else {
    // dragging / rest: crisp bent-or-straight string, no fan, no blur.
    // Filter OFF — a vertical line's zero-width bbox would be erased by it.
    grpEls[i].setAttribute('filter', 'none');
    mainPath[i].setAttribute('d', stringD(i, cx[i]));
    mainPath[i].setAttribute('opacity', a ? 1 : 0.15);
    for (let k = 0; k < NUM_GHOSTS; k++) ghostEls[i][k].setAttribute('opacity', '0');
  }

  if (labelEls[i]) labelEls[i].setAttribute('opacity', a ? 0.45 : 0.1);
}

// ══════════════════════════════════════════════════════════════
//  Interaction
// ══════════════════════════════════════════════════════════════
function canDrag(i) {
  if (vib[i]) return false;
  if (i === 0) return state === 'WAIT_REF';
  if (i === 1) return state === 'WAIT_CMP';
  return false;
}

function startDrag(clientX) {
  if (!W) return;
  const dists = X_RATIOS.map(r => Math.abs(clientX - W * r));
  const idx = dists[0] < dists[1] ? 0 : 1;
  if (Math.min(dists[0], dists[1]) > 60) return;
  if (!canDrag(idx)) return;
  initAudio();
  drag.active = true;
  drag.idx = idx;
  hideHint();
}

function moveDrag(clientX) {
  if (!drag.active) return;
  const x0 = W * X_RATIOS[drag.idx];
  cx[drag.idx] = Math.max(-90, Math.min(90, (clientX - x0) * 1.3));
  redraw(drag.idx);
}

function endDrag() {
  if (!drag.active) return;
  const idx = drag.idx;
  drag.active = false;
  drag.idx = -1;
  if (Math.abs(cx[idx]) < MIN_PLUCK) {
    cx[idx] = 0;
    redraw(idx);
    return;
  }
  pluck(idx, cx[idx]);
}

// ══════════════════════════════════════════════════════════════
//  Pluck → animate + audio
// ══════════════════════════════════════════════════════════════
function pluck(idx, amp) {
  vib[idx] = true;
  active[idx] = false;
  state = idx === 0 ? 'PLAYING_REF' : 'PLAYING_CMP';

  const freq = idx === 0 ? BASE_FREQ : BASE_FREQ * Math.pow(2, detune / 1200);
  playTone(freq, AUDIO_DUR);

  // BLUR model: envelope blooms to the pluck amplitude then decays; the
  // string stays centered while the blurred fan collapses to a crisp line.
  const amp0 = Math.abs(amp);
  const t0 = performance.now();
  function tick() {
    const t = (performance.now() - t0) / 1000;
    const env = Math.exp(-VIB_DECAY * t);
    cx[idx] = amp0 * env;
    redraw(idx);
    if (env > 0.004) {
      rafId = requestAnimationFrame(tick);
    } else {
      cx[idx] = 0;
      vib[idx] = false;
      redraw(idx);
      onStringDone(idx);
    }
  }
  rafId = requestAnimationFrame(tick);
}

function onStringDone(idx) {
  if (idx === 0) {
    state = 'WAIT_CMP';
    active[1] = true;
    redraw(1);
    showHint('now pluck the second string');
  } else {
    state = 'JUDGE';
    setButtonsReady();
    hideHint();
  }
}

// ══════════════════════════════════════════════════════════════
//  Audio
// ══════════════════════════════════════════════════════════════
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur) {
  const t = audioCtx.currentTime;
  const mg = audioCtx.createGain();
  mg.gain.setValueAtTime(0.0001, t);
  mg.gain.exponentialRampToValueAtTime(0.5, t + 0.006);
  mg.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  mg.connect(audioCtx.destination);
  [[1,.55],[2,.28],[3,.14],[4,.07],[6,.03]].forEach(([n, g]) => {
    const osc = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * n;
    gn.gain.value = g;
    osc.connect(gn); gn.connect(mg);
    osc.start(t); osc.stop(t + dur);
  });
}

// ══════════════════════════════════════════════════════════════
//  Buttons / judging
// ══════════════════════════════════════════════════════════════
const btnFlat  = document.getElementById('btn-flat');
const btnCheck = document.getElementById('btn-check');
const btnSharp = document.getElementById('btn-sharp');

function setButtonsReady() {
  [btnFlat, btnCheck, btnSharp].forEach(b => b.className = 'btn ready');
}
function clearButtons() {
  btnFlat.className = 'btn';  btnFlat.textContent  = '♭ Flat';
  btnCheck.className = 'btn'; btnCheck.textContent = 'Check';
  btnSharp.className = 'btn'; btnSharp.textContent = 'Sharp ♯';
}

btnFlat.addEventListener('click',  e => { e.stopPropagation(); submitGuess('flat'); });
btnSharp.addEventListener('click', e => { e.stopPropagation(); submitGuess('sharp'); });
btnCheck.addEventListener('click', e => { e.stopPropagation(); revealOnly(); });

function submitGuess(answer) {
  if (state !== 'JUDGE') return;
  state = 'REVEALED';
  total++;
  const truth = detune < 0 ? 'flat' : 'sharp';
  const ok = answer === truth;
  if (ok) correct++;
  updateScore();

  [btnFlat, btnCheck, btnSharp].forEach(b => b.classList.remove('ready'));
  const guessBtn = answer === 'flat' ? btnFlat : btnSharp;
  const otherBtn = answer === 'flat' ? btnSharp : btnFlat;
  guessBtn.classList.add(ok ? 'correct' : 'wrong');
  otherBtn.classList.add('muted');
  btnCheck.classList.add('muted');

  const cts = Math.abs(Math.round(detune));
  showResult(`${ok ? '✓ CORRECT' : '✗ WRONG'} — ${cts}¢ ${truth}`);
  scheduleReset();
}

function revealOnly() {
  if (state !== 'JUDGE') return;
  state = 'REVEALED';
  const truth = detune < 0 ? 'flat' : 'sharp';
  [btnFlat, btnCheck, btnSharp].forEach(b => b.classList.remove('ready'));
  const truthBtn = truth === 'flat' ? btnFlat : btnSharp;
  const otherBtn = truth === 'flat' ? btnSharp : btnFlat;
  truthBtn.classList.add('correct');
  otherBtn.classList.add('muted');
  btnCheck.classList.add('muted');
  const cts = Math.abs(Math.round(detune));
  showResult(`${cts}¢ ${truth}`);
  scheduleReset();
}

// ══════════════════════════════════════════════════════════════
//  Reset
// ══════════════════════════════════════════════════════════════
function scheduleReset() {
  showHint('tap anywhere to play again');
  setTimeout(() => {
    window.addEventListener('click', doReset, { once: true });
    window.addEventListener('touchstart', doReset, { once: true });
  }, 900);
}

function doReset() {
  if (state !== 'REVEALED') return;
  if (rafId) cancelAnimationFrame(rafId);
  state = 'WAIT_REF';
  detune = randomDetune();
  cx[0] = cx[1] = 0;
  vib[0] = vib[1] = false;
  active[0] = true; active[1] = false;
  clearButtons();
  hideResult();
  showHint('pluck the reference string');
  redraw(0); redraw(1);
}

// ══════════════════════════════════════════════════════════════
//  UI helpers
// ══════════════════════════════════════════════════════════════
const hintEl = document.getElementById('hint');
const resultEl = document.getElementById('result');
function showHint(t) { hintEl.textContent = t; hintEl.classList.add('visible'); }
function hideHint()  { hintEl.classList.remove('visible'); }
function showResult(t) { resultEl.textContent = t; resultEl.classList.add('visible'); }
function hideResult()  { resultEl.classList.remove('visible'); }
function updateScore() { document.getElementById('score').textContent = `${correct} / ${total}`; }

// ══════════════════════════════════════════════════════════════
//  Global listeners + init
// ══════════════════════════════════════════════════════════════
const stage = document.getElementById('stage');
stage.addEventListener('mousedown',  e => startDrag(e.clientX));
stage.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX); }, { passive: false });
window.addEventListener('mousemove',  e => moveDrag(e.clientX));
window.addEventListener('mouseup',    endDrag);
window.addEventListener('touchmove',  e => { e.preventDefault(); moveDrag(e.touches[0].clientX); }, { passive: false });
window.addEventListener('touchend',   endDrag);
window.addEventListener('resize', buildSVG);

buildSVG();
showHint('pluck the reference string');
</script>
</body>
</html>
